<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-dark: #0a1628;
  --bg-board: #0d1f3c;
  --bg-board-alt: #162d50;
  --border-color: #1a3a5c;
  --accent-primary: #4fc3f7;
  --accent-primary-light: #80deea;
  --accent-primary-alt: #29b6f6;
  --text-muted: #78909c;
  --text-secondary: #b0bec5;
  --text-tertiary: #90a4ae;
  --text-hint: #546e7a;
  --color-ship: #2e7d32;
  --color-hit: #c62828;
  --color-sunk-dark: #1a1a1a;
  --color-btn-primary-1: #1565c0;
  --color-btn-primary-2: #1976d2;
  --color-btn-success-1: #2e7d32;
  --color-btn-success-2: #388e3c;
  --color-btn-outline-border: #2962ff;
  --color-warning: #ffd54f;
  --color-header-grad-1: #0d1f3c;
  --color-header-grad-2: #162d50;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.25);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.3);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

:root.palette-ocean {
  --bg-dark: #0f1f30;
  --bg-board: #162e48;
  --bg-board-alt: #1f3d56;
  --border-color: #345575;
  --accent-primary: #4a7fa0;
  --accent-primary-light: #6a9db8;
  --accent-primary-alt: #3d6d8c;
  --text-muted: #6b7d8a;
  --text-secondary: #acb5bc;
  --text-tertiary: #95a0a8;
  --text-hint: #576672;
  --color-ship: #3d7d50;
  --color-hit: #b04040;
  --color-sunk-dark: #1c2328;
  --color-btn-primary-1: #3d6b8a;
  --color-btn-primary-2: #345a78;
  --color-btn-success-1: #3d7d50;
  --color-btn-success-2: #336b44;
  --color-btn-outline-border: #3d6d8c;
  --color-warning: #b89448;
  --color-header-grad-1: #162e48;
  --color-header-grad-2: #1f3d56;
}



:root.palette-slate {
  --bg-dark: #0f172a;
  --bg-board: #1e293b;
  --bg-board-alt: #334155;
  --border-color: #475569;
  --accent-primary: #5a6a85;
  --accent-primary-light: #8b9bc4;
  --accent-primary-alt: #4d5d7a;
  --text-muted: #6e8098;
  --text-secondary: #bec8d8;
  --text-tertiary: #a5b0c3;
  --text-hint: #5c6a80;
  --color-ship: #3ec470;
  --color-hit: #dc3535;
  --color-sunk-dark: #020617;
  --color-btn-primary-1: #425069;
  --color-btn-primary-2: #5a6a85;
  --color-btn-success-1: #3ec470;
  --color-btn-success-2: #2ec55e;
  --color-btn-outline-border: #5a6a85;
  --color-warning: #e5a823;
  --color-header-grad-1: #1e293b;
  --color-header-grad-2: #334155;
}

/* Neon theme removed */



*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background 0.3s ease}
.header{padding:8px 12px;text-align:center;width:100%;background:linear-gradient(135deg,var(--color-header-grad-1),var(--color-header-grad-2))}
.header .sub{font-size:11px;color:var(--accent-primary-light)}
.header.in-game{display:none}
.board-label{display:none}
.lang-bar{display:flex;gap:6px;justify-content:center;padding:6px 0}
.lang-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-muted);padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s ease;letter-spacing:.03em}
.lang-btn:hover{border-color:var(--accent-primary);color:var(--accent-primary)}
.lang-btn.active{background:var(--accent-primary);border-color:var(--accent-primary);color:var(--bg-dark);font-weight:600}
.main{flex:1;width:100%;max-width:480px;padding:8px 12px 80px;display:flex;flex-direction:column;align-items:center}
.status{text-align:center;padding:8px 0;font-size:14px;color:var(--text-secondary);min-height:32px}
.status.battle{color:var(--color-warning);font-weight:600;letter-spacing:.02em}
.board-wrap{width:100%;max-width:340px;margin:4px 0}
.board-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:2px 0 4px;text-align:center}
.board{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;aspect-ratio:1;background:var(--bg-board);padding:4px;border-radius:var(--radius-md);border:1px solid var(--border-color);transition:all .3s ease;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)}
.board.my-turn{animation:pulse-glow 1.5s ease-in-out infinite}
@keyframes pulse-glow{0%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}50%{border-color:var(--accent-primary-alt);box-shadow:0 0 20px rgba(79,195,247,0.8)}100%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}}
.sett-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;cursor:pointer;border-bottom:1px solid var(--border-color);font-size:15px}
.sett-row:last-child{border-bottom:none}
.sett-val{font-size:20px}
.btn-link{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;transition:.15s}
.btn-link:hover{color:var(--accent-primary)}
.cell{border-radius:4px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;transition:all .15s ease;background:var(--bg-board-alt);user-select:none;border:1px solid transparent}
.cell:active{transform:scale(.9)}
   .cell.empty{background:var(--bg-board-alt)}
 .cell.ship{background:var(--color-ship)}
 .cell.strip-ship{background:#e91e63;border-radius:4px}
 .cell.hit{background:var(--color-hit);animation:pop .3s}
 .cell.miss{background:var(--bg-board);opacity:.4}
 .cell.sunk{background:var(--color-sunk-dark);border:1px solid #424242}
 .cell.dead{background:var(--bg-board);opacity:.4}
 .cell.highlight{background:#ff9800;border:2px solid #ff6f00;animation:glow 1s ease-in-out infinite}
.cell.shootable{background:var(--border-color);border-color:var(--color-btn-outline-border)}
.cell.shootable:hover{background:var(--bg-board-alt);border-color:var(--accent-primary);transform:scale(1.05);z-index:1;box-shadow:0 0 8px rgba(79,195,247,.3)}
 @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
 @keyframes glow{0%{box-shadow:0 0 8px rgba(255,152,0,0.6)}50%{box-shadow:0 0 20px rgba(255,152,0,0.9)}100%{box-shadow:0 0 8px rgba(255,152,0,0.6)}}
 .btn-row{display:flex;flex-wrap:wrap;gap:4px;width:100%;max-width:340px;margin-top:8px}
.btn-row.stack{flex-direction:column;gap:8px}
.btn-row.stack .btn{padding:16px 12px;font-size:16px}
.btn{flex:1 1 0;min-width:0;padding:14px 20px;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s ease;text-align:center;letter-spacing:.01em;user-select:none;-webkit-tap-highlight-color:transparent}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn:active{transform:translateY(0) scale(.97);box-shadow:var(--shadow-sm)}
.btn.primary{background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));color:#fff;box-shadow:0 2px 8px rgba(21,101,192,.3)}
  .btn.success{background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff;box-shadow:0 2px 8px rgba(46,125,50,.3)}
  .btn.outline{background:transparent;border:1.5px solid var(--color-btn-outline-border);color:var(--accent-primary)}
  .btn.outline:hover{background:var(--color-btn-outline-border);color:#fff;border-color:var(--color-btn-outline-border)}
  .btn.strip-btn{background:linear-gradient(135deg,#e91e63,#d81b60);color:#fff;border-radius:var(--radius-md);box-shadow:0 2px 12px rgba(233,30,99,0.25)}
  .btn.strip-btn:hover{box-shadow:0 4px 16px rgba(233,30,99,0.4)}
  .btn.quit-btn{background:transparent;border:1.5px solid #c62828;color:#c62828}
  .btn.quit-btn:hover{background:#c62828;color:#fff}
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .modal{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border-radius:var(--radius-lg);padding:28px 24px;max-width:360px;width:100%;text-align:center;border:1px solid var(--border-color);box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .modal h2{font-size:22px;margin-bottom:8px;letter-spacing:-.01em}
  .modal p{font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.4}
  .result-icon{font-size:52px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
  .legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;padding:6px 0;font-size:12px;color:var(--text-tertiary)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .ship-hint{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:8px 0 4px;font-size:13px;color:var(--accent-primary-light);width:100%;max-width:340px}
  .ship-hint .ship-item{display:inline-flex;align-items:center;gap:4px;background:var(--bg-board-alt);padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-color);font-weight:500}
  footer{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;background:var(--bg-dark);text-align:center;font-size:11px;color:var(--text-hint);border-top:1px solid var(--border-color)}

.game-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-top:20px}
.game-card{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:24px 20px;text-align:center;cursor:pointer;transition:all .25s ease}
.game-card:hover{transform:translateY(-3px);border-color:var(--accent-primary);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.game-card .icon{font-size:48px;margin-bottom:8px}
.game-card .name{font-size:17px;font-weight:600;letter-spacing:.01em}
.game-card .card-desc{font-size:12px;color:var(--text-muted);margin-top:4px}
.mode-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:340px;margin-top:12px}
.mode-card{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border:1.5px solid var(--border-color);border-radius:var(--radius-md);display:flex;flex-direction:row;align-items:center;gap:14px;cursor:pointer;transition:all .2s ease;padding:14px 16px;box-shadow:var(--shadow-sm)}
.mode-card:hover{transform:translateY(-2px);border-color:var(--accent-primary);box-shadow:var(--shadow-md)}
.mode-card:active{transform:scale(.97)}
.mode-card .icon{width:48px;height:48px;flex-shrink:0;display:block}
.mode-card .label{font-size:15px;font-weight:500;color:var(--text-secondary);line-height:1.2}
.mode-card.bot{border-color:#1565c0}
.mode-card.bot:hover{border-color:#60a5fa}
.mode-card.friend{border-color:#2e7d32}
.mode-card.friend:hover{border-color:#4ade80}
.mode-card.strip{border-color:#d81b60}
.mode-card.strip:hover{border-color:#f472b6}
.mode-card.join{border-color:#e65100}
.mode-card.join:hover{border-color:#fb923c}
.active-games{width:100%;max-width:340px;margin-bottom:12px}
.active-games h3{font-size:13px;color:var(--accent-primary);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:10px;font-weight:600}
.active-game-row{background:var(--bg-board);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;transition:all .2s ease}
.active-game-row:hover{border-color:var(--accent-primary);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.active-game-row .info{font-size:13px}
.active-game-row .info .label{color:var(--text-muted)}
.active-game-row .info .code{color:var(--accent-primary);font-weight:700;letter-spacing:1px}
.active-game-row .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--border-color);color:var(--text-secondary)}
.active-game-row .badge.playing{background:var(--color-btn-success-1);color:#fff}
.ana-letters{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.ana-tile{width:54px;height:54px;background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;color:#fff;text-transform:uppercase;cursor:pointer;transition:all .15s ease;user-select:none;box-shadow:0 2px 8px rgba(21,101,192,.25)}
.ana-tile:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(21,101,192,.35)}
.ana-tile:active{transform:scale(.88);opacity:.8;box-shadow:0 1px 4px rgba(21,101,192,.15)}
.ana-word-display{display:flex;gap:6px;justify-content:center;min-height:48px;align-items:center;width:100%;max-width:340px;background:var(--bg-board);border:1px dashed var(--border-color);border-radius:10px;padding:6px;margin:4px 0;flex-wrap:wrap}
.ana-word-display .ana-tile{width:46px;height:46px;font-size:20px;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2))}
.ana-word-display .ana-tile:active{transform:scale(.88);opacity:.7}
.ana-submit-row{display:flex;gap:6px;width:100%;max-width:340px;margin:4px 0}
.ana-submit-row .btn{min-width:unset}
.ana-submit-row .btn:first-child{flex:2}
.ana-submit-row .btn:last-child{flex:0 0 48px;padding:10px;font-size:18px}
.ana-found{width:100%;max-width:340px;margin:8px 0}
.ana-word{display:inline-block;background:var(--bg-board);border:1px solid var(--border-color);border-radius:6px;padding:4px 10px;margin:3px;font-size:14px}
.ana-word span{color:var(--accent-primary);font-weight:700;margin-left:6px}
.ana-info{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:14px;padding:4px 0}
.ana-info .timer{color:var(--color-warning);font-weight:700}
.ana-info .score{color:var(--accent-primary);font-weight:700}
.ana-hint{flex:0!important;min-width:unset!important;padding:10px 16px!important}
.ana-tile.used{background:var(--border-color);opacity:.25;cursor:default;pointer-events:none}
.ana-base-word{text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0 8px;cursor:pointer;user-select:none}
.ana-base-word .revealed{color:var(--accent-primary);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:2px;display:none}
.ana-base-word.show .revealed{display:inline}
.ana-base-word:not(.show)::after{content:' (нажми, чтобы открыть)';font-size:11px;color:var(--text-hint)}

.theme-selector{display:flex;gap:6px;justify-content:center;padding:8px 0;flex-wrap:wrap;width:100%;max-width:340px;margin:8px 0}
.theme-btn{padding:10px 18px;border:1.5px solid var(--border-color);background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .2s ease;letter-spacing:.02em}
.theme-btn:hover{border-color:var(--accent-primary);color:var(--accent-primary);background:rgba(79,195,247,.08)}
.theme-btn.active{background:var(--accent-primary);color:var(--bg-dark);border-color:var(--accent-primary);font-weight:600}
.theme-divider{width:1px;background:var(--border-color);height:24px;align-self:center}
.theme-btn.snd-btn{min-width:40px;padding:8px 10px;font-size:16px}


/* Yahtzee styles */
.yz-die {
  width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
  font-size: 28px; border-radius: var(--radius-md); background: var(--bg-board);
  border: 2px solid var(--border-color); transition: all 0.15s ease; user-select: none;
  box-shadow: var(--shadow-sm);
}
.yz-die.yz-held { border-color: #4fc3f7; box-shadow: 0 0 12px rgba(79,195,247,.3); }
.yz-die.yz-clickable { cursor: pointer; }
.yz-die.yz-clickable:hover { border-color: var(--accent-primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.yz-die.yz-clickable:active { transform: scale(0.92); }
.yz-dice-row { display: flex; gap: 8px; justify-content: center; margin: 8px 0; flex-wrap: wrap; }
.yz-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.yz-table th { padding: 4px; text-align: left; color: var(--text-muted); font-size: 11px; }
.yz-table td { padding: 4px 6px; border-bottom: 1px solid var(--border-color); }
.yz-row { transition: 0.1s; }
.yz-row.yz-action { cursor: pointer; }
.yz-row.yz-action:hover { background: var(--color-btn-success-1) !important; }
.yz-row.yz-bonus { background: var(--bg-board-alt); }
.yz-row.yz-total { background: var(--accent-primary); color: var(--bg-dark); font-weight: 700; }
.yz-cat { color: var(--text-secondary); white-space: nowrap; }
.yz-val { text-align: center; }
.yz-possible { color: #ffd54f; font-weight: 700; }
.yz-scroll { max-height: 320px; overflow-y: auto; margin: 6px 0; }

</style>
</head>
<body>

<div class="header" id="header">
  <div class="lang-bar" id="langBar">
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('uk')">UA</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <div class="sub" id="gameInfo">—</div>
</div>

<div class="main" id="app">
  <div class="status" id="status">🔱 ...</div>
  <div class="ship-hint" id="shipHint"></div>
  <div class="board-wrap" id="ownBoardWrap" style="display:none">
    <div class="board-label" id="lblOwn">🚢</div>
    <div class="board" id="ownBoard"></div>
  </div>
  <div class="board-wrap" id="oppBoardWrap" style="display:none">
    <div class="board-label" id="lblOpp">🎯</div>
    <div class="board" id="oppBoard"></div>
  </div>
  <!-- Legend removed per request -->
  <div class="theme-selector" id="themeSelector" style="display:none">
    <button class="theme-btn active" data-theme="ocean" onclick="setTheme('ocean')">🌊 Ocean</button>
    <button class="theme-btn" data-theme="slate" onclick="setTheme('slate')">⛳ Slate</button>
    <div class="theme-divider"></div>
    <button class="theme-btn snd-btn" id="sndBtn" onclick="toggleSnd()">🔊</button>
    <button class="theme-btn snd-btn" id="vibeBtn" onclick="toggleVibe()">📳</button>
  </div>
  <div class="btn-row" id="actions"></div>

</div>
<footer>🎮 Games</footer>

<script>
const LANG = {
  ru: {
    title: '⚓ МОРСКОЙ БОЙ',
    startBtn: '🎮 Начать игру',
    ownBoard: '🚢 ТВОИ КОРАБЛИ',
    oppBoard: '🎯 ДОСКА СОПЕРНИКА',
    legEmpty: 'пусто', legShip: 'корабль', legHit: 'попал', legMiss: 'мимо', legSunk: 'потоплен',
    welcome: '🔱 Добро пожаловать!',
    placing: '🚢 Расстановка — крути, пока не устроит',
    reroll: '🔀 Переставить',
    confirm: '✅ ОК, начинаем!',
    again: '🔄 Ещё раз? Нажми «ОК» когда устроит',
    yourTurn: '⚓ ТВОЙ ХОД!',
    oppTurn: '⏳ ХОД СОПЕРНИКА...',
    surrender: '🚪 Сдаться',
    quit: '🚪 Выйти',
    quitConfirm: 'Выйти из игры?',
    hit: '🔥 Попадание!',
    sunk: '💀 Корабль потоплен!',
    miss: '💨 Мимо!',
    botHit: 'попал в',
    botSunk: 'потопил',
    botMiss: 'мимо',
    win: '🏆 ПОБЕДА!',
    winDesc: 'Ты потопил все корабли соперника!',
    lose: '💔 ПОРАЖЕНИЕ',
    loseDesc: 'Все твои корабли потоплены...',
    playAgain: '🔄 Играть ещё',
    close: '🚪 Закрыть',
    withBot: '· с ботом',
    withFriend: '· с другом',
    vsBot: '🤖 С ботом',
    vsFriend: '👤 С другом',
    joinTitle: '🔗 Присоединиться',
    joinBtn: '🔗 Ввести код',
    joinPlaceholder: 'Введи код игры',
    joinError: '⚠️ Игра не найдена или уже полная',

const API = window.location.origin;

function $(id){return document.getElementById(id)}

let _snd=localStorage.getItem('sb_snd')!=='0',_vibe=localStorage.getItem('sb_vibe')!=='0';
let _actx=null;
function actx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx}
function tone(f,d,t='sine',v=0.15){if(!_snd)return;try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function haptic(s){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.impactOccurred(s)}catch(e){}}
function hapticN(t){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.notificationOccurred(t)}catch(e){}}
function sfxHit(){tone(800,0.08,'square',0.12);haptic('medium')}
function sfxMiss(){tone(200,0.12,'sine',0.08);haptic('light')}
function sfxSunk(){tone(500,0.15,'square',0.1);setTimeout(()=>tone(300,0.15,'square',0.1),100);setTimeout(()=>tone(150,0.2,'square',0.1),200);haptic('heavy')}
function sfxPlace(){tone(400,0.04,'sine',0.06);haptic('light')}
function sfxWin(){tone(523,0.15,'sine',0.1);setTimeout(()=>tone(659,0.15,'sine',0.1),150);setTimeout(()=>tone(784,0.3,'sine',0.1),300);hapticN('success')}
function sfxLose(){tone(400,0.2,'sine',0.08);setTimeout(()=>tone(300,0.2,'sine',0.08),200);setTimeout(()=>tone(200,0.4,'sine',0.08),400);hapticN('error')}
function sfxChime(){tone(1000,0.25,'sine',0.12);haptic('medium')}
function sfxClick(){tone(600,0.02,'sine',0.04);haptic('light')}
function sfxTick(){tone(1200,0.04,'sine',0.06)}

function toggleSnd(){_snd=!_snd;localStorage.setItem('sb_snd',_snd?'1':'0');updateSettingsUI()}
function toggleVibe(){_vibe=!_vibe;localStorage.setItem('sb_vibe',_vibe?'1':'0');updateSettingsUI()}
function updateSettingsUI(){
  const sndBtn=document.getElementById('sndBtn');
  const vibeBtn=document.getElementById('vibeBtn');
  if(sndBtn)sndBtn.textContent=_snd?'🔊':'🔇';
  if(vibeBtn)vibeBtn.textContent=_vibe?'📳':'📴';
}

function setTheme(themeName){
  const validThemes = ['ocean', 'slate'];
  if(!validThemes.includes(themeName)) return;
  
  document.documentElement.className = 'palette-' + themeName;
  localStorage.setItem('sb_theme', themeName);
  
  const btns = document.querySelectorAll('.theme-btn');
  btns.forEach(btn => {
    btn.classList.remove('active');
    if(btn.dataset.theme === themeName) btn.classList.add('active');
  });
}

function initTheme(){
  const saved = localStorage.getItem('sb_theme') || 'ocean';
  setTheme(saved);
}

function showSettings(){
  const existing=$('settingsOverlay');
  if(existing){existing.remove()}
  const o=document.createElement('div');o.className='overlay';o.id='settingsOverlay';
  const s=_snd?'✅':'❌',v=_vibe?'✅':'❌';
  o.innerHTML=`
    <div class="modal">
      <h2>⚙️ ${t('settings')}</h2>
      <div class="sett-row" onclick="toggleSnd();showSettings()"><span>🔊 ${t('sound')}</span><span class="sett-val">${s}</span></div>
      <div class="sett-row" onclick="toggleVibe();showSettings()"><span>📳 ${t('vibration')}</span><span class="sett-val">${v}</span></div>
      <button class="btn outline" style="margin-top:16px" onclick="this.closest('.overlay').remove()">${t('close')}</button>
    </div>`;
  document.body.appendChild(o);
}

function detectLang(){
  try{
    const tg = window.Telegram.WebApp.initDataUnsafe?.user?.language_code || 'ru';
    if(tg.startsWith('uk'))return 'uk';
  }catch(e){}
  const nav = (navigator.language || '').slice(0,2);
  if(nav==='uk')return'uk';
  if(nav==='en')return'en';
  return localStorage.getItem('sb_lang')||'ru';
}

function t(key, ...args){
  let s = LANG[lang][key] || LANG.ru[key] || key;
  if(args.length) s = s.replace('{0}', args[0]).replace('{1}', args[1]);
  return s;
}

function setLang(l){
  lang = l;
  localStorage.setItem('sb_lang', l);
  const langMap = {ru:'ru', ua:'uk', en:'en'};
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', (langMap[b.textContent.toLowerCase()]||b.textContent.toLowerCase()) === l));
  applyLang();
  if(state) updateUI();
}

function applyLang(){
  $('lblOwn').textContent = t('ownBoard');
  $('lblOpp').textContent = t('oppBoard');
  if(!state && !gameCode) showMenu();
  else document.title=t('title')
}

function initTG(){try{window.Telegram.WebApp.ready();window.Telegram.WebApp.expand()}catch(e){}}
function getUid(){
  if(uid)return uid;
  try{uid=window.Telegram.WebApp.initDataUnsafe?.user?.id||localStorage.getItem('sb_uid')||Date.now()}catch(e){uid=localStorage.getItem('sb_uid')||Date.now()}
  localStorage.setItem('sb_uid',uid);
  return uid
}

function setStatus(text,cls=''){const s=$('status');s.innerHTML=text;s.className='status'+(cls?' '+cls:'')}

async function api(method,data){
  try{
    data = data || {};
    data.lang = lang;
    const r=await fetch(API+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return await r.json()
  }catch(e){setStatus(t('error'));return null}
}

async function fetchBotInfo(retries=10){
  try {
    const res = await api('/api/bot_info', {});
    if(res && res.ok && res.bot_username){
      botUsername = res.bot_username;
    } else if(retries > 0) {
      await new Promise(r => setTimeout(r, 500));
      return fetchBotInfo(retries - 1);
    }
  } catch(e){}
}

let showShipHints = true;

function renderBoard(boardEl,grid,isOpponent,gameOver, shipsData, isStrip){
  boardEl.innerHTML='';
  const EMPTY=0,SHIP=1,HIT=2,MISS=3,SUNK=4,DEAD=5;
  // Build a map cell -> ship size for hints
  const cellSizeMap = {};
  if(shipsData && showShipHints){
    for(const s of shipsData){
      for(const [r,c] of s.cells){
        cellSizeMap[r*10+c] = s.size;
      }
    }
  }
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=document.createElement('div');
    const v=grid[r*10+c];
    cell.className='cell';
    if(v===EMPTY||v===SHIP){cell.classList.add('empty');if(v===SHIP){cell.classList.add(isStrip?'strip-ship':'ship')}}
    else if(v===HIT){cell.classList.add('hit');cell.textContent='❌'}
    else if(v===MISS){cell.classList.add('miss');cell.textContent='·'}
    else if(v===SUNK){cell.classList.add('sunk');cell.textContent='✖'}
    else if(v===DEAD){cell.classList.add('dead');cell.textContent='·'}
    else cell.classList.add('empty');
    // Show hint number on ship cells during placement
    const key = r*10+c;
    if(!isOpponent && v===SHIP && cellSizeMap[key]){
      cell.textContent = cellSizeMap[key];
      cell.style.fontSize = 'clamp(11px,3.2vw,18px)';
      cell.style.fontWeight = '700';
      cell.style.color = 'rgba(255,255,255,0.7)';
    }
    if(isOpponent&&!gameOver&&(v===EMPTY||v===SHIP))cell.classList.add('shootable');
    if(isOpponent&&!gameOver)cell.onclick=()=>handleShot(r,c);
    boardEl.appendChild(cell);
  }
}

async function refreshState(){
  if(!gameCode)return;
  const res=await api('/api/state',{uid:getUid(),code:gameCode});
  if(!res||!res.ok){
    localStorage.removeItem('sb_game');
    gameCode=null;state=null;
    setStatus(t('gameOver'));
    $('ownBoardWrap').style.display='none';
    $('oppBoardWrap').style.display='none';
    $('actions').className='btn-row stack';
    $('actions').innerHTML=`
      <button class="btn primary" onclick="startSolo()">${t('startBtn')}</button>
      <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
    `;
    return
  }
  state=res.state;
  updateUI();
}

function renderShipHint(shipsList, shipsPlaced){
  if(!shipsList){ $('shipHint').innerHTML = ''; return; }
  const remaining = shipsList.slice(shipsPlaced || 0);
  const counts = {};
  remaining.forEach(s => { counts[s] = (counts[s] || 0) + 1; });
  const parts = Object.entries(counts).sort((a,b) => +b[0]- +a[0]);
  const el = $('shipHint');
  if(!parts.length){ el.innerHTML = ''; return; }
  const items = parts.map(([size, count]) =>
    `<span class="ship-item">${count}×${size}</span>`
  ).join('');
  el.innerHTML = t('shipHint').replace('{0}', items);
}

function updateUI(){
  if(!state)return;
  const s=state;
  const gameOver=s.all_sunk||s.my_all_sunk;
  const isPlacing = s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2';
  if(!isPlacing) showShipHints = false;
  $('ownBoardWrap').style.display='block';
  $('oppBoardWrap').style.display='block';
  renderBoard($('ownBoard'),s.own,false,gameOver,s.own_ships,s.strip);
  renderBoard($('oppBoard'),s.opp,true,gameOver,null,s.strip);
  
  $('gameInfo').textContent = s.strip ? '👗 Strip' : '';
  $('header').classList.add('in-game');
  document.title = s.strip ? t('stripTitle') : t('title');
  
  const ownEl=$('ownBoard'), oppEl=$('oppBoard');
  ownEl.classList.remove('my-turn');
  oppEl.classList.remove('my-turn');
  if(s.my_turn){
    oppEl.classList.add('my-turn');
  }else{
    ownEl.classList.add('my-turn');
  }

  if(gameOver){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null}
    localStorage.removeItem('sb_game');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(s.all_sunk)showResult('🏆',t('win'),t('winDesc'),s.strip);
    else if(s.my_all_sunk)showResult('💔',t('lose'),t('loseDesc'),s.strip);
    return;
  }

  if(s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2'){
    $('header').classList.remove('in-game');
    ownEl.classList.remove('my-turn');
    oppEl.classList.remove('my-turn');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(!s.solo){
      const c=s.code;
      setStatus(`📋 <b>${c}</b> — ${t('waitOpp')}`,'');
      $('status').style.cursor='pointer';
      $('status').title=t('copyCode');
      $('status').onclick=()=>navigator.clipboard.writeText(c).then(()=>setStatus('✅ '+c+' '+{ru:'скопирован',uk:'скопійовано',en:'copied'}[lang],''));
    }else{
      setStatus(s.strip ? t('stripPlace') : t('placing'),'');
      $('status').style.cursor='';
      $('status').onclick=null;
    }
    $('oppBoardWrap').style.display='none';
    $('actions').className = 'btn-row stack';
    $('actions').innerHTML=`
      <button class="btn success" onclick="autoPlace()">${t('reroll')}</button>
      ${!s.solo ? `<button class="btn primary" onclick="shareGame()">📤 ${t('inviteFriend')}</button>` : ''}
      <button class="btn primary" onclick="confirmPlace()">${t('confirm')}</button>
      <button class="btn outline" onclick="leaveGame()">${t('quit')}</button>
    `;
    $('themeSelector').style.display='none';
    return;
  }
  $('shipHint').innerHTML = '';

  $('oppBoardWrap').style.display='block';
  $('themeSelector').style.display='flex';
  updateSettingsUI();
  $('ownBoardWrap').after($('status'));

  if(s.my_turn){
    setStatus(t('yourTurn'),'battle');
    $('actions').className='btn-row';
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('surrender')}</button>`;
  }else{
    setStatus(t('oppTurn'),'');
    $('actions').className='btn-row';
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('quit')}</button>`;
  }
}

function copyToClipboard(text, msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      if(msg) setStatus('✅ ' + msg, '');
    }).catch(()=>{ if(msg) setStatus('✅ ' + msg, ''); });
  } else if(msg) {
    setStatus('✅ ' + msg, '');
  }
}

async function handleShot(r,c){
  if(!state||!state.my_turn)return;
  const res=await api('/api/shoot',{uid:getUid(),code:gameCode,r,c});
  if(!res||!res.ok){setStatus(t('errorShot'));return}

  let msg='';
  if(res.result.result==='hit'){msg=t('hit');sfxHit()}
  else if(res.result.result==='sunk'){msg=t('sunk');sfxSunk()}
  else {msg=t('miss');sfxMiss()}

  const bs=res.result.bot_shots;
  if(bs&&bs.length){
    const bn='ABCDEFGHIJ';
    msg+=' 🤖';
    for(const s of bs){
      if(s.result==='hit')msg+=` ${t('botHit')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='sunk')msg+=` ${t('botSunk')} ${bn[s.c]}${s.r+1}`;
      else msg+=` ${t('botMiss')}`;
    }
  }
  await refreshState();
  if(msg)setStatus(msg,'battle');
}

function showResult(icon,title,desc,strip){
  const o=document.createElement('div');
  if(icon==='🏆')sfxWin();else sfxLose();
  o.className='overlay';
  o.id='resultOverlay';
  const playAgainFn = strip ? "startStripMode()" : 'startSolo()';
  const isWin = icon === '🏆';
  const photoHtml = strip && state && state.strip_photo
    ? `<img src="${state.strip_photo}" alt="Strip photo" style="max-width:100%;max-height:260px;border-radius:12px;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,0.3)">`
    : (strip ? '<div id="stripPhotoPending" style="font-size:13px;color:var(--text-muted);margin:8px 0">📸 ' + (isWin
        ? {ru:'Ожидание фото...',uk:'Очікування фото...',en:'Waiting for photo...'}[lang]
        : {ru:'Загрузка фото...',uk:'Завантаження фото...',en:'Loading photo...'}[lang]) + '</div>' : '');
  o.innerHTML=`
    <div class="modal">
      ${strip && isWin && state && state.strip_photo ? `<h2>${title}</h2>` : `<div class="result-icon">${icon}</div><h2>${title}</h2>`}
      <p>${desc}</p>
      ${photoHtml}
      <div id="stripStatus" style="font-size:13px;min-height:20px;margin:4px 0"></div>
      <button class="btn success" style="margin-top:8px" onclick="this.closest('.overlay').remove();${playAgainFn}">${t('playAgain')}</button>
      <button class="btn outline" style="margin-top:8px" onclick="this.closest('.overlay').remove();leaveGame()">${t('quit')}</button>
    </div>`;
  document.body.appendChild(o);

  if(strip && isWin && (!state || !state.strip_photo)){
    if(state && state.solo && window._stripPhotoData){
      showStripPhotoInResult(window._stripPhotoData);
    } else if(!state || !state.solo) {
      pollStripPhotoForWinner();
    }
  }
  
  if(strip && icon==='💔'){
    setTimeout(() => {
      if(window._stripPhotoData){
        showStripPhotoInResult(window._stripPhotoData);
        uploadStripPhotoToGame(window._stripPhotoData);
      } else {
        takeStripPhotoForLose();
      }
    }, 500);
  }
}

function showStripPhotoInResult(photoData){
  const pending = $('stripPhotoPending');
  const modal = document.querySelector('#resultOverlay .modal');
  if(pending){
    pending.outerHTML = `<img src="${photoData}" alt="Strip photo" style="max-width:100%;max-height:260px;border-radius:12px;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,0.3)">`;
  } else if(modal && !modal.querySelector('img')){
    const img = document.createElement('img');
    img.src = photoData;
    img.alt = 'Strip photo';
    img.style.cssText = 'max-width:100%;max-height:260px;border-radius:12px;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,0.3)';
    modal.insertBefore(img, modal.querySelector('#stripStatus'));
  }
}

let _stripPhotoPollTimer = null;

function pollStripPhotoForWinner(){
  if(_stripPhotoPollTimer) clearInterval(_stripPhotoPollTimer);
  _stripPhotoPollTimer = setInterval(async () => {
    if(!gameCode){ clearInterval(_stripPhotoPollTimer); _stripPhotoPollTimer = null; return; }
    const res = await api('/api/state', {uid: getUid(), code: gameCode});
    if(res && res.ok && res.state && res.state.strip_photo){
      clearInterval(_stripPhotoPollTimer);
      _stripPhotoPollTimer = null;
      const pending = $('stripPhotoPending');
      const ri = document.querySelector('#resultOverlay .result-icon');
      if(ri) ri.style.display = 'none';
      if(pending){
        pending.outerHTML = `<img src="${res.state.strip_photo}" alt="Strip photo" style="max-width:100%;max-height:260px;border-radius:12px;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,0.3)">`;
      }
    }
  }, 2000);
}

function takeStripPhotoForLose(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const photoData = ev.target.result;
      window._stripPhotoData = photoData;
      showStripPhotoInResult(photoData);
      uploadStripPhotoToGame(photoData);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function uploadStripPhotoToGame(photoData){
  const res = await api('/api/upload_photo', {
    uid: getUid(),
    code: gameCode,

  if(res && res.ok){
    const st = $('stripStatus');
    if(st) st.textContent = '✅ ' + {ru:'Фото в игре',uk:'Фото в грі',en:'Photo in game'}[lang];
  }
}

function renderYZ(){
  const s = yzState2;
  if(!s){showMainMenu();return}
  document.getElementById('header').classList.add('in-game');
  document.title = t('yzTitle');

  const faces = ['','\u2680','\u2681','\u2682','\u2683','\u2684','\u2685'];
  let diceHtml = '<div style="display:flex;gap:8px;justify-content:center;margin:8px 0">';
  for(let i=0;i<5;i++){
    const v = s.dice[i];
    const held = s.held[i];
    const emoji = faces[v]||'\u2b1c';
    const heldStyle = held ? 'border:3px solid #4fc3f7' : 'border:2px solid var(--border-color)';
    const clickable = (s.my_turn && s.rolls>0 && s.rolls<3 && !s.finished) ? 'cursor:pointer' : '';
    diceHtml += '<div style="width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:10px;background:var(--bg-board);'+heldStyle+';'+clickable+'" onclick="yzToggle2('+i+')">'+emoji+'</div>';
  }
  diceHtml += '</div>';

  const rollBtn = (!s.finished && s.my_turn && s.rolls<3)
    ? '<div class="btn-row" style="justify-content:center;margin:4px 0"><button class="btn primary" onclick="yzRoll2()">\ud83c\udfb2 '+t('yzRoll').replace('{0}',s.rolls)+'</button></div>'
    : '';

  const hintText = (s.rolls>0 && !s.finished && s.my_turn)
    ? '<div style="font-size:12px;color:var(--text-muted);text-align:center;margin:2px 0">\ud83d\udc46 tap a die to hold it</div>'
    : '';

  let statusText = '';
  if(s.finished){
    if(s.solo){
      statusText = '<b>'+t('yzGameOver')+'</b> '+t('yzTotal').replace('{0}',s.total);
    } else {
      if(s.winner == getUid()) statusText = '<b>'+t('yzWin')+'</b>';
      else if(s.winner && s.winner!=getUid()) statusText = '<b>'+t('yzLose')+'</b>';
      else statusText = '<b>'+t('yzDraw')+'</b>';
      statusText += ' '+t('yzMultiEnd').replace('{0}',s.total).replace('{1}',s.opp_total);
    }
  } else if(s.phase==='waiting'){
    statusText = t('yzWaiting');
  } else if(!s.my_turn){
    statusText = '<b>'+t('yzWaitTurn')+'</b>';
  } else {
    statusText = '<b>'+t('yzYourTurn')+'</b>';
  }

  const CATS = ['yzCat0','yzCat1','yzCat2','yzCat3','yzCat4','yzCat5',
    'yzCat6','yzCat7','yzCat8','yzCat9','yzCat10','yzCat11','yzCat12'];
  const CAT_EMOJI = ['1\u20e3','2\u20e3','3\u20e3','4\u20e3','5\u20e3','6\u20e3',
    '\ud83d\udd31','\ud83d\udc51','\ud83c\udfe0','\ud83d\udccf','\ud83d\udcd0','\u2b50','\u2753'];

  const mySc = s.scores||{};
  const possible = s.possible||{};
  const opSc = s.opp_scores||{};

  let scHtml = '<div style="max-height:300px;overflow-y:auto;margin:6px 0"><table style="width:100%;border-collapse:collapse;font-size:13px">';
  scHtml += '<tr style="color:var(--text-muted);font-size:11px"><th style="padding:4px;text-align:left"></th><th style="padding:4px;text-align:center">You</th><th style="padding:4px;text-align:center">Opp</th></tr>';
  for(let catId=0; catId<13; catId++){
    const myVal = mySc[catId];
    const opVal = opSc[catId];
    const canScore = (possible[catId]!==undefined) && !s.finished && s.my_turn;
    const pts = canScore ? possible[catId] : '';
    const bg = canScore ? 'background:var(--color-btn-success-1);cursor:pointer' : (myVal!==undefined ? 'background:var(--bg-board)' : '');
    const click = canScore ? ' onclick="yzScore2('+catId+')"' : '';
    scHtml += '<tr style="'+bg+';border-bottom:1px solid var(--border-color)"'+click+'>';
    scHtml += '<td style="padding:4px 6px;color:var(--text-secondary)">'+CAT_EMOJI[catId]+' '+t(CATS[catId])+'</td>';
    scHtml += '<td style="padding:4px;text-align:center;font-weight:'+(myVal!==undefined?'700':'400')+'">'+
      (myVal!==undefined ? myVal : (canScore ? '<span style="color:#ffd54f">'+pts+'</span>' : '\u2014'))+'</td>';
    scHtml += '<td style="padding:4px;text-align:center">'+(opVal!==undefined ? opVal : '\u2014')+'</td>';
    scHtml += '</tr>';
  }
  scHtml += '<tr style="background:var(--bg-board-alt);border-bottom:1px solid var(--border-color)">';
  scHtml += '<td style="padding:4px 6px;color:var(--text-muted);font-size:11px">'+t('yzUpperBonus')+'</td>';
  scHtml += '<td style="padding:4px;text-align:center">'+(s.upper_bonus||'0')+'</td>';
  scHtml += '<td style="padding:4px;text-align:center">\u2014</td></tr>';
  scHtml += '<tr style="background:var(--accent-primary);color:var(--bg-dark);font-weight:700">';
  scHtml += '<td style="padding:6px">\u03a3</td>';
  scHtml += '<td style="padding:6px;text-align:center">'+s.total+'</td>';
  scHtml += '<td style="padding:6px;text-align:center">'+(s.opp_total||0)+'</td></tr>';
  scHtml += '</table></div>';

  const quitBtn = '<div class="btn-row" style="justify-content:center;margin-top:6px">'+
    '<button class="btn outline" onclick="yzQuit2()">'+t('quit')+'</button></div>';

  document.getElementById('app').innerHTML =
    '<div class="status" id="status">'+statusText+'</div>'+
    '<div style="width:100%;max-width:360px;text-align:center">'+
      diceHtml + hintText + rollBtn + scHtml + quitBtn +
    '</div>';
}

function yzQuit2(){
  yzCode2=null; yzState2=null;
  if(yzPollTimer2){clearInterval(yzPollTimer2);yzPollTimer2=null}
  localStorage.removeItem('sb_game');
  showMainMenu();
}

async function fetchYZActive(){
  const cont = document.getElementById('yzActiveContainer');
  if(!cont)return;
  const res = await api('/api/yz_active',{uid:getUid()});
  if(!res||!res.ok||!res.active){cont.innerHTML='';return}
  const a = res.active;
  if(a.finished)return;
  const label = a.solo ? t('yzSolo') : t('yzFriend');
  const badge = a.my_turn ? '<span class="badge playing">\ud83c\udfb2 '+t('yourTurn')+'</span>' : '<span class="badge">\u23f3</span>';
  cont.innerHTML = '<div class="active-games"><h3>\u25b6 '+t('selectGame')+'</h3>'+
    '<div class="active-game-row" onclick="resumeYZ(\'"+a.code+"\')">'+
      '<div class="info"><span class="label">\ud83c\udfb2 '+t('yzTitle')+'</span> <span class="code">'+a.code+'</span> <span class="label">'+label+'</span></div>'+
      badge+
    '</div></div>';
}

function resumeYZ(code){
  yzCode2 = code;
  yzFetchState2().then(function(){if(yzState2)yzPoll2()});
}

async function fetchActiveGames(){
  const cont=$('activeGamesContainer');
  if(!cont)return;
  const res=await api('/api/active_games',{uid:getUid()});
  if(!res||!res.ok||!res.games||!res.games.length){
    cont.innerHTML='';
    return;
  }
  var html='<div class="active-games"><h3>▶ '+t('selectGame')+'</h3>';
  for(const g of res.games){
    if(g.type==='sea_battle'){
      var label=g.solo?t('vsBot'):t('withFriend');
      var badge=g.phase==='playing'?'<span class="badge playing">🎯 '+t('yourTurn')+'</span>':'<span class="badge">🚢 '+t('placing')+'</span>';
      html+='<div class="active-game-row" onclick="resumeSB(\''+g.code+'\')"><div class="info"><span class="label">⚓ </span><span class="code">'+g.code+'</span> <span class="label">'+label+'</span></div>'+badge+'</div>';
    }

  }
  html+='</div>';
  cont.innerHTML=html;
}

function resumeSB(code){
  showShipHints = true;
  gameCode=code;
  localStorage.setItem('sb_game',code);
  $('actions').innerHTML='';
  refreshState();
  setTimeout(pollGame,500);
}



function tryReconnect(){
  const saved=localStorage.getItem('sb_game');
  if(saved){
    gameCode=saved;
    refreshState();
    setTimeout(pollGame,1000);
    fetchBotInfo();
    return;
  }
  showMenu();
  fetchActiveGames();
  fetchBotInfo().then(() => checkStartParam());
}

async function checkStartParam(){
  try {
    const sp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(!sp) return;
    const code = sp.trim().toUpperCase();
    // Verify the code exists before joining
    const resolveRes = await api('/api/resolve_code', {code});
    if(!resolveRes || !resolveRes.ok){
      setStatus(t('joinError'), '');
      return;
    }
    // Try Sea Battle
    const sbRes = await api('/api/join', {uid: getUid(), code});
    if(sbRes && sbRes.ok){
      showShipHints = true;
      gameCode = code;
      localStorage.setItem('sb_game', code);
      $('actions').innerHTML = '';
      await refreshState();
      pollGame();
      return;
    }
    // Join failed – show error
    setStatus(t('joinError'), '');
  } catch(e){}
}

lang = detectLang();
setLang(lang);
initTheme();
initTG();
tryReconnect();
</script>
