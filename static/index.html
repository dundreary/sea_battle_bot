<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Games</title>
<!-- Preload the 6 menu icons so they start fetching in parallel with the
     HTML/CSS instead of only after showMainMenu() runs and inserts <img>
     tags. This removes the visible "blank then icons pop in" delay. -->
<link rel="preload" as="image" href="/static/sb-navy.svg">
<link rel="preload" as="image" href="/static/pd-green.svg">
<link rel="preload" as="image" href="/static/checkers-icon.svg">
<link rel="preload" as="image" href="/static/backgammon-icon.svg">
<link rel="preload" as="image" href="/static/mode-join.svg">
<link rel="preload" as="image" href="/static/mode-bot.svg">
<link rel="preload" as="image" href="/static/mode-friend.svg">
<link rel="preload" as="image" href="/static/mode-shirt.svg">
<script defer src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/static/style.css?v=__ASSET_VERSION__">
</head>
<body>
<div class="header" id="header" role="banner">
  <div class="header-controls">
    <button class="top-btn" id="stripLockBtn" title="Unlock" onclick="tapStripLock()" style="display:none">🔒</button>
    <span class="player-name" id="playerName"></span>
    <button class="top-btn" onclick="showStats()" title="Stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 9 9h-9z"/><path d="M12 3v9h9A9 9 0 0 0 12 3z"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg></button>
    <button class="top-btn" onclick="showSettings()" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg></button>
    <button class="top-btn" id="helpBtn" onclick="showHelp()" title="Help" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
  </div>
  <div class="sub" id="gameInfo">—</div>
</div>

<div class="main" id="app" role="main">
  <div class="status" id="status">🔱 ...</div>
  <div class="board-wrap hidden" id="ownBoardWrap">
    <div class="board-label" id="lblOwn">🚢</div>
    <div class="board" id="ownBoard"></div>
  </div>
  <div class="board-wrap hidden" id="oppBoardWrap">
    <div class="board-label" id="lblOpp">🎯</div>
    <div class="board" id="oppBoard"></div>
  </div>
  <div id="sbOppHistory" class="pd-opp-history" aria-live="polite"></div>
  <!-- Legend removed per request -->
   <div class="btn-row" id="actions"></div>
    <div id="pdArea" style="display:none">
    <div id="pdScorecardContainer"></div>
    <div class="pd-dice" id="pdDice"></div>
    <div id="pdOppHistory"></div>
    <div class="pd-result" id="pdResult"></div>
    <div class="btn-row" id="pdActions" style="margin-top:14px"></div>
  </div>
  <div id="ckArea" style="display:none">
    <div class="ck-board" id="ckBoard"></div>
    <div class="btn-row" id="ckActions" style="margin-top:14px;min-height:120px"></div>
  </div>
   <div id="bgArea" style="display:none">
     <div id="bgBoard"></div>
    <div class="btn-row" id="bgActions" style="margin-top:14px;min-height:120px"></div>
  </div>
  </div>


<script defer src="/static/poker_dice.js?v=__ASSET_VERSION__"></script>
<script defer src="/static/checkers.js?v=__ASSET_VERSION__"></script>
<script defer src="/static/backgammon.js?v=__ASSET_VERSION__"></script>
<script defer src="/static/common.js?v=__ASSET_VERSION__"></script>
</body>
</html>
