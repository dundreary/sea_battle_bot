:root {

  --border-color: #1a3a5c;

  --accent-primary-alt: #29b6f6;

  --text-secondary: #b0bec5;
  --text-tertiary: #90a4ae;

  --color-ship: #38a169;
  --color-hit: #e53e3e;
  --color-sunk-dark: #1a202c;

  --color-btn-success-2: #2f855a;
  --color-btn-outline-border: #3182ce;
  --color-warning: #ecc94b;
  --color-header-grad-1: #132f4c;
  --color-header-grad-2: #1e3f5a;
}



:root.palette-slate {

  --accent-primary-light: #94a3b8;

  --text-muted: #78909c;

  --text-tertiary: #b1b5c3;

  --color-btn-primary-2: #64748b;

:root.palette-cyber {

  --accent-primary-light: #33ffaa;
  --accent-primary-alt: #00dd77;

  --text-secondary: #00ff88;
  --text-tertiary: #00dd77;
  --text-hint: #00aa55;

  --color-hit: #ff0099;
  --color-sunk-dark: #0a0a0f;
  --color-btn-primary-1: #0099ff;

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background 0.3s ease}
.header{padding:8px 12px;text-align:center;width:100%;background:linear-gradient(135deg,var(--color-header-grad-1),var(--color-header-grad-2))}
.header h1{font-size:18px;letter-spacing:2px;color:var(--accent-primary)}
.header .sub{font-size:11px;color:var(--accent-primary-light)}
.header.in-game{display:none}
.board-label{display:none}
.lang-bar{display:flex;gap:4px;justify-content:center;padding:4px 0}
.lang-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-muted);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;transition:.15s}
.lang-btn.active{background:var(--color-btn-primary-1);border-color:var(--accent-primary);color:#fff}
.main{flex:1;width:100%;max-width:480px;padding:8px 12px 80px;display:flex;flex-direction:column;align-items:center}
.status{text-align:center;padding:6px 0;font-size:14px;color:var(--text-secondary);min-height:28px}
.status.battle{color:var(--color-warning);font-weight:600}
.board-wrap{width:100%;max-width:340px;margin:4px 0}
.board-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:2px 0 4px;text-align:center}
.board{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;aspect-ratio:1;background:var(--bg-board);padding:3px;border-radius:8px;border:1px solid var(--border-color);transition:.3s}
.board.my-turn{animation:pulse-glow 1.5s ease-in-out infinite}
@keyframes pulse-glow{0%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}50%{border-color:var(--accent-primary-alt);box-shadow:0 0 20px rgba(79,195,247,0.8)}100%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}}
.sett-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;cursor:pointer;border-bottom:1px solid var(--border-color);font-size:15px}
.sett-row:last-child{border-bottom:none}
.sett-val{font-size:20px}
.btn-link{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;transition:.15s}
.btn-link:hover{color:var(--accent-primary)}
.cell{border-radius:3px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;transition:.12s;background:var(--bg-board-alt);user-select:none}
.cell:active{transform:scale(.92)}
.cell.empty{background:var(--bg-board-alt)}
.cell.ship{background:var(--color-ship)}
.cell.hit{background:var(--color-hit);animation:pop .3s}
.cell.miss{background:var(--bg-board);opacity:.4}
.cell.sunk{background:var(--color-sunk-dark);border:1px solid #424242}
.cell.dead{background:var(--bg-board);opacity:.4}
.cell.shootable{background:var(--border-color);border:1px solid var(--color-btn-outline-border)}
.cell.shootable:hover{background:var(--bg-board-alt);border-color:var(--accent-primary)}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;width:100%;max-width:340px;margin-top:8px}
.btn{flex:1;min-width:120px;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;text-align:center}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));color:#fff}
.btn.success{background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff}
.btn.outline{background:transparent;border:1px solid var(--color-btn-outline-border);color:var(--accent-primary)}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg-board);border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;border:1px solid var(--border-color)}
.modal h2{font-size:22px;margin-bottom:8px}
.modal p{font-size:14px;color:var(--text-secondary);margin-bottom:16px}
.result-icon{font-size:48px;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;padding:6px 0;font-size:12px;color:var(--text-tertiary)}
.legend span{display:inline-flex;align-items:center;gap:4px}
footer{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;background:var(--bg-dark);text-align:center;font-size:11px;color:var(--text-hint);border-top:1px solid var(--border-color)}

.game-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-top:20px}
.game-card{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border:1px solid var(--border-color);border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:.2s}
.game-card:hover{transform:translateY(-2px);border-color:var(--accent-primary)}
.game-card .icon{font-size:48px;margin-bottom:8px}
.game-card .name{font-size:18px;font-weight:600}
.game-card .card-desc{font-size:12px;color:var(--text-muted);margin-top:4px}
.active-games{width:100%;max-width:340px;margin-bottom:12px}
.active-games h3{font-size:14px;color:var(--accent-primary);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px}
.active-game-row{background:var(--bg-board);border:1px solid var(--border-color);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;transition:.15s}
.active-game-row:hover{border-color:var(--accent-primary)}
.active-game-row .info{font-size:13px}
.active-game-row .info .label{color:var(--text-muted)}
.active-game-row .info .code{color:var(--accent-primary);font-weight:700;letter-spacing:1px}
.active-game-row .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--border-color);color:var(--text-secondary)}
.active-game-row .badge.playing{background:var(--color-btn-success-1);color:#fff}
.ana-letters{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.ana-tile{width:48px;height:48px;background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
.ana-tile:active{transform:scale(.88);opacity:.7}
.ana-word-display{display:flex;gap:6px;justify-content:center;min-height:48px;align-items:center;width:100%;max-width:340px;background:var(--bg-board);border:1px dashed var(--border-color);border-radius:10px;padding:6px;margin:4px 0;flex-wrap:wrap}
.ana-word-display .ana-tile{width:40px;height:40px;font-size:18px;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2))}
.ana-word-display .ana-tile:active{transform:scale(.88);opacity:.7}
.ana-submit-row{display:flex;gap:6px;width:100%;max-width:340px;margin:4px 0}
.ana-submit-row .btn{min-width:unset}
.ana-submit-row .btn:first-child{flex:2}
.ana-submit-row .btn:last-child{flex:0 0 48px;padding:10px;font-size:18px}
.ana-found{width:100%;max-width:340px;margin:8px 0}
.ana-word{display:inline-block;background:var(--bg-board);border:1px solid var(--border-color);border-radius:6px;padding:4px 10px;margin:3px;font-size:14px}
.ana-word span{color:var(--accent-primary);font-weight:700;margin-left:6px}
.ana-info{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:14px;padding:4px 0}
.ana-info .timer{color:var(--color-warning);font-weight:700}
.ana-info .score{color:var(--accent-primary);font-weight:700}
.ana-hint{flex:0!important;min-width:unset!important;padding:10px 16px!important}
.ana-tile.used{background:var(--border-color);opacity:.25;cursor:default;pointer-events:none}
.ana-base-word{text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0 8px;cursor:pointer;user-select:none}
.ana-base-word .revealed{color:var(--accent-primary);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:2px;display:none}
.ana-base-word.show .revealed{display:inline}
.ana-base-word:not(.show)::after{content:' (нажми, чтобы открыть)';font-size:11px;color:var(--text-hint)}

.theme-selector{display:flex;gap:6px;justify-content:center;padding:8px 0;flex-wrap:wrap;width:100%;max-width:340px;margin:8px 0}
.theme-btn{padding:6px 12px;border:2px solid var(--border-color);background:transparent;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:.15s}
.theme-btn:hover{border-color:var(--accent-primary);color:var(--accent-primary)}
.theme-btn.active{background:var(--accent-primary);color:var(--bg-dark);border-color:var(--accent-primary)}

</style>

<div class="header" id="header">
  <h1 id="title">⚓ МОРСКОЙ БОЙ</h1>
  <div class="lang-bar" id="langBar">
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('uk')">UA</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <div class="sub" id="gameInfo">—</div>
</div>

<div class="main" id="app">
  <div class="status" id="status">🔱 ...</div>
  <div class="board-wrap" id="ownBoardWrap" style="display:none">
    <div class="board-label" id="lblOwn">🚢</div>
    <div class="board" id="ownBoard"></div>
  </div>
  <div class="board-wrap" id="oppBoardWrap" style="display:none">
    <div class="board-label" id="lblOpp">🎯</div>

  <div class="legend" id="legend" style="display:none">

    <span>· <span id="legMiss"></span></span>
    <span>✖ <span id="legSunk"></span></span>
  </div>
  <div class="theme-selector" id="themeSelector" style="display:none">
    <button class="theme-btn active" data-theme="ocean" onclick="setTheme('ocean')">🌊 Ocean</button>
    <button class="theme-btn" data-theme="slate" onclick="setTheme('slate')">⛳ Slate</button>
    <button class="theme-btn" data-theme="cyber" onclick="setTheme('cyber')">⚡ Cyber</button>
  </div>
  <div class="btn-row" id="actions"></div>
  <div id="anaArea" style="display:none">
    <div class="ana-info">
      <span class="timer" id="anaTimer">60</span>
      <span class="score" id="anaScore">0</span>
    </div>
    <div class="ana-base-word" id="anaBaseWord" onclick="this.classList.toggle('show')">
      Основное слово: <span class="revealed" id="anaBaseWordVal"></span>
    </div>
    <div class="ana-letters" id="anaLetters"></div>
    <div class="ana-word-display" id="anaWordDisplay"></div>
    <div class="ana-submit-row">
      <button class="btn primary" onclick="anaSubmitWord()">OK</button>
      <button class="btn outline" onclick="anaBackspace()">⌫</button>
    </div>
    <div class="ana-found" id="anaFound"></div>
  </div>
</div>
<footer>🎮 Games</footer>

function $(id){return document.getElementById(id)}

let _actx=null;
function actx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx}
function tone(f,d,t='sine',v=0.15){if(!_snd)return;try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function haptic(s){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.impactOccurred(s)}catch(e){}}
function hapticN(t){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.notificationOccurred(t)}catch(e){}}
function sfxHit(){tone(800,0.08,'square',0.12);haptic('medium')}
function sfxMiss(){tone(200,0.12,'sine',0.08);haptic('light')}
function sfxSunk(){tone(500,0.15,'square',0.1);setTimeout(()=>tone(300,0.15,'square',0.1),100);setTimeout(()=>tone(150,0.2,'square',0.1),200);haptic('heavy')}
function sfxPlace(){tone(400,0.04,'sine',0.06);haptic('light')}
function sfxWin(){tone(523,0.15,'sine',0.1);setTimeout(()=>tone(659,0.15,'sine',0.1),150);setTimeout(()=>tone(784,0.3,'sine',0.1),300);hapticN('success')}
function sfxLose(){tone(400,0.2,'sine',0.08);setTimeout(()=>tone(300,0.2,'sine',0.08),200);setTimeout(()=>tone(200,0.4,'sine',0.08),400);hapticN('error')}
function sfxChime(){tone(1000,0.25,'sine',0.12);haptic('medium')}
function sfxClick(){tone(600,0.02,'sine',0.04);haptic('light')}
function sfxTick(){tone(1200,0.04,'sine',0.06)}

function setTheme(themeName){

  btns.forEach(btn => {

    if(btn.dataset.theme === themeName) btn.classList.add('active');

function detectLang(){
  try{
    const tg = window.Telegram.WebApp.initDataUnsafe?.user?.language_code || 'ru';
    if(tg.startsWith('uk'))return 'uk';
  }catch(e){}
  const nav = (navigator.language || '').slice(0,2);
  if(nav==='uk')return'uk';
  if(nav==='en')return'en';
  return localStorage.getItem('sb_lang')||'ru';
}

function t(key, ...args){
  let s = LANG[lang][key] || LANG.ru[key] || key;
  if(args.length) s = s.replace('{0}', args[0]).replace('{1}', args[1]);
  return s;
}

async function api(method,data){

    const r=await fetch(API+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return await r.json()

}

function renderBoard(boardEl,grid,isOpponent,gameOver){
  boardEl.innerHTML='';
  const EMPTY=0,SHIP=1,HIT=2,MISS=3,SUNK=4,DEAD=5;
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=document.createElement('div');
    const v=grid[r*10+c];
    cell.className='cell';
    if(v===EMPTY||v===SHIP){cell.classList.add('empty');if(v===SHIP)cell.classList.add('ship')}
    else if(v===HIT){cell.classList.add('hit');cell.textContent='❌'}
    else if(v===MISS){cell.classList.add('miss');cell.textContent='·'}
    else if(v===SUNK){cell.classList.add('sunk');cell.textContent='✖'}
    else if(v===DEAD){cell.classList.add('dead');cell.textContent='·'}
    else cell.classList.add('empty');
    if(isOpponent&&!gameOver&&(v===EMPTY||v===SHIP))cell.classList.add('shootable');
    if(isOpponent&&!gameOver)cell.onclick=()=>handleShot(r,c);
    boardEl.appendChild(cell);
  }
}

async function refreshState(){
  if(!gameCode)return;
  const res=await api('/api/state',{uid:getUid(),code:gameCode});
  if(!res||!res.ok){
    localStorage.removeItem('sb_game');
    setStatus(t('gameOver'));
    $('actions').innerHTML=`<button class="btn primary" onclick="startSolo()">${t('startBtn')}</button>`;
    return
  }
  state=res.state;
  updateUI();
}

function updateUI(){
  if(!state)return;
  const s=state;
  const gameOver=s.all_sunk||s.my_all_sunk;
  $('ownBoardWrap').style.display='block';
  $('oppBoardWrap').style.display='block';
  renderBoard($('ownBoard'),s.own,false,gameOver);
  renderBoard($('oppBoard'),s.opp,true,gameOver);
  
  $('gameInfo').textContent = '';
  $('header').classList.add('in-game');
  
  const ownEl=$('ownBoard'), oppEl=$('oppBoard');
  ownEl.classList.remove('my-turn');
  oppEl.classList.remove('my-turn');
  if(s.my_turn){
    oppEl.classList.add('my-turn');
  }else{
    ownEl.classList.add('my-turn');
  }

  if(gameOver){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null}
    localStorage.removeItem('sb_game');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(s.all_sunk)showResult('🏆',t('win'),t('winDesc'));
    else if(s.my_all_sunk)showResult('💔',t('lose'),t('loseDesc'));
    return;
  }

  if(s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2'){
    $('header').classList.remove('in-game');
    ownEl.classList.remove('my-turn');
    oppEl.classList.remove('my-turn');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(!s.solo){
      setStatus(`📋 <b>${s.code}</b> — ${t('waitOpp')}`,'');
    }else{
      setStatus(t('placing'),'');
    }
    $('actions').innerHTML=`
      ${!s.solo ? `<button class="btn primary" onclick="shareGame()">📤 ${t('inviteFriend')}</button>` : ''}
      <button class="btn success" onclick="autoPlace()">${t('reroll')}</button>
      <button class="btn primary" onclick="confirmPlace()">${t('confirm')}</button>
      <button class="btn outline" onclick="leaveGame()">${t('quit')}</button>
    `;
    $('oppBoardWrap').style.display='none';
    $('legend').style.display='none';
    $('themeSelector').style.display='none';
    return;
  }

  $('legend').style.display='flex';
  $('oppBoardWrap').style.display='block';
  $('themeSelector').style.display='flex';
  $('ownBoardWrap').after($('status'));

  if(s.my_turn){
    setStatus(t('yourTurn'),'battle');
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('surrender')}</button>`;
  }else{
    setStatus(t('oppTurn'),'');
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('quit')}</button>`;
  }
}

function copyToClipboard(text, msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      if(msg) setStatus('✅ ' + msg, '');
    }).catch(()=>{ if(msg) setStatus('✅ ' + msg, ''); });
  } else if(msg) {
    setStatus('✅ ' + msg, '');
  }
}

async function handleShot(r,c){
  if(!state||!state.my_turn)return;
  const res=await api('/api/shoot',{uid:getUid(),code:gameCode,r,c});
  if(!res||!res.ok){setStatus(t('errorShot'));return}

  let msg='';
  if(res.result.result==='hit'){msg=t('hit');sfxHit()}
  else if(res.result.result==='sunk'){msg=t('sunk');sfxSunk()}
  else {msg=t('miss');sfxMiss()}

  const bs=res.result.bot_shots;
  if(bs&&bs.length){
    const bn='ABCDEFGHIJ';
    msg+=' 🤖';
    for(const s of bs){
      if(s.result==='hit')msg+=` ${t('botHit')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='sunk')msg+=` ${t('botSunk')} ${bn[s.c]}${s.r+1}`;
      else msg+=` ${t('botMiss')}`;
    }
  }
  await refreshState();
  if(msg)setStatus(msg,'battle');
}

function anaTick(){
  if(!anaSid)return;
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
    if(!res||!res.ok){clearInterval(anaTimer);anaTimer=null;return}
    if(res.state.remaining<=10&&res.state.remaining>0)sfxTick();
    anaRender(res.state);
    if(res.state.finished){
      clearInterval(anaTimer);anaTimer=null;
      sfxWin();
      $('actions').innerHTML=`
        <button class="btn success" onclick="anaStartSolo()">${t('anaPlayAgain')}</button>
        <button class="btn outline" onclick="showMenu()">${t('close')}</button>
      `;
    }
  });
}

function anaTileClick(idx){
  if(idx<0||idx>=anaLetters.length||anaUsed.has(idx))return;
  anaUsed.add(idx);
  anaCurrentWord.push({letter:anaLetters[idx], idx});
  anaRenderWord();
}

function anaWordClick(idx){
  if(idx<0||idx>=anaCurrentWord.length)return;
  const {idx:origIdx} = anaCurrentWord[idx];
  anaUsed.delete(origIdx);
  anaCurrentWord.splice(idx,1);
  anaRenderWord();
}

function anaClearWord(){
  anaUsed = new Set();
  anaCurrentWord = [];
  anaRenderWord();
}

function anaBackspace(){
  if(!anaCurrentWord.length)return;
  const {idx:origIdx} = anaCurrentWord.pop();
  anaUsed.delete(origIdx);
  anaRenderWord();
}

function anaRenderWord(){
  $('anaLetters').innerHTML=anaLetters.map((l,i)=>`<div class="ana-tile${anaUsed.has(i)?' used':''}" onclick="anaTileClick(${i})">${l}</div>`).join('');
  $('anaWordDisplay').innerHTML=anaCurrentWord.length
    ? anaCurrentWord.map((o,i)=>`<div class="ana-tile" onclick="anaWordClick(${i})">${o.letter}</div>`).join('')
    : '<span style="color:#546e7a;font-size:13px">'+t('anaPlaceholder')+'</span>';
}

function anaRender(st){
  $('anaTimer').textContent=st.remaining;
  $('anaScore').textContent=st.score;
  if(st.base_word)$('anaBaseWordVal').textContent=st.base_word;
  if(!st.finished && st.letters.toUpperCase().split('').join('') !== anaLetters.join('')){
    anaLetters = st.letters.toUpperCase().split('');
    anaUsed = new Set();
    anaCurrentWord = [];
  }
  anaRenderWord();
  const found=st.found||[];
  $('anaFound').innerHTML=found.length
    ? '<div style="color:#78909c;font-size:12px;margin-bottom:4px">'+t('anaFound').replace('{}',found.length)+'</div>'+found.map(w=>`<div class="ana-word">${w}<span>+${100*Math.max(0,(w.length-2))**2}</span></div>`).join('')
    : '';
  if(!st.finished){
    let ah = `
      <button class="btn outline ana-hint" onclick="anaGetHint()">${t('anaHint')}</button>
      <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
    `;
    if(!st.solo){
      ah = `
        <button class="btn primary" onclick="shareAnaGame()">📤 ${t('inviteFriend')}</button>
        <button class="btn outline ana-hint" onclick="anaGetHint()">${t('anaHint')}</button>
        <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
      `;
    }
    $('actions').innerHTML = ah;
  }else{
    setStatus(t('anaOver').replace('{}',st.score),'battle');
    if(st.total_words){
      $('anaFound').innerHTML+='<div style="color:#78909c;font-size:12px;margin:8px 0">'+t('anaAllWords').replace('{}',st.total_words)+'</div>';
    }
  }
}

async function anaSubmitWord(){
  const word = anaCurrentWord.map(o=>o.letter).join('').toLowerCase();
  anaUsed = new Set();
  anaCurrentWord = [];
  anaRenderWord();
  if(word.length<3){setStatus('⚠️ min 3 letters','');return}
  const res=await api('/api/ana_guess',{uid:getUid(),sid:anaSid,word});
  if(!res)return;
  if(!res.ok){
    const err=res.error;
    if(err==='duplicate')setStatus('⚠️ '+word+' already found','');
    else if(err==='not_a_word')setStatus('⚠️ '+word+' not a word','');
    else if(err==='length')setStatus('⚠️ 3-6 letters','');
    else setStatus('⚠️ Error','');
    return;
  }
  setStatus('✅ '+word+' +'+res.result.score,'');
  sfxChime();
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(r=>{if(r&&r.ok)anaRender(r.state)});
}

async function anaGetHint(){
  const res=await api('/api/ana_hint',{uid:getUid(),sid:anaSid});
  if(!res||!res.ok){setStatus('⚠️ No more hints','');return}
  setStatus('💡 '+res.result.word+' (-200)','');
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(r=>{if(r&&r.ok)anaRender(r.state)});
}

async function fetchActiveGames(){
  const cont=$('activeGamesContainer');
  if(!cont)return;
  const res=await api('/api/active_games',{uid:getUid()});
  if(!res||!res.ok||!res.games||!res.games.length){
    cont.innerHTML='';
    return;
  }
  var html='<div class="active-games"><h3>▶ '+t('selectGame')+'</h3>';
  for(const g of res.games){
    if(g.type==='sea_battle'){
      var label=g.solo?t('vsBot'):t('withFriend');
      var badge=g.phase==='playing'?'<span class="badge playing">🎯 '+t('yourTurn')+'</span>':'<span class="badge">🚢 '+t('placing')+'</span>';
      html+='<div class="active-game-row" onclick="resumeSB(\''+g.code+'\')"><div class="info"><span class="label">⚓ </span><span class="code">'+g.code+'</span> <span class="label">'+label+'</span></div>'+badge+'</div>';
    }else if(g.type==='anagram'){
      var fin=g.finished?'<span class="badge">✅ '+t('anaOver').replace('{}',g.score)+'</span>':'<span class="badge playing">🔤 '+t('yourTurn')+'</span>';
      html+='<div class="active-game-row" onclick="resumeAna(\''+g.code+'\')"><div class="info"><span class="label">🔤 </span><span class="code">'+g.code+'</span></div>'+fin+'</div>';
    }
  }
  html+='</div>';
  cont.innerHTML=html;
}

function resumeSB(code){
  gameCode=code;
  localStorage.setItem('sb_game',code);
  $('actions').innerHTML='';
  refreshState();
  setTimeout(pollGame,500);
}

function resumeAna(code){
  // Try to find existing ana_sid for this code from local storage, or rejoin
  var sid=localStorage.getItem('ana_sid');
  if(sid){
    anaSid=sid;
    $('actions').innerHTML='';
    api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
      if(res&&res.ok){anaShowGame(res.state)}else{anaJoin(code)}
    });
  }else{
    anaJoin(code);
  }
}

function tryReconnect(){
  const saved=localStorage.getItem('sb_game');
  const savedAna=localStorage.getItem('ana_sid');
  fetchBotInfo();
  if(saved){
    gameCode=saved;
    refreshState();
    setTimeout(pollGame,1000);
    return;
  }
  if(savedAna){
    anaSid=savedAna;
    api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
      if(res&&res.ok){
        anaShowGame(res.state);
      }else{
        localStorage.removeItem('ana_sid');
        localStorage.removeItem('ana_code');
        showMenu();
      }
    });
    return;
  }
  showMenu();
  fetchActiveGames();
  checkStartParam();
}

async function checkStartParam(){
  try {
    const sp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(sp){
      const code = sp.trim().toUpperCase();
      // Try join as Anagram first
      const anaRes = await api('/api/ana_join', {uid: getUid(), code});
      if(anaRes && anaRes.ok){
        anaSid = anaRes.sid;
        localStorage.setItem('ana_sid', anaSid);
        localStorage.setItem('ana_code', code);
        $('actions').innerHTML = '';
        anaShowGame(anaRes.state);
        return;
      }
      // Try Sea Battle
      const sbRes = await api('/api/join', {uid: getUid(), code});
      if(sbRes && sbRes.ok){
        gameCode = code;
        localStorage.setItem('sb_game', code);
        $('actions').innerHTML = '';
        await refreshState();
        pollGame();
        return;
      }
    }
  } catch(e){}
}

lang = detectLang();
setLang(lang);
initTheme();
initTG();
tryReconnect();
</script>
</body>
</html>
