<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<!-- Preload the 6 menu icons so they start fetching in parallel with the
     HTML/CSS instead of only after showMainMenu() runs and inserts <img>
     tags. This removes the visible "blank then icons pop in" delay. -->
<link rel="preload" as="image" href="/static/sb-navy.svg">
<link rel="preload" as="image" href="/static/pd-green.svg">
<link rel="preload" as="image" href="/static/checkers-icon.svg">
<link rel="preload" as="image" href="/static/backgammon-icon.svg">
<link rel="preload" as="image" href="/static/mode-join.svg">
<link rel="preload" as="image" href="/static/mode-bot.svg">
<link rel="preload" as="image" href="/static/mode-friend.svg">
<link rel="preload" as="image" href="/static/mode-shirt.svg">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-dark: #0a1628;
  --bg-board: #0d1f3c;
  --bg-board-alt: #162d50;
  --border-color: #1a3a5c;
  --accent-primary: #4fc3f7;
  --accent-primary-light: #80deea;
  --accent-primary-alt: #29b6f6;
  --text-muted: #78909c;
  --text-secondary: #b0bec5;
  --text-tertiary: #90a4ae;
  --text-hint: #546e7a;
  --color-ship: #2e7d32;
  --color-hit: #c62828;
  --color-sunk-dark: #1a1a1a;
  --color-btn-primary-1: #1565c0;
  --color-btn-primary-2: #1976d2;
  --color-btn-success-1: #2e7d32;
  --color-btn-success-2: #388e3c;
  --color-btn-outline-border: #2962ff;
  --color-warning: #ffd54f;
  --color-header-grad-1: #0d1f3c;
  --color-header-grad-2: #162d50;
}

:root.palette-ocean {
  --bg-dark: #0f1f30;
  --bg-board: #162e48;
  --bg-board-alt: #1f3d56;
  --border-color: #345575;
  --accent-primary: #4a7fa0;
  --accent-primary-light: #6a9db8;
  --accent-primary-alt: #3d6d8c;
  --text-muted: #6b7d8a;
  --text-secondary: #acb5bc;
  --text-tertiary: #95a0a8;
  --text-hint: #576672;
  --color-ship: #3d7d50;
  --color-hit: #b04040;
  --color-sunk-dark: #1c2328;
  --color-btn-primary-1: #3d6b8a;
  --color-btn-primary-2: #345a78;
  --color-btn-success-1: #3d7d50;
  --color-btn-success-2: #336b44;
  --color-btn-outline-border: #3d6d8c;
  --color-warning: #b89448;
  --color-header-grad-1: #162e48;
  --color-header-grad-2: #1f3d56;
}

:root.palette-forest {
  --bg-dark: #0d1117;
  --bg-board: #1a1a2e;
  --bg-board-alt: #16242e;
  --border-color: #1a3a2a;
  --accent-primary: #00d084;
  --accent-primary-light: #4ae0a0;
  --accent-primary-alt: #00b873;
  --text-muted: #6b8a7a;
  --text-secondary: #a8c4b4;
  --text-tertiary: #8aa898;
  --text-hint: #4d6656;
  --color-ship: #2d5a3d;
  --color-hit: #ff4757;
  --color-sunk-dark: #0a0f0a;
  --color-btn-primary-1: #1a5a3a;
  --color-btn-primary-2: #20754a;
  --color-btn-success-1: #2d7d50;
  --color-btn-success-2: #23914a;
  --color-btn-outline-border: #00d084;
  --color-warning: #ffa502;
  --color-header-grad-1: #1a1a2e;
  --color-header-grad-2: #16242e;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background 0.3s ease}
.header{padding:8px 12px;text-align:center;width:100%;background:linear-gradient(135deg,var(--color-header-grad-1),var(--color-header-grad-2))}
.header .sub{font-size:11px;color:var(--accent-primary-light)}
.header.in-game{display:none}
.board-label{display:none}
.lang-bar{display:flex;gap:4px;justify-content:center;padding:4px 0}
.lang-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-muted);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:.15s}
.lang-btn.active{background:var(--color-btn-primary-1);border-color:var(--accent-primary);color:#fff}
.main{flex:1;width:100%;max-width:480px;padding:8px 12px 80px;display:flex;flex-direction:column;align-items:center}
.status{text-align:center;padding:6px 0;font-size:14px;color:var(--text-secondary);min-height:28px}
.status.battle{color:var(--color-warning);font-weight:600}
.result-notice{width:100%;padding:14px;border-radius:10px;text-align:center;font-size:16px;font-weight:700;border:1px solid var(--border-color)}
.result-notice.win{background:rgba(76,175,80,.18);color:#81c784;border-color:#4caf50}
.result-notice.lose{background:rgba(229,57,53,.16);color:#ef9a9a;border-color:#e53935}
.board-wrap{width:100%;max-width:340px;margin:4px 0}
.board-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:2px 0 4px;text-align:center}
.board{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);gap:1px;width:100%;aspect-ratio:1;background:var(--bg-board);padding:2px;border-radius:8px;border:1px solid var(--border-color)}
.board.my-turn{animation:pulse-glow 1.5s ease-in-out infinite}
@keyframes pulse-glow{0%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}50%{border-color:var(--accent-primary-alt);box-shadow:0 0 20px rgba(79,195,247,0.8)}100%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}}
.sett-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;cursor:pointer;border-bottom:1px solid var(--border-color);font-size:15px}
.sett-row:last-child{border-bottom:none}
.sett-val{font-size:20px}
.btn-link{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;transition:.15s}
.btn-link:hover{color:var(--accent-primary)}
.cell{border-radius:2px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;transition:background .12s;background:var(--bg-board-alt);user-select:none}
   .cell.empty{background:var(--bg-board-alt)}
 .cell.ship{background:var(--color-ship)}
  .cell.strip-ship{background:#e91e63;border-radius:4px}
  .cell.mine{background:#ff9800;border-radius:4px;position:relative}
  .cell.mine::after{content:'💣';position:absolute;font-size:clamp(12px,3.5vw,20px);top:50%;left:50%;transform:translate(-50%,-50%)}
 .cell.hit{background:var(--color-hit)}
 .cell.miss{background:var(--bg-board);opacity:.4}
 .cell.sunk{background:var(--color-sunk-dark);border:1px solid #424242}
 .cell.dead{background:var(--bg-board);opacity:.4}
 .cell.highlight{background:#ff9800;border:2px solid #ff6f00;animation:glow 1s ease-in-out infinite}
.cell.shootable{background:var(--border-color);border:1px solid var(--color-btn-outline-border)}
/* On touch screens :hover can remain on the last tapped cell, making it look selected. */
@media (hover:hover) and (pointer:fine){
  .cell.shootable:hover{background:var(--bg-board-alt);border-color:var(--accent-primary)}
}
 @keyframes glow{0%{box-shadow:0 0 8px rgba(255,152,0,0.6)}50%{box-shadow:0 0 20px rgba(255,152,0,0.9)}100%{box-shadow:0 0 8px rgba(255,152,0,0.6)}}
 .btn-row{display:flex;flex-wrap:wrap;gap:4px;width:100%;max-width:340px;margin-top:8px}
.btn-row.stack{flex-direction:column;gap:8px}
.btn-row.stack .btn{padding:16px 12px;font-size:16px}
.btn-col{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;margin-top:8px}
.btn{flex:1 1 0;min-width:0;padding:12px 8px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-icon{width:20px;height:20px;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));color:#fff}
  .btn.success{background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff}
  .btn.outline{background:transparent;border:1px solid var(--color-btn-outline-border);color:var(--accent-primary)}
  .btn.danger{background:transparent;border:1px solid #e53935;color:#e53935}
  .btn.strip-btn{background:linear-gradient(135deg,#e91e63,#d81b60);color:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(233,30,99,0.3)}
  .btn.quit-btn{background:transparent;border:1px solid #c62828;color:#c62828}
  .btn.quit-btn:hover{background:#c62828;color:#fff;transition:all 0.2s}
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:var(--bg-board);border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;border:1px solid var(--border-color)}
  .modal h2{font-size:22px;margin-bottom:8px}
  .modal p{font-size:14px;color:var(--text-secondary);margin-bottom:16px}
  .result-icon{font-size:48px;margin-bottom:8px}
  .legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;padding:6px 0;font-size:12px;color:var(--text-tertiary)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .ship-hint{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:6px 0;font-size:13px;color:var(--accent-primary-light);width:100%;max-width:340px}
  .ship-hint .ship-item{display:inline-flex;align-items:center;gap:4px;background:var(--bg-board-alt);padding:4px 10px;border-radius:6px;border:1px solid var(--border-color)}
  footer{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;background:var(--bg-dark);text-align:center;font-size:11px;color:var(--text-hint);border-top:1px solid var(--border-color)}

.game-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-top:20px}
.game-card{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border:1px solid var(--border-color);border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:.2s}
.game-card:hover{transform:translateY(-2px);border-color:var(--accent-primary)}
.game-card .icon{font-size:48px;margin-bottom:8px}
.game-card .card-icon{width:64px;height:64px;display:block;margin:0 auto 8px}
.game-card .card-icon-wide{width:100%;height:120px;display:block;margin:0 auto 8px}
.game-card .name{font-size:18px;font-weight:600}
.game-card .card-desc{font-size:12px;color:var(--text-muted);margin-top:4px}
.active-games{width:100%;max-width:340px;margin-bottom:12px}
.active-games h3{font-size:14px;color:var(--accent-primary);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px}
.active-game-row{background:var(--bg-board);border:1px solid var(--border-color);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;transition:.15s}
.active-game-row:hover{border-color:var(--accent-primary)}
.active-game-row .info{font-size:13px}
.active-game-row .info .label{color:var(--text-muted)}
.active-game-row .info .code{color:var(--accent-primary);font-weight:700;letter-spacing:1px}
.active-game-row .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--border-color);color:var(--text-secondary)}
.active-game-row .badge.playing{background:var(--color-btn-success-1);color:#fff}
.ana-letters{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.ana-tile{width:54px;height:54px;background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
.ana-tile:active{transform:scale(.88);opacity:.7}
.ana-word-display{display:flex;gap:6px;justify-content:center;min-height:48px;align-items:center;width:100%;max-width:340px;background:var(--bg-board);border:1px dashed var(--border-color);border-radius:10px;padding:6px;margin:4px 0;flex-wrap:wrap}
.ana-word-display .ana-tile{width:46px;height:46px;font-size:20px;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2))}
.ana-word-display .ana-tile:active{transform:scale(.88);opacity:.7}
.ana-submit-row{display:flex;gap:6px;width:100%;max-width:340px;margin:4px 0}
.ana-submit-row .btn{min-width:unset}
.ana-submit-row .btn:first-child{flex:2}
.ana-submit-row .btn:last-child{flex:0 0 48px;padding:10px;font-size:18px}
.ana-found{width:100%;max-width:340px;margin:8px 0}
.ana-word{display:inline-block;background:var(--bg-board);border:1px solid var(--border-color);border-radius:6px;padding:4px 10px;margin:3px;font-size:14px}
.ana-word span{color:var(--accent-primary);font-weight:700;margin-left:6px}
.ana-info{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:14px;padding:4px 0}
.ana-info .timer{color:var(--color-warning);font-weight:700}
.ana-info .score{color:var(--accent-primary);font-weight:700}
.ana-hint{flex:0!important;min-width:unset!important;padding:10px 16px!important}
.ana-tile.used{background:var(--border-color);opacity:.25;cursor:default;pointer-events:none}
.ana-base-word{text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0 8px;cursor:pointer;user-select:none}
.ana-base-word .revealed{color:var(--accent-primary);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:2px;display:none}
.ana-base-word.show .revealed{display:inline}

.pd-dice{display:flex;gap:8px;justify-content:center;margin:18px auto;flex-wrap:wrap;align-items:center;min-height:min(70px,18vw);width:100%;max-width:340px}
.pd-dot-die{width:min(52px,14vw);height:min(52px,14vw);aspect-ratio:1;flex-shrink:0;box-sizing:border-box;background:var(--bg-board-alt);border-radius:10px;display:grid;grid-template-rows:1fr 1fr 1fr;grid-template-columns:1fr 1fr 1fr;padding:0;cursor:pointer;transition:.12s;user-select:none;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.pd-dot-die .dot{width:9px;height:9px;background:var(--accent-primary-light);border-radius:50%;justify-self:center;align-self:center}
.pd-dot-die:hover{transform:scale(1.08)}
.pd-dot-die.kept{box-shadow:0 0 0 3px #ffd700,0 0 10px rgba(255,215,0,.35);background:var(--color-btn-primary-1)}
.pd-dot-die.discarded{opacity:.38;filter:grayscale(.6)}
.pd-dot-die.discarded::after{content:'↺';position:absolute;top:-8px;right:-4px;font-size:13px;line-height:1;color:var(--color-miss,#7fd)}
.pd-opp-history{margin:6px auto 4px;width:100%;max-width:340px;text-align:center}
.pd-opp-history-title{font-size:12px;font-weight:700;color:var(--text-hint);margin:8px 0 4px;letter-spacing:.3px;text-transform:uppercase}
.pd-opp-history-row{margin:6px 0}
.pd-opp-history-label{font-size:11px;color:var(--text-hint);margin-bottom:3px}
.pd-opp-history-dice{margin:2px auto;min-height:0;width:100%;max-width:340px}
.pd-dot-die:active{transform:scale(.88)}
@keyframes pd-roll-spin{0%{transform:rotate(0deg)}25%{transform:rotate(180deg)}50%{transform:rotate(360deg)}75%{transform:rotate(540deg)}100%{transform:rotate(720deg)}}
.pd-dot-die.rolling{animation:pd-roll-spin 1.2s ease-out}
.pd-roll-btn{width:min(52px,14vw);height:min(52px,14vw);aspect-ratio:1;flex-shrink:0;border:none;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff;border-radius:10px;font-size:clamp(16px,4.5vw,22px);font-weight:700;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;user-select:none;box-shadow:0 2px 6px rgba(46,125,50,.3)}
#pdActions{min-height:120px}
.pd-theme-bar{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--border-color);width:100%;flex-wrap:wrap}
#pdScorecardContainer{min-height:420px;text-align:center;width:100%;max-width:340px;margin:0 auto}
#pdScorecardContainer:empty{min-height:0}
.pd-roll-btn:active{transform:scale(.88)}
.pd-roll-btn .count{font-size:9px;opacity:.8;position:absolute;bottom:4px;right:6px;font-weight:400}

.pd-round{text-align:center;font-size:13px;color:var(--accent-primary);font-weight:700;margin:4px 0}
.pd-scorecard{width:100%;max-width:340px;margin:8px auto;border-collapse:collapse;font-size:13px}
.pd-scorecard th{padding:5px;border-bottom:1px solid var(--border-color);font-weight:600}
.pd-scorecard th.cat-name{color:var(--accent-primary-light);text-align:left}
.pd-scorecard th.cat-score{color:var(--text-muted);text-align:center;width:40px}
.pd-scorecard td{padding:5px;border-bottom:1px solid var(--border-color);text-align:center}
.pd-scorecard td.cat-name{text-align:left;color:var(--text-secondary)}
.pd-scorecard td.cat-score{color:var(--accent-primary);font-weight:600}
.pd-scorecard tr.used td.cat-name{color:var(--text-muted)}
.pd-scorecard tr.used td.cat-score{color:var(--text-tertiary)}
.pd-scorecard tr.available{cursor:pointer}
.pd-scorecard tr.available:hover{background:var(--bg-board-alt)}
.pd-scorecard tr.available td.cat-name{color:#fff}
.pd-scorecard tr.section-divider td{border-bottom:2px solid var(--accent-primary);padding:0}
.pd-scorecard tr.bonus-row td{color:var(--color-warning);font-weight:600;font-size:12px}
.pd-scorecard tr.total-row td{font-weight:700;color:#fff;border-top:2px solid var(--accent-primary);font-size:14px;padding:4px 6px}
.pd-scorecard tr.total-row.win td{color:#66BB6A}
.pd-scorecard tr.total-row.lose td{color:#EF5350}
.pd-scoreboard{width:100%;max-width:340px;margin:8px 0;border-collapse:collapse;font-size:12px}
.pd-scoreboard th{color:var(--text-muted);padding:4px 6px;border-bottom:1px solid var(--border-color);font-weight:600}
.pd-scoreboard td{text-align:center;padding:4px 6px;border-bottom:1px solid var(--border-color);color:var(--text-secondary)}
.pd-scoreboard .r-win td{color:#66BB6A;font-weight:600}
.pd-scoreboard .r-lose td{color:#EF5350}
.pd-scoreboard .r-draw td{color:var(--color-warning)}
.pd-scoreboard .total-row td{font-weight:700;color:#fff;border-top:2px solid var(--accent-primary);font-size:14px;padding:4px 6px}
.pd-scoreboard .total-row.win td{color:#66BB6A}
.pd-scoreboard .total-row.lose td{color:#EF5350}

.pd-result{width:100%;max-width:340px;text-align:center;padding:8px;margin:8px 0;background:var(--bg-board);border-radius:10px;border:1px solid var(--border-color)}
.pd-result:empty{display:none;padding:0;margin:0;border:none}
#pdResult{max-width:100%;background:none;border:none;padding:0;margin:0}
.pd-result .hand-name{font-size:18px;font-weight:700;color:var(--accent-primary)}
.pd-result .hand-score{font-size:14px;color:var(--text-secondary)}
.pd-opponent{width:100%;max-width:340px;text-align:center;padding:8px;margin:8px 0;background:var(--bg-board);border-radius:10px;border:1px solid var(--border-color)}
.pd-opponent:empty{display:none;padding:0;margin:0;border:none}
.pd-opponent .hand-name{font-size:18px;font-weight:700;color:var(--color-hit)}
.pd-opponent .hand-score{font-size:14px;color:var(--text-secondary)}



.theme-selector{display:flex;gap:6px;justify-content:center;padding:8px 0;flex-wrap:wrap;width:100%;max-width:340px;margin:8px 0;border-top:1px solid var(--border-color);padding-top:10px;margin-top:10px}
.theme-btn{padding:10px 16px;border:2px solid var(--border-color);background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);transition:.15s}
.theme-btn:hover{border-color:var(--accent-primary);color:var(--accent-primary)}
.theme-btn.active{background:var(--accent-primary);color:var(--bg-dark);border-color:var(--accent-primary)}
.theme-divider{width:1px;background:var(--border-color);height:24px;align-self:center}
.theme-btn.snd-btn{min-width:40px;padding:8px 10px}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
.status:empty{display:none}
.ship-hint:empty{display:none}

.ck-board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);gap:0;width:100%;max-width:360px;aspect-ratio:1;background:#5C3A1E;border:3px solid #3E2510;border-radius:8px;overflow:hidden;margin:4px 0}
#ckArea{width:100%;display:flex;flex-direction:column;align-items:center}
.ck-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;user-select:none}
.ck-cell.light{background:#D4A96A}
.ck-cell.dark{background:#8B5C2A}
.ck-cell.selected{outline:3px solid #FFD700;outline-offset:-3px;z-index:1}
.ck-cell.highlight-src{background:#42A5F5!important}
.ck-cell.highlight-dest{background:#66BB6A!important}
.ck-cell.highlight-capture{background:#EF5350!important}
.ck-piece{width:70%;height:70%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(12px,3.5vw,20px);cursor:pointer;transition:transform .15s;position:relative}
.ck-piece:active{transform:scale(.9)}
.ck-piece.white{background:radial-gradient(circle at 35% 35%, #fff, #ddd);border:2px solid #bbb;color:#333}
.ck-piece.black{background:radial-gradient(circle at 35% 35%, #555, #1a1a1a);border:2px solid #000;color:#fff}
.ck-piece.king::after{content:'♛';position:absolute;font-size:120%;top:-2px}
.ck-piece.white.king{color:#333}
.ck-piece.black.king{color:#FFD700}
.ck-piece.last-move{box-shadow:0 0 8px 2px rgba(255,215,0,.6)}

.bg-board-h{display:flex;flex-direction:row;align-items:stretch;gap:4px;width:100%;max-width:700px;min-height:240px;margin:4px auto;background:#2d1810;border:3px solid #5C3A1E;border-radius:10px;padding:4px;overflow:visible}
.bg-half{display:flex;flex-direction:column;flex:1;min-width:0}
.bg-row{display:flex;gap:1px;flex:1;min-height:0}
.bg-point{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;min-width:0}
.bg-point.top{justify-content:flex-start}
.bg-point-inner{display:flex;flex-direction:column;align-items:center}
.bg-checker{width:22px;height:22px;border-radius:50%;margin:1px 0;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.4);transition:transform .12s;cursor:pointer}
.bg-checker:hover{transform:scale(1.15)}
.bg-checker.white{background:radial-gradient(circle at 35% 35%, #fff, #ddd);border:1.5px solid #999}
.bg-checker.black{background:radial-gradient(circle at 35% 35%, #555, #1a1a1a);border:1.5px solid #000}
.bg-checker.selected{outline:3px solid #FFD700;outline-offset:-2px;z-index:2}
.bg-checker.highlight{outline:3px solid #66BB6A;outline-offset:-2px;z-index:2}
.bg-bar-v{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:26px;background:rgba(255,255,255,.05);border-radius:6px;padding:4px;gap:3px}
.bg-bar-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;writing-mode:vertical-rl;letter-spacing:1px}
.bg-off-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:46px;background:rgba(255,255,255,.04);border-radius:6px;padding:6px;gap:6px;font-size:13px;color:var(--accent-primary)}
.bg-dice{display:flex;gap:12px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.bg-die{width:48px;height:48px;background:#fff;color:#333;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.bg-die.used{opacity:.3}
.bg-target{outline:2px dashed var(--accent-primary,#3a86ff);outline-offset:-2px;border-radius:6px;background:rgba(58,134,255,.10)}
.bg-checker.bg-selected{box-shadow:0 0 0 3px var(--accent-primary,#3a86ff),0 0 10px 2px rgba(58,134,255,.7)!important}
.bg-info{text-align:center;font-size:13px;color:var(--text-secondary);padding:4px 0;width:100%;max-width:360px;margin:0 auto}
.bg-variant-row{display:flex;gap:8px;margin-bottom:8px}
.bg-variant-btn{flex:1;padding:10px;border:1px solid var(--border-color);background:var(--surface-2,#1b2230);color:var(--text-secondary);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.bg-variant-btn.active{background:var(--accent-primary,#3a86ff);color:#fff;border-color:transparent}
.bg-home-label{font-size:9px;color:var(--text-hint);text-align:center;padding:1px 0;width:100%}


/* ---- AI "thinking" overlay + reveal banner ---- */
.ai-thinking{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,12,20,.55);backdrop-filter:blur(2px)}
.ai-thinking-spinner{width:46px;height:46px;border-radius:50%;border:4px solid rgba(255,255,255,.25);border-top-color:var(--accent-primary,#3a86ff);animation:aispin .8s linear infinite;margin-bottom:14px}
@keyframes aispin{to{transform:rotate(360deg)}}
.ai-thinking-label{color:#fff;font-size:16px;font-weight:600;letter-spacing:.3px}
.ai-reveal-banner{position:fixed;left:50%;top:18%;transform:translate(-50%,-12px);z-index:9998;background:rgba(20,26,38,.96);color:#fff;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.15);box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:opacity .35s ease,transform .35s ease;max-width:90%;text-align:center;pointer-events:none}
.ai-reveal-banner.show{opacity:1;transform:translate(-50%,0)}
.bg-checker.ai-move{animation:bgAiflash 1.1s ease 2;box-shadow:0 0 10px 3px rgba(255,215,0,.8)!important}
@keyframes bgAiflash{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 12px 4px rgba(255,215,0,.9)}}

</style>

async function api(method,data){
  try{
    data = data || {};
    data.lang = lang;
    try{ data.init_data = window.Telegram.WebApp.initData || ''; }catch(e){ data.init_data = ''; }
    const r=await fetch(API+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return await r.json()
  }catch(e){setStatus(t('error'));return null}
}

function renderBoard(boardEl,grid,isOpponent,gameOver, shipsData, isStrip){
  boardEl.innerHTML='';
  const EMPTY=0,SHIP=1,HIT=2,MISS=3,SUNK=4,DEAD=5,MINE=6;
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=document.createElement('div');
    const v=grid[r*10+c];
    cell.className='cell';
    if(v===EMPTY||v===SHIP||v===MINE){cell.classList.add('empty');if(v===SHIP){cell.classList.add(isStrip?'strip-ship':'ship')}else if(v===MINE){cell.classList.add('mine')}}
    else if(v===HIT){cell.classList.add('hit');cell.textContent='❌'}
    else if(v===MISS){cell.classList.add('miss');cell.textContent='·'}
    else if(v===SUNK){cell.classList.add('sunk');cell.textContent='✖'}
    else if(v===DEAD){cell.classList.add('dead');cell.textContent='·'}
    else cell.classList.add('empty');
    if(isOpponent&&!gameOver&&(v===EMPTY||v===SHIP))cell.classList.add('shootable');
    if(isOpponent&&!gameOver)cell.onclick=()=>handleShot(r,c);
    boardEl.appendChild(cell);
  }
}

function compressImage(dataUrl, maxW=800, quality=0.7){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      try {
        const c = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxW || h > maxW){
          const ratio = Math.min(maxW/w, maxW/h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      } catch(e){ resolve(dataUrl); }
    };
    // If the image cannot be decoded (e.g. an unsupported format like
    // HEIC), never leave the promise hanging — fall back to the raw
    // data URL so the upload can still proceed.
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// Opens the camera/file picker and resolves with a compressed
// data-URL, or null if the user cancels.
function captureStripPhoto(){
  return new Promise((resolve) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    let cancelled = true;
    const onFocus = () => {
      window.removeEventListener('focus', onFocus);
      if(cancelled) resolve(null);
    };
    window.addEventListener('focus', onFocus);
    input.onchange = async (e) => {
      cancelled = false;
      window.removeEventListener('focus', onFocus);
      const file = e.target.files[0];
      if(!file){resolve(null);return}
      const reader = new FileReader();
      reader.onerror = () => resolve(null);
      reader.onload = async (ev) => { resolve(await compressImage(ev.target.result)); };
      reader.readAsDataURL(file);
    };
    input.click();
  });
}

function copyToClipboard(text, msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      if(msg) setStatus('✅ ' + msg, '');
    }).catch(()=>{ if(msg) setStatus('✅ ' + msg, ''); });
  } else if(msg) {
    setStatus('✅ ' + msg, '');
  }
}

async function joinByCode(code){
  const resolveRes = await api('/api/resolve_code', {code});
  if(!resolveRes || !resolveRes.ok){
    setStatus(t('joinError'), '');

  const gameType = resolveRes.game;
  if(gameType === 'sea_battle'){
    const res = await api('/api/join', {uid: getUid(), code});
    if(!res || !res.ok){ setStatus(t('joinError')); return; }
    gameCode = code;
    localStorage.setItem('sb_game', code);
    $('actions').innerHTML = '';
    await refreshState();
    // In strip mode the joiner must commit a stake photo before
    // they can confirm placement.
    if(res.state && res.state.strip && !res.state.strip_stake){
      await captureAndUploadStake();
    }
    pollGame();
  } else if(gameType === 'poker_dice'){
    const res = await api('/api/pd_join', {uid: getUid(), code});
    if(!res || !res.ok){ setStatus(t('joinError')); return; }
    pdCode = code;
    localStorage.setItem('pd_game', code);

    pdShowGame(res.state);
    pdPoll();
  } else if(gameType === 'checkers'){
    const res = await api('/api/checkers_join', {uid: getUid(), code});
    if(!res || !res.ok){ setStatus(t('joinError')); return; }
    ckCode = code;
    localStorage.setItem('ck_game', code);
    $('actions').innerHTML = '';
    ckShowGame(res.state);
    ckPoll();
  } else if(gameType === 'backgammon'){
    const res = await api('/api/bg_join', {uid: getUid(), code});
    if(!res || !res.ok){ setStatus(t('joinError')); return; }
    bgCode = code;
    localStorage.setItem('bg_game', code);
    $('actions').innerHTML = '';
    bgShowGame(res.state);
    bgPoll();
  }
}

async function handleShot(r,c){
  if(!state||!state.my_turn)return;
  const res=await api('/api/shoot',{uid:getUid(),code:gameCode,r,c});
  if(!res||!res.ok){setStatus(t('errorShot'));return}

  let msg='';
  if(res.result.result==='hit'){msg=t('hit');sfxHit()}
  else if(res.result.result==='sunk'){msg=t('sunk');sfxSunk()}
  else if(res.result.result==='mine'){
    msg= {ru:'💣 МИНА! Твой корабль поврежден!',uk:'💣 МІНА! Твій корабель пошкоджено!',en:'💣 MINE! Your ship is damaged!'}[lang];
    sfxSunk();
  }
  else {msg=t('miss');sfxMiss()}

  const bs=res.result.bot_shots;
  let botMsg='';
  if(bs&&bs.length){
    const bn='ABCDEFGHIJ';
    botMsg='🤖 ';
    for(const s of bs){
      if(s.result==='hit')botMsg+=` ${t('botHit')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='sunk')botMsg+=` ${t('botSunk')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='mine')botMsg+=` 💣${t('mine')}`;
      else botMsg+=` ${t('botMiss')}`;
    }
    msg+=' '+botMsg;
  }
  // Render the final board from the shot response immediately. This avoids a
  // race with polling and makes the win/loss result appear without delay.
  if(res.state){
    state=res.state;
    updateUI();
    if(state.all_sunk||state.my_all_sunk){
      if(!document.querySelector('.overlay')){
        showResult(state.all_sunk ? '🏆' : '💔', state.all_sunk ? t('win') : t('lose'), state.all_sunk ? t('winDesc') : t('loseDesc'), state.strip);
      }
      return;
    }
  }else{
    await refreshState();
  }
  if(msg)setStatus(msg,'battle');
}

  pdCode=code.toUpperCase();
  localStorage.setItem('pd_game',pdCode);
  pdKept = new Set();
  pdShowGame(res.state);
  pdPoll();
}

function pdPoll(){
  if(pdPollTimer)clearInterval(pdPollTimer);
  pdPollTimer=setInterval(async()=>{
    if(!pdCode){clearInterval(pdPollTimer);pdPollTimer=null;return}
    await pdRefreshState();
  },2000);
}

async function pdRefreshState(){
  if(!pdCode)return;
  const res=await api('/api/pd_state',{uid:getUid(),code:pdCode});
  if(!res||!res.ok){
    localStorage.removeItem('pd_game');
    pdCode=null;
    showPokerDice();
    return;
  }
  if(!pdCode)return;
  const st=res.state;
  // Replay the opponent's throws live in the shared dice tray the moment their
  // turn is delivered (only once, guarded inside pdMaybeAnimateOpponent).
  await pdMaybeAnimateOpponent(st);
  pdShowGame(st);
}

function pdShowGame(st){
  pdState = st;
  showIncomingMessages(st.messages);
  hideAllGameAreas();
  $('pdArea').style.display='';
  setThemeSelectorVisibility(false);
  updateSettingsUI();
  $('header').classList.add('in-game');
  document.title=t('pdTitle');
  $('gameInfo').textContent='';

  $('actions').innerHTML = '';
  $('actions').className = 'btn-row';
  $('pdActions').innerHTML = '';
  $('pdActions').style.minHeight = '120px';
  $('pdDice').innerHTML='';
  $('pdDice').style.minHeight = '';
  $('pdScorecardContainer').style.minHeight = '420px';
  $('pdResult').innerHTML='';
  $('pdOppHistory').innerHTML='';

  if(st.phase==='finished'){
    if(pdPollTimer){clearInterval(pdPollTimer);pdPollTimer=null}
    localStorage.removeItem('pd_game');
    pdRenderResult(st);
    return;
  }

  // Clear kept dice when it's a fresh turn, scored, or no rolls left
  if(!st.dice || st.dice.length === 0 || st.scored || (st.rolls_left === 0 && st.my_turn)){
    pdKept = new Set();
  }

  pdRenderScorecard(st);
  pdRenderDice(st);
  pdRenderActions(st);
  pdRenderInfo(st);
}

function pdRenderScorecard(st){
  const cont = $('pdScorecardContainer');
  cont.innerHTML = '';

  const categoriesLeft = st.categories_left || [];

  const table = document.createElement('table');
  table.className = 'pd-scorecard';
  table.id = 'pdScorecardEl';

  let html = `<tr><th class="cat-name">${t('pdScorecard')||'Табло'}</th><th class="cat-score">${t('pdScoreBtn')||'Очки'}</th><th class="cat-score" style="color:var(--text-hint)">${t('pdOpp')||'Сопер.'}</th></tr>`;

  const sc = st.scorecard || {};
  const oppSc = st.opponent_scorecard || {};
  const scAll = st.scorecard_all || {};
  const oppScAll = st.opponent_scorecard_all || {};

  const renderCat = (catId) => {
    const myVal = scAll[catId];
    const oppVal = oppScAll[catId];
    const canScore = categoriesLeft.includes(catId) && st.my_turn && !st.scored && st.dice && st.dice.length > 0;
    const cls = canScore ? 'available' : (myVal !== null ? 'used' : '');
    const myDisplay = myVal !== null ? myVal : (canScore ? '-' : '');
    const oppDisplay = oppVal !== null ? oppVal : (oppVal === null ? '' : oppVal);

    html += `<tr class="${cls}" data-cat="${catId}">`;
    html += `<td class="cat-name">${catName(catId)}</td>`;
    html += `<td class="cat-score">${myDisplay}</td>`;
    html += `<td class="cat-score" style="color:var(--text-hint)">${oppDisplay}</td>`;
    html += `</tr>`;
  };

  // Upper section
  for(let i = 0; i < 6; i++) renderCat(PD_CATEGORIES[i]);

  // Bonus row
  const bonus = st.bonus;
  const upperSum = st.upper_sum || 0;
  html += `<tr class="bonus-row"><td>🎁 ${t('pdBonus')||'Бонус'} (≥63=+35)</td><td>${bonus ? '+35' : upperSum+'/63'}</td><td style="color:var(--text-hint)">${st.opponent_bonus ? '+35' : (st.opponent_upper_sum||0)+'/63'}</td></tr>`;

  // Divider
  html += `<tr class="section-divider"><td colspan="3"></td></tr>`;

  // Lower section
  for(let i = 6; i < PD_CATEGORIES.length; i++) renderCat(PD_CATEGORIES[i]);

  // Total row
  const totalCls = st.total_score > st.opponent_total_score ? 'total-row win' : st.total_score < st.opponent_total_score ? 'total-row lose' : 'total-row';
  html += `<tr class="${totalCls}"><td>Σ ${t('pdTotal')||'Итого'}</td><td>${st.total_score}</td><td>${st.opponent_total_score}</td></tr>`;

  table.innerHTML = html;
  cont.appendChild(table);

  // Attach click handlers for available categories
  table.querySelectorAll('tr.available').forEach(row => {
    row.addEventListener('click', () => {
      const cat = row.dataset.cat;
      if(cat) pdDoScore(cat);
    });
  });
}

function pdRenderDice(st){
  const cont=$('pdDice');
  cont.innerHTML='';
  const dice=st.dice||[];
  const diceTotal = values => values.reduce((total, value) => total + value, 0);
  // showOpp: opponent finished their turn, now it's my turn - show what opp rolled last
  const showOpp = st.opponent_scored && !st.scored && st.rolls_left===3;

  if(st.my_turn || showOpp){
    let labelColor = 'var(--accent-primary)';
    let labelText = '';
    if(showOpp){
      labelColor = 'var(--color-hit)';
      labelText = st.opponent_scored_category ? `${t('pdOppHand')}: ${catName(st.opponent_scored_category)} — ${st.opponent_scored_points} ${t('pdPts')}` : t('pdOppHand');
    } else {
      labelText = st.hand_name ? `${t('pdYourHand')}: ${pdHandName(st.hand_name)} (${diceTotal(dice)} ${t('pdPts')})` : t('pdYourHand');
    }
    const label = document.createElement('div');
    label.style.cssText = 'width:100%;text-align:center;font-size:13px;color:'+labelColor+';font-weight:600;margin-bottom:6px;margin-top:10px';
    label.textContent = labelText;
    cont.appendChild(label);

    const showDice = showOpp ? (st.opponent_dice||[]) : dice;
    for(let i=0;i<5;i++){
      const die=document.createElement('div');
      die.className='pd-dot-die';
      if(showOpp) die.style.cursor='default';
      const val = showDice[i] || 0;
      if(val){
        const dots = PD_DOTS[val-1] || [];
        for(const [r,c] of dots){
          const dot=document.createElement('div');
          dot.className='dot';
          dot.style.gridRow=r+1;
          dot.style.gridColumn=c+1;
          die.appendChild(dot);
        }
      }
      die.dataset.idx=i;
      if(st.my_turn && !showOpp && !st.scored && st.rolls_left>0){
        if(pdKept.has(i)) die.classList.add('kept');
        die.onclick=()=>pdToggleKeep(i);
      }
      cont.appendChild(die);
    }
  } else {
    // The dice on screen belong to the opponent while their turn is in progress.
    const label = document.createElement('div');
    label.style.cssText = 'width:100%;text-align:center;font-size:13px;color:var(--accent-primary);font-weight:600;margin-bottom:6px;margin-top:10px';
    if(st.opponent_hand_name){
      label.textContent = `${t('pdOppHand')}: ${pdHandName(st.opponent_hand_name)} (${diceTotal(dice)} ${t('pdPts')})`;
    } else {
      label.textContent = t('pdOppHand');
    }
    cont.appendChild(label);

    for(let i=0;i<5;i++){
      const die=document.createElement('div');
      die.className='pd-dot-die';
      die.style.cursor='default';

      const val = dice[i] || 0;
      if(val){
        const dots = PD_DOTS[val-1] || [];
        for(const [r,c] of dots){
          const dot=document.createElement('div');
          dot.className='dot';
          dot.style.gridRow=r+1;
          dot.style.gridColumn=c+1;
          die.appendChild(dot);
        }
      }
      cont.appendChild(die);
    }
  }

   }

  // Play back the opponent's (or AI's) full turn in the SINGLE shared dice
  // tray: the dice spin on the first throw, the kept dice are highlighted and
  // the discarded ones spin again in place, up to the third throw. No separate
  // / duplicated "opponent table" — everything happens in #pdDice.
  let pdAnimating = false;

  async function pdMaybeAnimateOpponent(st){
    const hist = st.opponent_roll_history || [];
    if(!hist.length) return false;
    const key = hist.map(h => (h.dice||[]).join(',')).join('|') + ':' + (st.opponent_scored_category || '');
    if(pdSeenScore === key) return false;
    pdSeenScore = key;

    // Lay out the scorecard / actions for the upcoming player turn; the dice
    // tray is then taken over by the throw-by-throw playback below.
    pdRenderScorecard(st);
    pdRenderActions(st);
    pdRenderInfo(st);

    await pdAnimateBotTurn(hist, st.opponent_scored_category, st.opponent_scored_points);
    return true;
  }

  async function pdAnimateBotTurn(history, cat, pts){
    if(pdAnimating) return;
    pdAnimating = true;
    const savedKept = pdKept;
    pdKept = new Set();


    const cont = $('pdDice');
    cont.innerHTML = '';
    const label = document.createElement('div');
    label.style.cssText = 'width:100%;text-align:center;font-size:13px;color:var(--color-hit);font-weight:600;margin-bottom:6px;margin-top:10px';
    cont.appendChild(label);

    const diceEls = [];
    for(let i = 0; i < 5; i++){
      const die = document.createElement('div');
      die.className = 'pd-dot-die';
      die.style.cursor = 'default';
      die.dataset.idx = i;
      cont.appendChild(die);
      diceEls.push(die);
    }

    const setDie = (el, val) => {
      el.innerHTML = '';
      if(val){
        const dots = PD_DOTS[val - 1] || [];
        for(const [r, c] of dots){
          const dot = document.createElement('div');
          dot.className = 'dot';
          dot.style.gridRow = r + 1;
          dot.style.gridColumn = c + 1;
          el.appendChild(dot);
        }
      }
    };

    for(let h = 0; h < history.length; h++){
      const entry = history[h] || {};
      const kept = entry.kept || [];
      const rerolled = entry.rerolled || [];
      const isFirst = h === 0;
      label.textContent = isFirst
        ? `${t('pdThrow')} 1`
        : `${t('pdThrow')} ${h + 1} · ${t('pdKept')} ${kept.length}, ${t('pdDiscarded')} ${rerolled.length}`;

      for(let i = 0; i < 5; i++){
        if(!isFirst && kept.includes(i)) diceEls[i].classList.add('kept');
        else diceEls[i].classList.remove('kept');
      }

      sfxRoll();
      const spinEls = isFirst ? diceEls : rerolled.map(i => diceEls[i]);
      for(const el of spinEls) el.classList.add('rolling');
      const animId = setInterval(() => {
        for(const el of spinEls) setDie(el, Math.floor(Math.random() * 6) + 1);
      }, 80);
      await _aiDelay(1100);
      clearInterval(animId);
      for(const el of spinEls) el.classList.remove('rolling');
      for(let i = 0; i < 5; i++) setDie(diceEls[i], entry.dice ? (entry.dice[i] || 0) : 0);
      await _aiDelay(350);
    }

    const catNameStr = cat ? catName(cat) : '';
    label.textContent = cat
      ? `${t('pdOppHand')}: ${catNameStr} — ${pts || 0} ${t('pdPts')}`
      : t('pdOppHand');

    pdKept = savedKept;
    pdAnimating = false;
  }


  function pdToggleKeep(idx){
    if(pdKept.has(idx)) pdKept.delete(idx);
  else pdKept.add(idx);
  sfxClick();
  const dice=$('pdDice').children;
  for(let i=0;i<dice.length;i++){
    const dieIdx = parseInt(dice[i].dataset.idx);
    if(pdKept.has(dieIdx)) dice[i].classList.add('kept');
    else dice[i].classList.remove('kept');
  }
}

function pdRenderInfo(st){

  if(st.scored){

async function pdDoRoll(){
  if(!pdState)return;
  if(pdAnimating)return;
  sfxRoll();
  const keep=Array.from(pdKept);
  const start=Date.now();
  const MIN_ANIM=1500;

  const cont=$('pdDice');
  const diceEls=[];
  for(let i=0;i<cont.children.length;i++){
    const child=cont.children[i];
    if(child.dataset.idx!==undefined) diceEls.push(child);
  }
  for(const el of diceEls){
    if(!keep.includes(parseInt(el.dataset.idx))) el.classList.add('rolling');
  }
  const animId=setInterval(()=>{
    for(const el of diceEls){
      const dieIdx=parseInt(el.dataset.idx);
      if(keep.includes(dieIdx)) continue;
      el.innerHTML='';
      const val=Math.floor(Math.random()*6)+1;
      const dots=PD_DOTS[val-1]||[];
      for(const[r,c]of dots){
        const dot=document.createElement('div');
        dot.className='dot';
        dot.style.gridRow=r+1;
        dot.style.gridColumn=c+1;
        el.appendChild(dot);
      }
    }
  },80);

  const res=await api('/api/pd_roll',{uid:getUid(),code:pdCode,keep:keep});
  const elapsed=Date.now()-start;
  const remain=Math.max(0,MIN_ANIM-elapsed);
  if(!res||!res.ok){
    clearInterval(animId);
    for(const el of diceEls) el.classList.remove('rolling');
    setStatus(t('error'));
    return;
  }

  await new Promise(r=>setTimeout(r,remain));
  clearInterval(animId);
  for(const el of diceEls) el.classList.remove('rolling');

  pdShowGame(res.state);
}

async function pdDoScore(category){
  if(!pdState || !category) return;
  sfxClick();
  const keep=Array.from(pdKept);
  const res=await api('/api/pd_score',{uid:getUid(),code:pdCode,category:category,keep:keep});
  if(!res||!res.ok){setStatus(t('error'));return}
  pdKept = new Set();
  // Render the player's own result immediately -- this used to be delayed
  // behind the AI's entire turn (roll/keep/score), which could take a
  // while at Expert difficulty. The AI's turn is now a separate follow-up
  // step (see pdRunBotTurn), triggered right after this paints.
  pdShowGame(res.state);
  if(res.state && res.state.solo && res.state.phase === 'playing' && res.state.turn === 2){
    await pdRunBotTurn();
  }
}

async function pdRunBotTurn(){
  if(!pdCode) return;
  const res = await api('/api/pd_bot_turn', {uid:getUid(), code:pdCode});
  if(!res || !res.ok) return;
  if(!pdCode) return;
  // Replay the AI's throws in the shared dice tray, then show our own turn.
  await pdMaybeAnimateOpponent(res.state);
  pdShowGame(res.state);
}

function pdRenderResult(st){

  $('pdScorecardContainer').style.minHeight = '0';

  $('pdDice').style.minHeight = '0';

    const oppVal = oppSc[catId];
    html += `<tr><td class="cat-name">🎲 ${catName(catId)}</td><td class="cat-score">${myVal !== null ? myVal : '-'}</td><td class="cat-score" style="color:var(--text-hint)">${oppVal !== null ? oppVal : '-'}</td></tr>`;
  };

  html += `<tr class="bonus-row"><td>🎁 ${t('pdBonus')||'Бонус'} (≥63)</td><td>${bonus ? '+35' : '0'}</td><td style="color:var(--text-hint)">${st.opponent_bonus ? '+35' : '0'}</td></tr>`;
  html += `<tr class="section-divider"><td colspan="3"></td></tr>`;
  for(let i = 6; i < PD_CATEGORIES.length; i++) renderCat(PD_CATEGORIES[i]);

  const totalCls = st.total_score > st.opponent_total_score ? 'total-row win' : st.total_score < st.opponent_total_score ? 'total-row lose' : 'total-row';
  html += `<tr class="${totalCls}"><td>Σ ${t('pdTotal')||'Итого'}</td><td>${st.total_score}</td><td>${st.opponent_total_score}</td></tr>`;
  html += '</table>';

  // Action buttons right below the table
  const playAgainFn = st.solo ? 'pdStartSolo()' : 'pdNewMulti()';
  html += `<div class="btn-col" style="margin-top:12px">
    <button class="btn success" onclick="${playAgainFn}">🔄 ${t('pdPlayAgain')}</button>
    <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
  </div>`;

  div.innerHTML = html;

  // Clear saved game on finish so it doesn't show in menu
  if(pdCode) localStorage.removeItem('pd_game');
}

function leavePdGame(){
  if(pdPollTimer){clearInterval(pdPollTimer);pdPollTimer=null}
  // pd_game code stays in localStorage so the main menu's active-games bar can resume it
  pdCode=null; pdState=null;
  $('pdArea').style.display='none';
  showMainMenu();
}

async function pdSurrender(){
  if(!confirm({ru:'Сдаться? Игра будет завершена.',uk:'Здатися? Гра буде завершена.',en:'Surrender? The game will end.'}[lang])) return;
  const res=await api('/api/pd_surrender',{uid:getUid(),code:pdCode});
  if(!res||!res.ok){setStatus(t('error'));return}
  localStorage.removeItem('pd_game');
  pdShowGame(res.state);
}

  if(!pdCode)return;

  pdCode=code;
  localStorage.setItem('pd_game',code);

}

function ckRenderBoard(st){
  const board=$('ckBoard');
  board.innerHTML='';
  const grid=st.board;
  // BLACK viewer sits on the opposite side: rotate the board 180° so their
  // pieces appear at the bottom. 63 - idx is the mirrored (7-r, 7-c) cell.
  const flip = st.my_color === 2;
  const toCan = (i)=> flip ? 63 - i : i;
  const highlighted=new Set((st.highlighted_cells||[]).map(([r,c])=>toCan(r*8+c)));
  const lastMove=st.last_move;
  const lastCells=new Set();
  const ckDests=ckComputeDests(st, ckSelected);
  if(lastMove){
    lastCells.add(toCan(lastMove[0][0]*8+lastMove[0][1]));
    for(const s of lastMove[1])lastCells.add(toCan(s[0]*8+s[1]));
  }
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const cell=document.createElement('div');
      const isDark=(r+c)%2===1;
      cell.className='ck-cell '+(isDark?'dark':'light');
      const visIdx=r*8+c;
      const canIdx=toCan(visIdx);
      const piece=grid[canIdx];
      if(ckSelected&&toCan(ckSelected[0]*8+ckSelected[1])===canIdx)cell.classList.add('selected');
      if(isDark&&piece!==0){
        const el=document.createElement('div');
        const color=piece===1||piece===3?'white':'black';
        const isKing=piece===3||piece===4;
        el.className='ck-piece '+color+(isKing?' king':'');
        if(lastCells.has(canIdx))el.classList.add('last-move');
        cell.appendChild(el);
      }
      if(isDark&&st.my_turn&&highlighted.has(visIdx)){
        cell.classList.add('highlight-src');
        cell.style.cursor='pointer';
        cell.onclick=()=>ckCellClick(r,c);
      }
      if(isDark&&ckDests&&ckDests.has(visIdx)){
        cell.classList.add('highlight-dest');
        cell.style.cursor='pointer';
        cell.onclick=()=>ckCellClick(r,c);
      }
      board.appendChild(cell);
    }
  }
}

function ckComputeDests(st, sel){
  if(!sel||!st||!st.valid_dests)return null;
  const flip = st.my_color === 2;
  const visIdx=sel[0]*8+sel[1];
  const canIdx = flip ? 63 - visIdx : visIdx;
  const arr=st.valid_dests[canIdx];
  if(!arr)return null;
  return new Set(flip ? arr.map(i=>63-i) : arr);
}

async function ckCellClick(r,c){
  if(!ckState||!ckState.my_turn)return;
  const flip = ckState.my_color === 2;
  if(ckSelected){
    const sr=ckSelected[0],sc=ckSelected[1];
    if(sr===r&&sc===c){ckSelected=null;ckRenderBoard(ckState);return}
    let csr=sr, csc=sc, cr=r, cc=c;
    if(flip){ csr=7-sr; csc=7-sc; cr=7-r; cc=7-c; }
    const res=await api('/api/checkers_move',{uid:getUid(),code:ckCode,start_r:csr,start_c:csc,end_r:cr,end_c:cc});
    if(!res||!res.ok){setStatus(res?.error==='illegal_move'?{ru:'Нелегальный ход',uk:'Нелегальний хід',en:'Illegal move'}[lang]:t('error'),'') ;ckSelected=null;ckRenderBoard(ckState);return}
     sfxHit();
    // Render your move immediately so the checker slides into place first;
    // a brief beat (no popup) lets that paint before the AI's reply appears.
    if(res.player_state) ckShowGame(res.player_state);
    if(res.state && res.state.solo && res.bot_move) await _aiDelay(400);
    ckShowGame(res.state);
    return;
  }
  let pr=r, pc=c;
  if(flip){ pr=7-r; pc=7-c; }
  const piece=ckState.board[pr*8+pc];
  if(piece===0)return;
  const color=piece===1||piece===3?1:2;
  if(color!==ckState.turn)return;
  ckSelected=[r,c];
  ckRenderBoard(ckState);
}

async function ckGetHint(){
  const res=await api('/api/checkers_hint',{uid:getUid(),code:ckCode});
  if(!res||!res.ok){setStatus(t('ckNoMoves'),'');return}
  const h=res.hint;
  const flip = ckState && ckState.my_color === 2;
  let sr=h.start[0], sc=h.start[1], er=h.end[0], ec=h.end[1];
  if(flip){ sr=7-sr; sc=7-sc; er=7-er; ec=7-ec; }
  ckSelected=[sr,sc];
  setStatus('💡 '+String.fromCharCode(65+ec)+(8-er),'');
  ckRenderBoard(ckState);
  // Highlight the hint destination
  const cells=$('ckBoard').children;
  const idx=er*8+ec;
  if(cells[idx])cells[idx].classList.add('highlight-capture');
}

function bgRenderBoard(st){
  const cont=$('bgBoard');
  cont.innerHTML='';
  const board=st.board;
  const bar=st.bar||[0,0];
  const off=st.off||[0,0];
  const flip = st.variant === 'long' ? false : (st.my_color === -1);
  const myTurn = st.my_turn;

  // Cells the AI (solo) just moved from / to, so they can be flashed.
  const aiCells = new Set();
  if(st.last_move){
    for(const lm of st.last_move){
      if(lm[0] >= 0) aiCells.add(lm[0]);
      if(lm[1] >= 0) aiCells.add(lm[1]);
    }
  }

  // Build legal moves lookup: from -> Set<to>
  const moveMap = {};
  if(myTurn && st.legal_moves){
    for(const seq of st.legal_moves){
      for(const m of seq){
        const f=m[0], t=m[1];
        if(!moveMap[f]) moveMap[f]=new Set();
        moveMap[f].add(t);
      }
    }
  }

  const wrap=document.createElement('div');
  wrap.className='bg-board-h';

  const renderRow=(start,end)=>{
    const row=document.createElement('div');
    row.className='bg-row';
    for(let i=start;i!==end;i+=end>start?1:-1){
      const idx=flip?23-i:i;
      const pt=document.createElement('div');
      pt.className='bg-point'+(start>=12?' top':'');
      const inner=document.createElement('div');
      inner.className='bg-point-inner';
      const whiteCount = board[idx] > 0 ? board[idx] : 0;
      const blackCount = (st.variant === 'long' && idx === 23)
        ? (st.head_black || 0)
        : (board[idx] < 0 ? -board[idx] : 0);
      const drawCheckers = (n, c) => {
        for(let j=0;j<n;j++){
          const ch=document.createElement('div');
          ch.className='bg-checker '+BG_CHECKER_COLORS[c];
          if(bgSelected===idx){ ch.classList.add('bg-selected'); }
          if(aiCells.has(idx)) ch.classList.add('ai-move');
          if(myTurn && bgSelected===null && moveMap[idx]){
            ch.style.cursor='pointer';
            ch.onclick=(e)=>{e.stopPropagation();bgSelectSource(idx);};
          }
          if(bgSelected===idx && moveMap[idx] && moveMap[idx].has(-1)){
            ch.style.cursor='pointer';
            ch.onclick=(e)=>{e.stopPropagation();bgDoMove(bgSelected,-1);};
          }
          inner.appendChild(ch);
        }
      };
      drawCheckers(whiteCount, 1);
      drawCheckers(blackCount, -1);
      pt.appendChild(inner);
      // Click on empty point to move
      if(myTurn && bgSelected!==null && bgSelected!==idx && moveMap[bgSelected] && (moveMap[bgSelected].has(idx))){
        pt.classList.add('bg-target');
        pt.style.cursor='pointer';
        const hitArea=document.createElement('div');
        hitArea.style.cssText='position:absolute;inset:0;z-index:1';
        hitArea.onclick=(e)=>{e.stopPropagation();bgDoMove(bgSelected,idx);};
        pt.appendChild(hitArea);
      }
      row.appendChild(pt);
    }
    return row;
  };

  // Left half: top points 12-17, bottom points 11-6
  const leftHalf=document.createElement('div');
  leftHalf.className='bg-half';
  leftHalf.appendChild(renderRow(12,18));
  leftHalf.appendChild(renderRow(11,5));

  // Center bar
  const barCol=document.createElement('div');
  barCol.className='bg-bar-v';
  if(bar[0]>0||bar[1]>0){
    barCol.innerHTML=`<div class="bg-bar-label">BAR</div>`;
    for(let j=0;j<bar[0];j++){
      const ch=document.createElement('div');
      ch.className='bg-checker white';
      if(myTurn && bgSelected===null && moveMap[-1]) ch.style.cursor='pointer';
      if(myTurn && bgSelected===null && moveMap[-1]) ch.onclick=()=>bgSelectSource(-1);
      barCol.appendChild(ch);
    }
    for(let j=0;j<bar[1];j++){
      const ch=document.createElement('div');
      ch.className='bg-checker black';
      barCol.appendChild(ch);
    }
  }

  // Right half: top points 18-23, bottom points 5-0
  const rightHalf=document.createElement('div');
  rightHalf.className='bg-half';
  rightHalf.appendChild(renderRow(18,24));
  rightHalf.appendChild(renderRow(5,-1));

  // Off (bear-off) column on the right
  const offCol=document.createElement('div');
  offCol.className='bg-off-col';
  if(off[0]>0||off[1]>0){
    offCol.innerHTML=`<div>⬜ ${off[0]}</div><div>⬛ ${off[1]}</div>`;
  }
  if(bgSelected!==null && moveMap[bgSelected] && moveMap[bgSelected].has(-1)){
    offCol.classList.add('bg-target');
    offCol.style.cursor='pointer';
    offCol.onclick=(e)=>{e.stopPropagation();bgDoMove(bgSelected,-1);};
  }

  wrap.appendChild(leftHalf);
  wrap.appendChild(barCol);
  wrap.appendChild(rightHalf);
  wrap.appendChild(offCol);

  cont.innerHTML='';
  cont.appendChild(wrap);
  cont.onclick=()=>{
    if(bgSelected!==null){
      bgSelected=null;
      bgMoveTargets=[];
      bgShowGame(bgState);
      setStatus({ru:'Нажми на шашку',uk:'Натисни на шашку',en:'Tap a checker to move'}[lang],'battle');
    }
  };
}

function bgRenderDice(st){
  const cont=$('bgActions');
  const dice=st.dice||[];
  if(!dice.length){
    if(st.my_turn && st.phase==='playing' && (st.solo || st.opponent_joined)){
      const rollBtn=document.createElement('button');
      rollBtn.className='btn success';
      rollBtn.style.cssText='width:100%;margin:8px 0';
      rollBtn.textContent='🎲 '+t('bgRoll');
      rollBtn.onclick=()=>bgDoRoll();
      cont.appendChild(rollBtn);
    }
    return;
  }
  if(!st.my_turn) return;
  const diceDiv=document.createElement('div');
  diceDiv.className='bg-dice';
  const used=st.used_dice||0;
  for(let i=0;i<dice.length;i++){
    const die=document.createElement('div');
    die.className='bg-die'+(i<used?' used':'');
    die.textContent=dice[i];
    diceDiv.appendChild(die);
  }
  cont.appendChild(diceDiv);
  if(st.my_turn && bgSelected===null){
    const moveHint=document.createElement('div');
    moveHint.className='bg-info';
    const noMoves = !st.legal_moves || !st.legal_moves.length;
    if(noMoves){
      moveHint.textContent={ru:'Нет доступных ходов',uk:'Немає доступних ходів',en:'No moves available'}[lang];
      const passBtn=document.createElement('button');
      passBtn.className='btn outline';
      passBtn.textContent='⏭ '+{ru:'Пропустить',uk:'Пропустити',en:'Pass'}[lang];
      passBtn.onclick=()=>bgPassTurn();
      cont.appendChild(passBtn);
    } else {
      moveHint.textContent={ru:'Нажми на шашку',uk:'Натисни на шашку',en:'Tap a checker to move'}[lang];
    }
    cont.appendChild(moveHint);
  }
}

function bgRenderActions(st){
  const el=$('bgActions');
  el.className='btn-col';
  let html='';
  if(st.phase==='playing' && !st.solo && !st.opponent_joined){
    setStatus({ru:'🔄 Ожидание друга...',uk:'🔄 Очікування друга...',en:'🔄 Waiting for opponent...'}[lang],'');
  }else if(st.my_turn && st.phase==='playing'){
    setStatus(t('bgYourTurn'),'battle');
    const inviteBtn=st.solo||st.opponent_joined?'':`<button class="btn primary" onclick="shareBgGame()">📤 ${t('inviteFriend')}</button>`;
    if(inviteBtn) html+=`<div class="btn-row">${inviteBtn}</div>`;
  }else if(st.phase==='playing'){
    setStatus(t('bgOppTurn'),'');
  }
  if(!st.solo && st.phase==='playing'){
    html+=`<div class="btn-row" style="margin-top:8px">
      <button class="btn outline" onclick="sendOpponentMessage('backgammon',bgCode,bgState)">${t('message')}</button>
      <button class="btn outline" onclick="leaveBgGame()">${t('minimize')}</button>
    </div>
    <button class="btn danger" onclick="bgSurrender()">${t('surrender')}</button>`;
  }else if(st.phase==='playing'){
    html+=`<div class="btn-row" style="margin-top:8px">
      <button class="btn danger" onclick="bgSurrender()">${t('surrender')}</button>
      <button class="btn outline" onclick="leaveBgGame()">${t('minimize')}</button>
    </div>`;
  }
  const sndIcon=typeof _snd!=='undefined'&&!_snd?'🔇':'🔊';
  const vibeIcon=typeof _vibe!=='undefined'&&!_vibe?'📴':'📳';
  html+=`<div class="pd-theme-bar">
    <button class="theme-btn ${localStorage.getItem('sb_theme')==='ocean'||!localStorage.getItem('sb_theme')?'active':''}" data-theme="ocean" onclick="setTheme('ocean')">🌊 Ocean</button>
    <button class="theme-btn ${localStorage.getItem('sb_theme')==='forest'?'active':''}" data-theme="forest" onclick="setTheme('forest')">🌲 Forest</button>
    <div class="theme-divider"></div>
    <button class="theme-btn snd-btn" id="sndBtnBg" onclick="toggleSnd()">${sndIcon}</button>
    <button class="theme-btn snd-btn" id="vibeBtnBg" onclick="toggleVibe()">${vibeIcon}</button>
  </div>`;
  el.insertAdjacentHTML('beforeend', html);
}

async function bgDoRoll(){
  sfxRoll();
  const res=await api('/api/bg_roll',{uid:getUid(),code:bgCode});
  if(!res||!res.ok){setStatus(t('error'));return}
  bgShowGame(res.state);
}

async function bgSelectSource(idx){
  if(bgSelected===idx){
    bgSelected=null;
    bgMoveTargets=[];
    bgShowGame(bgState);
    setStatus({ru:'Нажми на шашку',uk:'Натисни на шашку',en:'Tap a checker to move'}[lang],'battle');
    return;
  }
  bgSelected=idx;
  bgMoveTargets=[];
  if(bgState && bgState.legal_moves){
    for(const seq of bgState.legal_moves){
      for(const m of seq){
        if(m[0]===idx && !bgMoveTargets.includes(m[1])) bgMoveTargets.push(m[1]);
      }
    }
  }
  // Re-render with visual feedback, preserving the current selection
  bgShowGame(bgState, true);
  setStatus('🎯 '+(bgMoveTargets.length ? {ru:'Выбери пункт назначения',uk:'Обери пункт призначення',en:'Choose destination'}[lang] : {ru:'Нет ходов этой шашкой',uk:'Немає ходів цією шашкою',en:'No moves for this checker'}[lang]),'battle');
}

async function bgDoMove(from,to){
  bgSelected=null;
  const res=await api('/api/bg_move',{uid:getUid(),code:bgCode,from,to:to>=0?to:null});
  if(!res||!res.ok){setStatus(t('error'));return}
  sfxHit();
  bgShowGame(res.state);
}

async function bgPassTurn(){
  const res=await api('/api/bg_move',{uid:getUid(),code:bgCode,from:-1,to:-1});
  if(!res||!res.ok){setStatus(t('error'));return}
  bgSelected=null;
  bgShowGame(res.state);
}

function leaveBgGame(){
  if(bgPollTimer){clearInterval(bgPollTimer);bgPollTimer=null}
  bgCode=null; bgState=null;
  $('bgArea').style.display='none';
  showMainMenu();
}

function shareBgGame(){
  if(!bgCode)return;
  copyToClipboard(bgCode,{ru:'Код скопирован ✅',uk:'Код скопійовано ✅',en:'Code copied ✅'}[lang]);
  try{Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(bgCode)}`)}catch(e){}
}

async function bgSurrender(){
  var msg = {ru:'Сдаться? Игра будет завершена.',uk:'Здатися? Гра буде завершена.',en:'Surrender? The game will end.'}[lang];
  if(!confirm(msg)) return;
  if(bgPollTimer){clearInterval(bgPollTimer);bgPollTimer=null}
  const code = bgCode;
  bgCode=null;bgState=null;
  $('bgArea').style.display='none';
  localStorage.removeItem('bg_game');
  await api('/api/bg_surrender',{uid:getUid(),code});
  showMainMenu();
}

function resumeBg(code){
  bgCode=code;
  localStorage.setItem('bg_game',code);
  $('actions').innerHTML='';
  bgRefreshState();
  bgPoll();
}

async function fetchActiveGames(){
  const cont=$('activeGamesContainer');
  if(!cont)return;
  const res=await api('/api/active_games',{uid:getUid()});
  if(!res||!res.ok||!res.games||!res.games.length){
    cont.innerHTML='';
    return;
  }
  var html='<div class="active-games"><h3>'+t('activeGames')+'</h3>';
  for(const g of res.games){
    if(g.type==='sea_battle'){
      var badge=g.my_turn?'<span class="badge playing">⚓ '+t('yourTurn')+'</span>':'<span class="badge">⚓ '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumeSB(\''+g.code+'\')"><div class="info"><span class="label">⚓ </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
    else if(g.type==='poker_dice'){
      var badge=g.my_turn?'<span class="badge playing">🎲 '+t('yourTurn')+'</span>':'<span class="badge">🎲 '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumePd(\''+g.code+'\')"><div class="info"><span class="label">🎲 </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
    else if(g.type==='checkers'){
      var badge=g.my_turn?'<span class="badge playing">♟ '+t('yourTurn')+'</span>':'<span class="badge">♟ '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumeCk(\''+g.code+'\')"><div class="info"><span class="label">♟ </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
    else if(g.type==='backgammon'){
      var badge=g.my_turn?'<span class="badge playing">🎲 '+t('bgYourTurn')+'</span>':'<span class="badge">🎲 '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumeBg(\''+g.code+'\')"><div class="info"><span class="label">🎲 </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
  }
  html+='</div>';
  cont.innerHTML=html;
}

function resumeSB(code){
  gameCode=code;
  localStorage.setItem('sb_game',code);
  $('actions').innerHTML='';
  refreshState();
  setTimeout(pollGame,500);
}

function resumeCk(code){
  ckCode=code;
  localStorage.setItem('ck_game',code);
  $('actions').innerHTML='';
  ckRefreshState();
  ckPoll();
}

function tryReconnect(){
  showMenu();
  fetchBotInfo().then(() => checkStartParam());
}

function continueGame(){
  const saved=localStorage.getItem('sb_game');
  if(saved){
    gameCode=saved;
      $('actions').innerHTML='';
    refreshState();
    setTimeout(pollGame,500);
  }
}

function updateContinueButton(){
  const btn=$('continueBtn');
  if(btn) btn.style.display='none';
}

async function checkStartParam(){
  try {
    const sp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(!sp) return;
    await joinByCode(sp.trim().toUpperCase());
  } catch(e){}
}

lang = detectLang();
setLang(lang);
initTheme();
initTG();
tryReconnect();
</script>
</body>
</html>
