<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-dark: #0a1628;
  --bg-board: #0d1f3c;
  --bg-board-alt: #162d50;
  --border-color: #1a3a5c;
  --accent-primary: #4fc3f7;
  --accent-primary-light: #80deea;
  --accent-primary-alt: #29b6f6;
  --text-muted: #78909c;
  --text-secondary: #b0bec5;
  --text-tertiary: #90a4ae;
  --text-hint: #546e7a;
  --color-ship: #2e7d32;
  --color-hit: #c62828;
  --color-sunk-dark: #1a1a1a;
  --color-btn-primary-1: #1565c0;
  --color-btn-primary-2: #1976d2;
  --color-btn-success-1: #2e7d32;
  --color-btn-success-2: #388e3c;
  --color-btn-outline-border: #2962ff;
  --color-warning: #ffd54f;
  --color-header-grad-1: #0d1f3c;
  --color-header-grad-2: #162d50;
}

:root.palette-ocean {
  --bg-dark: #0f1f30;
  --bg-board: #162e48;
  --bg-board-alt: #1f3d56;
  --border-color: #345575;
  --accent-primary: #4a7fa0;
  --accent-primary-light: #6a9db8;
  --accent-primary-alt: #3d6d8c;
  --text-muted: #6b7d8a;
  --text-secondary: #acb5bc;
  --text-tertiary: #95a0a8;
  --text-hint: #576672;
  --color-ship: #3d7d50;
  --color-hit: #b04040;
  --color-sunk-dark: #1c2328;
  --color-btn-primary-1: #3d6b8a;
  --color-btn-primary-2: #345a78;
  --color-btn-success-1: #3d7d50;
  --color-btn-success-2: #336b44;
  --color-btn-outline-border: #3d6d8c;
  --color-warning: #b89448;
  --color-header-grad-1: #162e48;
  --color-header-grad-2: #1f3d56;
}



:root.palette-slate {
  --bg-dark: #0f172a;
  --bg-board: #1e293b;
  --bg-board-alt: #334155;
  --border-color: #475569;
  --accent-primary: #5a6a85;
  --accent-primary-light: #8b9bc4;
  --accent-primary-alt: #4d5d7a;
  --text-muted: #6e8098;
  --text-secondary: #bec8d8;
  --text-tertiary: #a5b0c3;
  --text-hint: #5c6a80;
  --color-ship: #3ec470;
  --color-hit: #dc3535;
  --color-sunk-dark: #020617;
  --color-btn-primary-1: #425069;
  --color-btn-primary-2: #5a6a85;
  --color-btn-success-1: #3ec470;
  --color-btn-success-2: #2ec55e;
  --color-btn-outline-border: #5a6a85;
  --color-warning: #e5a823;
  --color-header-grad-1: #1e293b;
  --color-header-grad-2: #334155;
}

/* Neon theme removed */



*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background 0.3s ease}
.header{padding:8px 12px;text-align:center;width:100%;background:linear-gradient(135deg,var(--color-header-grad-1),var(--color-header-grad-2))}
.header .sub{font-size:11px;color:var(--accent-primary-light)}
.header.in-game{display:none}
.board-label{display:none}
.lang-bar{display:flex;gap:4px;justify-content:center;padding:4px 0}
.lang-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-muted);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:.15s}
.lang-btn.active{background:var(--color-btn-primary-1);border-color:var(--accent-primary);color:#fff}
.main{flex:1;width:100%;max-width:480px;padding:8px 12px 80px;display:flex;flex-direction:column;align-items:center}
.status{text-align:center;padding:6px 0;font-size:14px;color:var(--text-secondary);min-height:28px}
.status.battle{color:var(--color-warning);font-weight:600}
.board-wrap{width:100%;max-width:340px;margin:4px 0}
.board-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:2px 0 4px;text-align:center}
.board{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;aspect-ratio:1;background:var(--bg-board);padding:3px;border-radius:8px;border:1px solid var(--border-color);transition:.3s}
.board.my-turn{animation:pulse-glow 1.5s ease-in-out infinite}
@keyframes pulse-glow{0%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}50%{border-color:var(--accent-primary-alt);box-shadow:0 0 20px rgba(79,195,247,0.8)}100%{border-color:var(--accent-primary);box-shadow:0 0 8px rgba(79,195,247,0.4)}}
.sett-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;cursor:pointer;border-bottom:1px solid var(--border-color);font-size:15px}
.sett-row:last-child{border-bottom:none}
.sett-val{font-size:20px}
.btn-link{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;transition:.15s}
.btn-link:hover{color:var(--accent-primary)}
.cell{border-radius:3px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;transition:.12s;background:var(--bg-board-alt);user-select:none}
.cell:active{transform:scale(.92)}
   .cell.empty{background:var(--bg-board-alt)}
 .cell.ship{background:var(--color-ship)}
 .cell.strip-ship{background:#e91e63;border-radius:4px}
 .cell.hit{background:var(--color-hit);animation:pop .3s}
 .cell.miss{background:var(--bg-board);opacity:.4}
 .cell.sunk{background:var(--color-sunk-dark);border:1px solid #424242}
 .cell.dead{background:var(--bg-board);opacity:.4}
 .cell.highlight{background:#ff9800;border:2px solid #ff6f00;animation:glow 1s ease-in-out infinite}
.cell.shootable{background:var(--border-color);border:1px solid var(--color-btn-outline-border)}
.cell.shootable:hover{background:var(--bg-board-alt);border-color:var(--accent-primary)}
 @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
 @keyframes glow{0%{box-shadow:0 0 8px rgba(255,152,0,0.6)}50%{box-shadow:0 0 20px rgba(255,152,0,0.9)}100%{box-shadow:0 0 8px rgba(255,152,0,0.6)}}
 .btn-row{display:flex;flex-wrap:wrap;gap:4px;width:100%;max-width:340px;margin-top:8px}
.btn-row.stack{flex-direction:column;gap:8px}
.btn-row.stack .btn{padding:16px 12px;font-size:16px}
.btn{flex:1 1 0;min-width:0;padding:12px 8px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-icon{width:20px;height:20px;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));color:#fff}
  .btn.success{background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff}
  .btn.outline{background:transparent;border:1px solid var(--color-btn-outline-border);color:var(--accent-primary)}
  .btn.strip-btn{background:linear-gradient(135deg,#e91e63,#d81b60);color:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(233,30,99,0.3)}
  .btn.quit-btn{background:transparent;border:1px solid #c62828;color:#c62828}
  .btn.quit-btn:hover{background:#c62828;color:#fff;transition:all 0.2s}
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:var(--bg-board);border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;border:1px solid var(--border-color)}
  .modal h2{font-size:22px;margin-bottom:8px}
  .modal p{font-size:14px;color:var(--text-secondary);margin-bottom:16px}
  .result-icon{font-size:48px;margin-bottom:8px}
  .legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;padding:6px 0;font-size:12px;color:var(--text-tertiary)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .ship-hint{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:6px 0;font-size:13px;color:var(--accent-primary-light);width:100%;max-width:340px}
  .ship-hint .ship-item{display:inline-flex;align-items:center;gap:4px;background:var(--bg-board-alt);padding:4px 10px;border-radius:6px;border:1px solid var(--border-color)}
  footer{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;background:var(--bg-dark);text-align:center;font-size:11px;color:var(--text-hint);border-top:1px solid var(--border-color)}

.game-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-top:20px}
.game-card{background:linear-gradient(135deg,var(--bg-board),var(--bg-board-alt));border:1px solid var(--border-color);border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:.2s}
.game-card:hover{transform:translateY(-2px);border-color:var(--accent-primary)}
.game-card .icon{font-size:48px;margin-bottom:8px}
.game-card .card-icon{width:48px;height:48px;display:block;margin:0 auto 8px}
.game-card .name{font-size:18px;font-weight:600}
.game-card .card-desc{font-size:12px;color:var(--text-muted);margin-top:4px}
.active-games{width:100%;max-width:340px;margin-bottom:12px}
.active-games h3{font-size:14px;color:var(--accent-primary);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px}
.active-game-row{background:var(--bg-board);border:1px solid var(--border-color);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;transition:.15s}
.active-game-row:hover{border-color:var(--accent-primary)}
.active-game-row .info{font-size:13px}
.active-game-row .info .label{color:var(--text-muted)}
.active-game-row .info .code{color:var(--accent-primary);font-weight:700;letter-spacing:1px}
.active-game-row .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--border-color);color:var(--text-secondary)}
.active-game-row .badge.playing{background:var(--color-btn-success-1);color:#fff}
.ana-letters{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.ana-tile{width:54px;height:54px;background:linear-gradient(135deg,var(--color-btn-primary-1),var(--color-btn-primary-2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
.ana-tile:active{transform:scale(.88);opacity:.7}
.ana-word-display{display:flex;gap:6px;justify-content:center;min-height:48px;align-items:center;width:100%;max-width:340px;background:var(--bg-board);border:1px dashed var(--border-color);border-radius:10px;padding:6px;margin:4px 0;flex-wrap:wrap}
.ana-word-display .ana-tile{width:46px;height:46px;font-size:20px;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2))}
.ana-word-display .ana-tile:active{transform:scale(.88);opacity:.7}
.ana-submit-row{display:flex;gap:6px;width:100%;max-width:340px;margin:4px 0}
.ana-submit-row .btn{min-width:unset}
.ana-submit-row .btn:first-child{flex:2}
.ana-submit-row .btn:last-child{flex:0 0 48px;padding:10px;font-size:18px}
.ana-found{width:100%;max-width:340px;margin:8px 0}
.ana-word{display:inline-block;background:var(--bg-board);border:1px solid var(--border-color);border-radius:6px;padding:4px 10px;margin:3px;font-size:14px}
.ana-word span{color:var(--accent-primary);font-weight:700;margin-left:6px}
.ana-info{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:14px;padding:4px 0}
.ana-info .timer{color:var(--color-warning);font-weight:700}
.ana-info .score{color:var(--accent-primary);font-weight:700}
.ana-hint{flex:0!important;min-width:unset!important;padding:10px 16px!important}
.ana-tile.used{background:var(--border-color);opacity:.25;cursor:default;pointer-events:none}
.ana-base-word{text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0 8px;cursor:pointer;user-select:none}
.ana-base-word .revealed{color:var(--accent-primary);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:2px;display:none}
.ana-base-word.show .revealed{display:inline}

.pd-dice{display:flex;gap:8px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.pd-dot-die{width:min(52px,14vw);height:min(52px,14vw);background:var(--bg-board-alt);border-radius:10px;display:grid;grid-template-rows:1fr 1fr 1fr;grid-template-columns:1fr 1fr 1fr;padding:5px;cursor:pointer;transition:.12s;user-select:none;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.pd-dot-die .dot{width:9px;height:9px;background:var(--accent-primary-light);border-radius:50%;justify-self:center;align-self:center}
.pd-dot-die:hover{transform:scale(1.08)}
.pd-dot-die.kept{box-shadow:0 0 0 3px #ffd700,0 0 10px rgba(255,215,0,.35);background:var(--color-btn-primary-1)}
.pd-dot-die:active{transform:scale(.88)}
.pd-roll-btn{width:min(52px,14vw);height:min(52px,14vw);border:none;background:linear-gradient(135deg,var(--color-btn-success-1),var(--color-btn-success-2));color:#fff;border-radius:10px;font-size:clamp(16px,4.5vw,22px);font-weight:700;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;user-select:none;box-shadow:0 2px 6px rgba(46,125,50,.3)}
.pd-roll-btn:active{transform:scale(.88)}
.pd-roll-btn .count{font-size:9px;opacity:.8;position:absolute;bottom:4px;right:6px;font-weight:400}

.pd-round{text-align:center;font-size:13px;color:var(--accent-primary);font-weight:700;margin:4px 0}
.pd-scorecard{width:100%;max-width:340px;margin:8px 0;border-collapse:collapse;font-size:13px}
.pd-scorecard th{padding:5px;border-bottom:1px solid var(--border-color);font-weight:600}
.pd-scorecard th.cat-name{color:var(--accent-primary-light);text-align:left}
.pd-scorecard th.cat-score{color:var(--text-muted);text-align:center;width:40px}
.pd-scorecard td{padding:5px;border-bottom:1px solid var(--border-color);text-align:center}
.pd-scorecard td.cat-name{text-align:left;color:var(--text-secondary)}
.pd-scorecard td.cat-score{color:var(--accent-primary);font-weight:600}
.pd-scorecard tr.used td.cat-name{color:var(--text-muted)}
.pd-scorecard tr.used td.cat-score{color:var(--text-tertiary)}
.pd-scorecard tr.available{cursor:pointer}
.pd-scorecard tr.available:hover{background:var(--bg-board-alt)}
.pd-scorecard tr.available td.cat-name{color:#fff}
.pd-scorecard tr.section-divider td{border-bottom:2px solid var(--accent-primary);padding:0}
.pd-scorecard tr.bonus-row td{color:var(--color-warning);font-weight:600;font-size:12px}
.pd-scorecard tr.total-row td{font-weight:700;color:#fff;border-top:2px solid var(--accent-primary);font-size:14px;padding:4px 6px}
.pd-scorecard tr.total-row.win td{color:#66BB6A}
.pd-scorecard tr.total-row.lose td{color:#EF5350}
.pd-scoreboard{width:100%;max-width:340px;margin:8px 0;border-collapse:collapse;font-size:12px}
.pd-scoreboard th{color:var(--text-muted);padding:4px 6px;border-bottom:1px solid var(--border-color);font-weight:600}
.pd-scoreboard td{text-align:center;padding:4px 6px;border-bottom:1px solid var(--border-color);color:var(--text-secondary)}
.pd-scoreboard .r-win td{color:#66BB6A;font-weight:600}
.pd-scoreboard .r-lose td{color:#EF5350}
.pd-scoreboard .r-draw td{color:var(--color-warning)}
.pd-scoreboard .total-row td{font-weight:700;color:#fff;border-top:2px solid var(--accent-primary);font-size:14px;padding:4px 6px}
.pd-scoreboard .total-row.win td{color:#66BB6A}
.pd-scoreboard .total-row.lose td{color:#EF5350}

.pd-result{width:100%;max-width:340px;text-align:center;padding:8px;margin:8px 0;background:var(--bg-board);border-radius:10px;border:1px solid var(--border-color)}
.pd-result .hand-name{font-size:18px;font-weight:700;color:var(--accent-primary)}
.pd-result .hand-score{font-size:14px;color:var(--text-secondary)}
.pd-opponent{width:100%;max-width:340px;text-align:center;padding:8px;margin:8px 0;background:var(--bg-board);border-radius:10px;border:1px solid var(--border-color)}
.pd-opponent .hand-name{font-size:18px;font-weight:700;color:var(--color-hit)}
.pd-opponent .hand-score{font-size:14px;color:var(--text-secondary)}



.theme-selector{display:flex;gap:6px;justify-content:center;padding:8px 0;flex-wrap:wrap;width:100%;max-width:340px;margin:8px 0}
.theme-btn{padding:10px 16px;border:2px solid var(--border-color);background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);transition:.15s}
.theme-btn:hover{border-color:var(--accent-primary);color:var(--accent-primary)}
.theme-btn.active{background:var(--accent-primary);color:var(--bg-dark);border-color:var(--accent-primary)}
.theme-divider{width:1px;background:var(--border-color);height:24px;align-self:center}
.theme-btn.snd-btn{min-width:40px;padding:8px 10px}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
.status:empty{display:none}
.ship-hint:empty{display:none}

.ck-board{display:grid;grid-template-columns:repeat(8,1fr);gap:0;width:100%;max-width:360px;aspect-ratio:1;background:#5C3A1E;border:3px solid #3E2510;border-radius:8px;overflow:hidden;margin:4px 0}
#ckArea{width:100%;display:flex;flex-direction:column;align-items:center}
.ck-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;user-select:none}
.ck-cell.light{background:#D4A96A}
.ck-cell.dark{background:#8B5C2A}
.ck-cell.selected{outline:3px solid #FFD700;outline-offset:-3px;z-index:1}
.ck-cell.highlight-src{background:#42A5F5!important}
.ck-cell.highlight-dest{background:#66BB6A!important}
.ck-cell.highlight-capture{background:#EF5350!important}
.ck-piece{width:70%;height:70%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(12px,3.5vw,20px);cursor:pointer;transition:transform .15s;position:relative}
.ck-piece:active{transform:scale(.9)}
.ck-piece.white{background:radial-gradient(circle at 35% 35%, #fff, #ddd);border:2px solid #bbb;color:#333}
.ck-piece.black{background:radial-gradient(circle at 35% 35%, #555, #1a1a1a);border:2px solid #000;color:#fff}
.ck-piece.king::after{content:'♛';position:absolute;font-size:120%;top:-2px}
.ck-piece.white.king{color:#333}
.ck-piece.black.king{color:#FFD700}
.ck-piece.last-move{box-shadow:0 0 8px 2px rgba(255,215,0,.6)}

.st-board{display:grid;grid-template-columns:repeat(10,1fr);gap:0;width:100%;max-width:360px;aspect-ratio:1;background:#3E2510;border:3px solid #2a1a0a;border-radius:8px;overflow:hidden;margin:4px 0}
.st-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:default;transition:background .12s;user-select:none;font-size:clamp(9px,2.5vw,14px);font-weight:700;position:relative}
.st-cell.light{background:#D4A96A}
.st-cell.dark{background:#8B5C2A}
.st-cell.lake{background:#3B6BA5!important;cursor:default!important;pointer-events:none}
.st-cell.lake::after{content:'~';color:rgba(255,255,255,.3);font-size:clamp(12px,3vw,20px)}
.st-cell.selected{outline:3px solid #FFD700;outline-offset:-3px;z-index:1}
.st-cell.highlight-src{background:#42A5F5!important;cursor:pointer!important}
.st-cell.highlight-dest{background:#66BB6A!important;cursor:pointer!important}
.st-cell.battle-result{background:#EF5350!important}
.st-cell.enemy{background:radial-gradient(circle at 35% 35%, #666, #333);border:1px solid #555;color:#eee;font-size:clamp(14px,4vw,24px);cursor:default}
.st-piece{width:80%;height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:clamp(8px,2.2vw,12px);font-weight:700;cursor:pointer;transition:transform .12s;position:relative;line-height:1.1}
.st-piece:active{transform:scale(.9)}
.st-piece.p1{background:radial-gradient(circle at 35% 35%, #5B9BD5, #2B579A);border:2px solid #1A3A6A;color:#fff}
.st-piece.p2{background:radial-gradient(circle at 35% 35%, #E57373, #B71C1C);border:2px solid #7F0000;color:#fff}

const API = window.location.origin;

function $(id){return document.getElementById(id)}

let _snd=localStorage.getItem('sb_snd')!=='0',_vibe=localStorage.getItem('sb_vibe')!=='0';
let _actx=null;
function actx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx}
function tone(f,d,t='sine',v=0.15){if(!_snd)return;try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function haptic(s){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.impactOccurred(s)}catch(e){}}
function hapticN(t){if(!_vibe)return;try{const h=window.Telegram?.WebApp?.HapticFeedback;if(h)h.notificationOccurred(t)}catch(e){}}
function sfxHit(){tone(800,0.08,'square',0.12);haptic('medium')}
function sfxMiss(){tone(200,0.12,'sine',0.08);haptic('light')}
function sfxSunk(){tone(500,0.15,'square',0.1);setTimeout(()=>tone(300,0.15,'square',0.1),100);setTimeout(()=>tone(150,0.2,'square',0.1),200);haptic('heavy')}

function setTheme(themeName){
  const validThemes = ['ocean', 'slate'];
  if(!validThemes.includes(themeName)) return;
  
  document.documentElement.className = 'palette-' + themeName;
  localStorage.setItem('sb_theme', themeName);
  
  const btns = document.querySelectorAll('.theme-btn');
  btns.forEach(btn => {
    btn.classList.remove('active');
    if(btn.dataset.theme === themeName) btn.classList.add('active');
  });
}

function detectLang(){
  try{
    const tg = window.Telegram.WebApp.initDataUnsafe?.user?.language_code || 'ru';
    if(tg.startsWith('uk'))return 'uk';
  }catch(e){}
  const nav = (navigator.language || '').slice(0,2);
  if(nav==='uk')return'uk';
  if(nav==='en')return'en';
  try{var s=localStorage.getItem('sb_lang');if(s)return s}catch(e){}
  return 'ru';
}

function t(key, ...args){
  let s = LANG[lang][key] || LANG.ru[key] || key;
  if(args.length) s = s.replace('{0}', args[0]).replace('{1}', args[1]);
  return s;
}

let showShipHints = true;

function renderBoard(boardEl,grid,isOpponent,gameOver, shipsData, isStrip){
  boardEl.innerHTML='';
  const EMPTY=0,SHIP=1,HIT=2,MISS=3,SUNK=4,DEAD=5;
  // Build a map cell -> ship size for hints
  const cellSizeMap = {};
  if(shipsData && showShipHints){
    for(const s of shipsData){
      for(const [r,c] of s.cells){
        cellSizeMap[r*10+c] = s.size;
      }
    }
  }
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=document.createElement('div');
    const v=grid[r*10+c];
    cell.className='cell';
    if(v===EMPTY||v===SHIP){cell.classList.add('empty');if(v===SHIP){cell.classList.add(isStrip?'strip-ship':'ship')}}
    else if(v===HIT){cell.classList.add('hit');cell.textContent='❌'}
    else if(v===MISS){cell.classList.add('miss');cell.textContent='·'}
    else if(v===SUNK){cell.classList.add('sunk');cell.textContent='✖'}
    else if(v===DEAD){cell.classList.add('dead');cell.textContent='·'}
    else cell.classList.add('empty');
    // Show hint number on ship cells during placement
    const key = r*10+c;
    if(!isOpponent && v===SHIP && cellSizeMap[key]){
      cell.textContent = cellSizeMap[key];
      cell.style.fontSize = 'clamp(11px,3.2vw,18px)';
      cell.style.fontWeight = '700';
      cell.style.color = 'rgba(255,255,255,0.7)';
    }
    if(isOpponent&&!gameOver&&(v===EMPTY||v===SHIP))cell.classList.add('shootable');
    if(isOpponent&&!gameOver)cell.onclick=()=>handleShot(r,c);
    boardEl.appendChild(cell);
  }
}

async function refreshState(){
  if(!gameCode)return;
  const res=await api('/api/state',{uid:getUid(),code:gameCode});
  if(!res||!res.ok){
    localStorage.removeItem('sb_game');
    setStatus(t('gameOver'));
    $('actions').className='btn-row';
    $('actions').innerHTML=`<button class="btn primary" onclick="startSolo()">${t('startBtn')}</button>`;
    return
  }
  if(!gameCode)return;
  state=res.state;
  updateUI();
}

function renderShipHint(shipsList, shipsPlaced){
  if(!shipsList){ $('shipHint').innerHTML = ''; return; }
  const remaining = shipsList.slice(shipsPlaced || 0);
  const counts = {};
  remaining.forEach(s => { counts[s] = (counts[s] || 0) + 1; });
  const parts = Object.entries(counts).sort((a,b) => +b[0]- +a[0]);
  const el = $('shipHint');
  if(!parts.length){ el.innerHTML = ''; return; }
  const items = parts.map(([size, count]) =>
    `<span class="ship-item">${count}×${size}</span>`
  ).join('');
  el.innerHTML = t('shipHint').replace('{0}', items);
}

function updateUI(){
  if(!state)return;
  const s=state;
  const gameOver=s.all_sunk||s.my_all_sunk;
  const isPlacing = s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2';
  if(!isPlacing) showShipHints = false;
  $('ownBoardWrap').style.display='block';
  $('oppBoardWrap').style.display='block';
  renderBoard($('ownBoard'),s.own,false,gameOver,s.own_ships,s.strip);
  renderBoard($('oppBoard'),s.opp,true,gameOver,null,s.strip);
  
  $('gameInfo').textContent = '';
  $('header').classList.add('in-game');
  document.title = s.strip ? t('stripTitle') : t('title');
  
  const ownEl=$('ownBoard'), oppEl=$('oppBoard');
  ownEl.classList.remove('my-turn');
  oppEl.classList.remove('my-turn');
  if(s.my_turn){
    oppEl.classList.add('my-turn');
  }else{
    ownEl.classList.add('my-turn');
  }

  if(gameOver){
    if(s.all_sunk && s.strip && !s.strip_photo){
      setStatus('⏳ ' + {ru:'Ожидание фото...',uk:'Очікування фото...',en:'Waiting for photo...'}[lang], 'battle');
      if(!window._stripPhotoWaitTimer){
        window._stripPhotoWaitTimer = setTimeout(() => {
          window._stripPhotoWaitTimer = null;
          if(pollTimer){clearInterval(pollTimer);pollTimer=null}
          localStorage.removeItem('sb_game');
          showResult('🏆',t('win'),{ru:'Соперник не отправил фото',uk:'Суперник не надіслав фото',en:'Opponent did not send a photo'}[lang], true);
        }, 60000);
      }
      return;
    }
    if(pollTimer){clearInterval(pollTimer);pollTimer=null}
    localStorage.removeItem('sb_game');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(s.all_sunk)showResult('🏆',t('win'),t('winDesc'),s.strip);
    else if(s.my_all_sunk)showResult('💔',t('lose'),t('loseDesc'),s.strip);
    return;
  }

  if(s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2'){
    $('header').classList.remove('in-game');
    ownEl.classList.remove('my-turn');
    oppEl.classList.remove('my-turn');
    $('app').insertBefore($('status'), $('app').firstChild);
    if(!s.solo){
      const c=s.code;
      setStatus(`📋 <b>${c}</b> — ${t('waitOpp')}`,'');
      $('status').style.cursor='pointer';
      $('status').title=t('copyCode');
      $('status').onclick=()=>navigator.clipboard.writeText(c).then(()=>setStatus('✅ '+c+' '+{ru:'скопирован',uk:'скопійовано',en:'copied'}[lang],''));
    }else{
      setStatus(s.strip ? t('stripPlace') : t('placing'),'');
      $('status').style.cursor='';
      $('status').onclick=null;
    }
    $('oppBoardWrap').style.display='none';
    $('actions').className = 'btn-row stack';
    $('actions').innerHTML=`
      <button class="btn success" onclick="autoPlace()">${t('reroll')}</button>
      ${!s.solo ? `<button class="btn primary" onclick="shareGame()">📤 ${t('inviteFriend')}</button>` : ''}
      <button class="btn primary" onclick="confirmPlace()">${t('confirm')}</button>
      <button class="btn outline" onclick="leaveGame()">${t('quit')}</button>
    `;
    $('themeSelector').style.display='none';
    return;
  }
  $('shipHint').innerHTML = '';

  $('oppBoardWrap').style.display='block';
  $('themeSelector').style.display='flex';
  updateSettingsUI();
  $('ownBoardWrap').after($('status'));

  if(s.my_turn){
    setStatus(t('yourTurn'),'battle');
    $('actions').className='btn-row';
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame(true)">${t('surrender')}</button>`;
  }else{
    setStatus(t('oppTurn'),'');
    $('actions').className='btn-row';
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('quit')}</button>`;
  }
}

function compressImage(dataUrl, maxW=800, quality=0.7){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      let w = img.width, h = img.height;
      if(w > maxW || h > maxW){
        const ratio = Math.min(maxW/w, maxW/h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

async function startStripCapture(){
  showLoadingOverlay(STRIP_LOADING_MSGS[lang].process);
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  let cancelled = true;
  const onFocus = () => {
    window.removeEventListener('focus', onFocus);
    if(cancelled){
      hideLoadingOverlay();
      showStripInfoOverlay();
    }
  };
  window.addEventListener('focus', onFocus);
  input.onchange = async (e) => {
    cancelled = false;
    window.removeEventListener('focus', onFocus);
    const file = e.target.files[0];
    if(!file){hideLoadingOverlay();return}
    const reader = new FileReader();
    reader.onerror = () => { hideLoadingOverlay(); setStatus(t('error')); };
    reader.onload = async (ev) => {
      window._stripPhotoData = await compressImage(ev.target.result);
      doStripMulti();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function copyToClipboard(text, msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      if(msg) setStatus('✅ ' + msg, '');
    }).catch(()=>{ if(msg) setStatus('✅ ' + msg, ''); });
  } else if(msg) {
    setStatus('✅ ' + msg, '');
  }
}

    setStatus('⚠️ ' + {ru:'Сначала расставь корабли!',uk:'Спочатку розстав кораблі!',en:'Place all ships first!'}[lang],'');
    return;
  }
  sfxClick();
  await refreshState();
}

async function handleShot(r,c){
  if(!state||!state.my_turn)return;
  const res=await api('/api/shoot',{uid:getUid(),code:gameCode,r,c});
  if(!res||!res.ok){setStatus(t('errorShot'));return}

  let msg='';
  if(res.result.result==='hit'){msg=t('hit');sfxHit()}
  else if(res.result.result==='sunk'){msg=t('sunk');sfxSunk()}
  else {msg=t('miss');sfxMiss()}

  const bs=res.result.bot_shots;
  if(bs&&bs.length){
    const bn='ABCDEFGHIJ';
    msg+=' 🤖';
    for(const s of bs){
      if(s.result==='hit')msg+=` ${t('botHit')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='sunk')msg+=` ${t('botSunk')} ${bn[s.c]}${s.r+1}`;
      else msg+=` ${t('botMiss')}`;
    }
  }
  await refreshState();
  if(msg)setStatus(msg,'battle');
}

function pdShowGame(st){
  pdState = st;
  $('pdArea').style.display='';
  $('ownBoardWrap').style.display='none';
  $('oppBoardWrap').style.display='none';
  $('themeSelector').style.display='none';

  $('gameInfo').textContent='';

  $('actions').innerHTML = '';
  $('actions').className = 'btn-row';
  $('pdActions').innerHTML = '';
  $('pdDice').innerHTML='';
  $('pdResult').innerHTML='';

  if(st.phase==='finished'){
    if(pdPollTimer){clearInterval(pdPollTimer);pdPollTimer=null}
    localStorage.removeItem('pd_game');
    pdRenderResult(st);
    return;
  }

  // Clear kept dice when it's a fresh turn, scored, or no rolls left
  if(!st.dice || st.dice.length === 0 || st.scored || (st.rolls_left === 0 && st.my_turn)){
    pdKept = new Set();
  }

  pdRenderScorecard(st);
  pdRenderDice(st);
  pdRenderActions(st);
  pdRenderInfo(st);
}

function pdRenderScorecard(st){
  const cont = $('pdScorecardContainer');
  cont.innerHTML = '';

  const categoriesLeft = st.categories_left || [];

  const table = document.createElement('table');
  table.className = 'pd-scorecard';
  table.id = 'pdScorecardEl';

  let html = `<tr><th class="cat-name">🎲 ${t('pdScorecard')||'Табло'}</th><th class="cat-score">${t('pdScoreBtn')||'Очки'}</th><th class="cat-score" style="color:var(--text-hint)">${t('pdOpp')||'Сопер.'}</th></tr>`;

  const sc = st.scorecard || {};
  const oppSc = st.opponent_scorecard || {};
  const scAll = st.scorecard_all || {};
  const oppScAll = st.opponent_scorecard_all || {};

  const renderCat = (catId) => {
    const i = PD_CATEGORIES.indexOf(catId);
    const isUpper = i < 6;
    const myVal = scAll[catId];
    const oppVal = oppScAll[catId];
    const canScore = categoriesLeft.includes(catId) && st.my_turn && !st.scored && st.dice && st.dice.length > 0;
    const cls = canScore ? 'available' : (myVal !== null ? 'used' : '');
    const myDisplay = myVal !== null ? myVal : (canScore ? '-' : '');
    const oppDisplay = oppVal !== null ? oppVal : (oppVal === null ? '' : oppVal);

    html += `<tr class="${cls}" data-cat="${catId}">`;
    html += `<td class="cat-name">${isUpper ? '⚀⚁⚂⚃⚄⚅'[i] : '🎲'} ${catName(catId)}</td>`;
    html += `<td class="cat-score">${myDisplay}</td>`;
    html += `<td class="cat-score" style="color:var(--text-hint)">${oppDisplay}</td>`;
    html += `</tr>`;
  };

  // Upper section
  for(let i = 0; i < 6; i++) renderCat(PD_CATEGORIES[i]);

  // Bonus row
  const bonus = st.bonus;
  const upperSum = st.upper_sum || 0;
  html += `<tr class="bonus-row"><td>🎁 ${t('pdBonus')||'Бонус'} (≥63=+35)</td><td>${bonus ? '+35' : upperSum+'/63'}</td><td style="color:var(--text-hint)">${st.opponent_bonus ? '+35' : (st.opponent_upper_sum||0)+'/63'}</td></tr>`;

  // Divider
  html += `<tr class="section-divider"><td colspan="3"></td></tr>`;

  // Lower section
  for(let i = 6; i < PD_CATEGORIES.length; i++) renderCat(PD_CATEGORIES[i]);

  // Total row
  const totalCls = st.total_score > st.opponent_total_score ? 'total-row win' : st.total_score < st.opponent_total_score ? 'total-row lose' : 'total-row';
  html += `<tr class="${totalCls}"><td>Σ ${t('pdTotal')||'Итого'}</td><td>${st.total_score}</td><td>${st.opponent_total_score}</td></tr>`;

  table.innerHTML = html;
  cont.appendChild(table);

  // Attach click handlers for available categories
  table.querySelectorAll('tr.available').forEach(row => {
    row.addEventListener('click', () => {
      const cat = row.dataset.cat;
      if(cat) pdDoScore(cat);
    });
  });
}

function pdRenderDice(st){
  const cont=$('pdDice');
  cont.innerHTML='';
  const dice=st.dice||[];

  for(let i=0;i<5;i++){
    const die=document.createElement('div');
    die.className='pd-dot-die';
    const val = dice[i] || 0;
    if(val){
      const dots = PD_DOTS[val-1] || [];
      for(const [r,c] of dots){
        const dot=document.createElement('div');
        dot.className='dot';
        dot.style.gridRow=r+1;
        dot.style.gridColumn=c+1;
        die.appendChild(dot);
      }
    }
    die.dataset.idx=i;
    if(st.my_turn && !st.scored && st.rolls_left>0){
      if(pdKept.has(i)) die.classList.add('kept');
      die.onclick=()=>pdToggleKeep(i);
    }
    cont.appendChild(die);
  }


}

function pdToggleKeep(idx){
  if(pdKept.has(idx)) pdKept.delete(idx);
  else pdKept.add(idx);
  sfxClick();
  const dice=$('pdDice').children;
  for(let i=0;i<dice.length;i++){
    const dieIdx = parseInt(dice[i].dataset.idx);
    if(pdKept.has(dieIdx)) dice[i].classList.add('kept');
    else dice[i].classList.remove('kept');
  }
}

function pdRenderActions(st){

  $('actions').className = 'btn-row';
  const el = $('pdActions');

  if(st.my_turn && !st.scored){

function pdRenderResult(st){
  const div=$('pdResult');
  const oldTable = document.getElementById('pdScorecardContainer');
  if(oldTable) oldTable.innerHTML = '';

  let html = '';

  // Scorecard final table
  html += '<table class="pd-scorecard" style="margin:8px auto">';
  html += `<tr><th class="cat-name"></th><th class="cat-score">🎲 ${t('pdMe')||'Я'}</th><th class="cat-score">🎯 ${t('pdOpp')||'Сопер.'}</th></tr>`;

  const sc = st.scorecard_all || {};
  const oppSc = st.opponent_scorecard_all || {};

  const renderCat = (catId) => {
    const i = PD_CATEGORIES.indexOf(catId);
    const isUpper = i < 6;
    const myVal = sc[catId];
    const oppVal = oppSc[catId];
    html += `<tr><td class="cat-name">${isUpper ? '⚀⚁⚂⚃⚄⚅'[i] : '🎲'} ${catName(catId)}</td><td class="cat-score">${myVal !== null ? myVal : '-'}</td><td class="cat-score" style="color:var(--text-hint)">${oppVal !== null ? oppVal : '-'}</td></tr>`;
  };

  for(let i = 0; i < 6; i++) renderCat(PD_CATEGORIES[i]);
  const bonus = st.bonus;
  html += `<tr class="bonus-row"><td>🎁 ${t('pdBonus')||'Бонус'} (≥63)</td><td>${bonus ? '+35' : '0'}</td><td style="color:var(--text-hint)">${st.opponent_bonus ? '+35' : '0'}</td></tr>`;
  html += `<tr class="section-divider"><td colspan="3"></td></tr>`;
  for(let i = 6; i < PD_CATEGORIES.length; i++) renderCat(PD_CATEGORIES[i]);

  const totalCls = st.total_score > st.opponent_total_score ? 'total-row win' : st.total_score < st.opponent_total_score ? 'total-row lose' : 'total-row';
  html += `<tr class="${totalCls}"><td>Σ ${t('pdTotal')||'Итого'}</td><td>${st.total_score}</td><td>${st.opponent_total_score}</td></tr>`;
  html += '</table>';

  if(st.hand_name){
    html+=`<div class="pd-result" style="margin:4px auto;max-width:340px">
      <div style="font-size:13px;color:var(--text-muted)">${t('pdYourHand')}:</div>
      <div class="hand-name">${st.hand_name}</div>
      <div class="hand-score">${st.hand_score} ${t('pdPts')}</div>
    </div>`;
  }

  if(st.opponent_scored && st.opponent_hand_name){
    html+=`<div class="pd-opponent" style="margin:4px auto;max-width:340px">
      <div style="font-size:13px;color:var(--text-muted)">${t('pdOppHand')}:</div>
      <div class="hand-name">${st.opponent_hand_name}</div>
      <div class="hand-score">${st.opponent_hand_score} ${t('pdPts')}</div>
    </div>`;
  }

  div.innerHTML=html;

  if(st.winner===st.you_id){
    setStatus(t('pdWin'),'battle');
    sfxWin();
  }else if(st.winner===0 || (st.solo && st.winner===0)){
    setStatus(t('pdLose'),'');
    sfxLose();
  }else if(st.winner===-1){
    setStatus(t('pdDraw'),'');
  }

  const inviteBtn = st.solo ? '' : `<button class="btn primary" onclick="sharePdGame()" style="width:100%">📤 ${t('inviteFriend')}</button>`;
  const soloBtnText = st.solo ? t('pdPlayAgain') : t('close');
  const soloBtnFn = st.solo ? 'pdStartSolo()' : 'showPokerDice()';
  $('actions').innerHTML=`
    ${inviteBtn}
    <button class="btn success" onclick="${soloBtnFn}">${soloBtnText}</button>
    <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
  `;
  // Clear saved game on finish so it doesn't show in menu
  if(pdCode) localStorage.removeItem('pd_game');
}

function ckRenderBoard(st){
  const board=$('ckBoard');
  board.innerHTML='';
  const grid=st.board;
  const highlighted=new Set((st.highlighted_cells||[]).map(([r,c])=>r*8+c));
  const lastMove=st.last_move;
  const lastCells=new Set();
  const ckDests=ckComputeDests(st, ckSelected);
  if(lastMove){
    lastCells.add(lastMove[0][0]*8+lastMove[0][1]);
    for(const s of lastMove[1])lastCells.add(s[0]*8+s[1]);
  }
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const cell=document.createElement('div');
      const isDark=(r+c)%2===1;
      cell.className='ck-cell '+(isDark?'dark':'light');
      const idx=r*8+c;
      const piece=grid[idx];
      if(ckSelected&&ckSelected[0]===r&&ckSelected[1]===c)cell.classList.add('selected');
      if(isDark&&piece!==0){
        const el=document.createElement('div');
        const color=piece===1||piece===3?'white':'black';
        const isKing=piece===3||piece===4;
        el.className='ck-piece '+color+(isKing?' king':'');
        if(lastCells.has(idx))el.classList.add('last-move');
        cell.appendChild(el);
      }
      if(isDark&&st.my_turn&&highlighted.has(idx)){
        cell.classList.add('highlight-src');
        cell.style.cursor='pointer';
        cell.onclick=()=>ckCellClick(r,c);
      }
      if(isDark&&ckDests&&ckDests.has(idx)){
        cell.classList.add('highlight-dest');
        cell.style.cursor='pointer';
        cell.onclick=()=>ckCellClick(r,c);
      }
      board.appendChild(cell);
    }
  }
}

function ckComputeDests(st, sel){
  if(!sel||!st||!st.valid_dests)return null;
  const key=sel[0]*8+sel[1];
  const arr=st.valid_dests[key];
  return arr?new Set(arr):null;
}

async function ckCellClick(r,c){
  if(!ckState||!ckState.my_turn)return;
  if(ckSelected){
    const sr=ckSelected[0],sc=ckSelected[1];
    if(sr===r&&sc===c){ckSelected=null;ckRenderBoard(ckState);return}
    const res=await api('/api/checkers_move',{uid:getUid(),code:ckCode,start_r:sr,start_c:sc,end_r:r,end_c:c});
    if(!res||!res.ok){setStatus(res?.error==='illegal_move'?{ru:'Нелегальный ход',uk:'Нелегальний хід',en:'Illegal move'}[lang]:t('error'),'') ;ckSelected=null;ckRenderBoard(ckState);return}
    sfxHit();
    ckShowGame(res.state);
    return;
  }
  const piece=ckState.board[r*8+c];
  if(piece===0)return;
  const color=piece===1||piece===3?1:2;
  if(color!==ckState.turn)return;
  ckSelected=[r,c];
  ckRenderBoard(ckState);
}

async function ckGetHint(){

  const h=res.hint;
  ckSelected=[h.start[0],h.start[1]];
  setStatus('💡 '+String.fromCharCode(65+h.end[1])+(8-h.end[0]),'');

  const cells=$('ckBoard').children;
  const idx=h.end[0]*8+h.end[1];

}

function stRenderSetup(st){
  const board=$('stBoard');
  board.innerHTML='';
  const grid=st.board;
  const isMySetup=(st.phase==='setup_p1'&&st.turn===1)||(st.phase==='setup_p2'&&st.turn===2);
  const myOwner=st.turn; // 1 or 2

  for(let r=0;r<10;r++){
    for(let c=0;c<10;c++){
      const cell=document.createElement('div');
      const isDark=(r+c)%2===1;
      cell.className='st-cell '+(isDark?'dark':'light');
      const idx=r*10+c;
      const val=grid[idx];
      const isLake=val===99;
      if(isLake){cell.className+=' lake';board.appendChild(cell);continue}
      if(val===-99){board.appendChild(cell);continue}

      const isMine=(val>0&&myOwner===1)||(val<0&&myOwner===2&&val!==-99);
      const absVal=Math.abs(val);

      if(isMine&&absVal>0){
        cell.classList.add('st-piece','p'+(myOwner===1?1:2));
        cell.style.width='80%';cell.style.height='80%';
        cell.style.borderRadius='6px';
        cell.style.display='flex';cell.style.flexDirection='column';
        cell.style.alignItems='center';cell.style.justifyContent='center';
        const rankSpan=document.createElement('span');
        rankSpan.className='st-rank';
        rankSpan.textContent=ST_PIECE_NAMES[absVal]||'?';
        cell.appendChild(rankSpan);
        const nameSpan=document.createElement('span');
        nameSpan.className='st-name';
        nameSpan.textContent=stTitle(absVal);
        cell.appendChild(nameSpan);
        cell.onclick=()=>stSetupClick(r,c);
      }

      board.appendChild(cell);
    }
  }

  $('stPalette').style.display=isMySetup?'flex':'none';
  $('stPalette').innerHTML='';
  if(isMySetup){
    const remaining=st.remaining_pieces||{};
    const types=Object.keys(remaining).map(Number).sort((a,b)=>b-a);
    for(const t of types){
      const cnt=remaining[t];
      const el=document.createElement('div');
      el.className='st-palette-item'+(stPaletteType===t?' selected':'');
      el.innerHTML=`<b>${ST_PIECE_NAMES[t]||'?'}</b> ${stTitle(t)} <span class="count">(${cnt})</span>`;
      if(!stCanMove(t))el.style.opacity='.6';
      el.onclick=()=>{

        stRenderSetup(st);
      };

  $('actions').className='btn-row';

}

function stSetupClick(r,c){
  const val=stState.board[r*10+c];
  const isMySetup=(stState.phase==='setup_p1'&&stState.turn===1)||(stState.phase==='setup_p2'&&stState.turn===2);
  const myOwner=stState.turn;
  if(!isMySetup)return;
  // Check if there's already a piece of ours at this cell
  const isMine=(val>0&&myOwner===1)||(val<0&&myOwner===2&&val!==-99);
  if(isMine){
    // Remove piece
    api('/api/stratego_remove',{uid:getUid(),code:stCode,r,c}).then(res=>{
      if(!res||!res.ok)return;
      sfxPlace();
      stShowGame(res.state);

    return;
  }
  if(!stPaletteType)return;
  if(val!==0)return;
  api('/api/stratego_place',{uid:getUid(),code:stCode,r,c,type:stPaletteType}).then(res=>{
    if(!res||!res.ok){setStatus('⚠️ '+(res?.error||t('error')));return}
    sfxPlace();
    stShowGame(res.state);
  });

      const val=grid[idx];
      const isLake=val===99;
      if(isLake){cell.className+=' lake';board.appendChild(cell);continue}

      if(val===0){
        // empty cell
      }else if(val<0){
        if(val===-99){
          cell.classList.add('enemy');
          cell.textContent='?';
        }else{
          // own piece with negative value (P2)
          const absVal=-val;
          cell.classList.add('st-piece','p2');
          cell.style.width='80%';cell.style.height='80%';
          cell.style.borderRadius='6px';
          cell.style.display='flex';cell.style.flexDirection='column';
          cell.style.alignItems='center';cell.style.justifyContent='center';
          const rankSpan=document.createElement('span');
          rankSpan.className='st-rank';
          rankSpan.textContent=ST_PIECE_NAMES[absVal]||'?';
          cell.appendChild(rankSpan);
          const nameSpan=document.createElement('span');
          nameSpan.className='st-name';
          nameSpan.textContent=stTitle(absVal);
          cell.appendChild(nameSpan);
        }
      }else{
        const absVal=val;
        cell.classList.add('st-piece','p1');
        cell.style.width='80%';cell.style.height='80%';
        cell.style.borderRadius='6px';
        cell.style.display='flex';cell.style.flexDirection='column';
        cell.style.alignItems='center';cell.style.justifyContent='center';
        const rankSpan=document.createElement('span');
        rankSpan.className='st-rank';
        rankSpan.textContent=ST_PIECE_NAMES[absVal]||'?';
        cell.appendChild(rankSpan);
        const nameSpan=document.createElement('span');
        nameSpan.className='st-name';
        nameSpan.textContent=stTitle(absVal);
        cell.appendChild(nameSpan);
      }

      if(stSelected&&stSelected[0]===r&&stSelected[1]===c){
        cell.classList.add('selected');
      }
      var stClickable=(val>0||(val<0&&val!==-99));
      var stPieceType=stClickable?(val>0?val:-val):0;
      if(myTurn&&stClickable&&ST_MOVABLE[stPieceType]!==false){
        cell.style.cursor='pointer';
        cell.onclick=()=>stCellClick(r,c);
      }
      if(moves&&moves.has(idx)){
        cell.classList.add('highlight-dest');
        cell.style.cursor='pointer';
        cell.onclick=()=>stCellClick(r,c);
      }

      board.appendChild(cell);
    }
  }

  if(st.last_battle){
    const b=st.last_battle;
    let msg='';
    const langMap={ru:ru||'ru',uk:'uk',en:'en'};
    if(b.result==='move'){msg={ru:'➡️ Ход',uk:'➡️ Хід',en:'➡️ Move'}[lang];}
    else if(b.result==='attack_win'){msg={ru:'⚔️ Победа! '+stTitle(b.defender_rank)+' уничтожен',uk:'⚔️ Перемога! '+stTitle(b.defender_rank)+' знищено',en:'⚔️ Victory! '+stTitle(b.defender_rank)+' destroyed'}[lang];}
    else if(b.result==='attack_lose'){msg={ru:'💀 '+stTitle(b.attacker_rank)+' погиб',uk:'💀 '+stTitle(b.attacker_rank)+' загинув',en:'💀 '+stTitle(b.attacker_rank)+' died'}[lang];}
    else if(b.result==='both_removed'){msg={ru:'💥 Оба погибли!',uk:'💥 Обидва загинули!',en:'💥 Both died!'}[lang];}
    if(msg)setStatus(msg,'battle');
  }
}

function stComputeMoves(st, r, c){
  const val=st.board[r*10+c];
  if(val===0||val===99)return null;
  if(val===-99)return null;
  const absVal=val>0?val:-val;
  if(ST_MOVABLE[absVal]===false)return null;
  const moves=new Set();
  if(absVal===3){
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      let nr=r+dr, nc=c+dc;
      while(nr>=0&&nr<10&&nc>=0&&nc<10){
        const idx=nr*10+nc;
        const v=st.board[idx];
        if(v===99)break;
        if(v===0){moves.add(idx)}
        else if(v===-99){moves.add(idx);break}
        else if(v<0){moves.add(idx);break}
        else break;
        nr+=dr;nc+=dc;
      }
    }
  }else{
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr, nc=c+dc;
      if(nr<0||nr>=10||nc<0||nc>=10)continue;
      const idx=nr*10+nc;
      const v=st.board[idx];
      if(v===99)continue;
      if(v===0)moves.add(idx);
      else if(v===-99)moves.add(idx);
      else if(v<0)moves.add(idx);
    }
  }
  return moves;
}

async function stCellClick(r,c){
  if(!stState||!stState.my_turn)return;
  if(stSelected){
    const sr=stSelected[0],sc=stSelected[1];
    if(sr===r&&sc===c){stSelected=null;stRenderBoard(stState);return}
    const moves=stComputeMoves(stState,sr,sc);
    if(!moves||!moves.has(r*10+c)){stSelected=null;stRenderBoard(stState);return}
    const res=await api('/api/stratego_move',{uid:getUid(),code:stCode,r:sr,c:sc,nr:r,nc:c});
    if(!res||!res.ok){
      let errMsg=res?.error;
      if(errMsg==='illegal_move')errMsg={ru:'Нелегальный ход',uk:'Нелегальний хід',en:'Illegal move'}[lang];
      setStatus('⚠️ '+(errMsg||t('error')),'');
      stSelected=null;
      stRenderBoard(stState);
      return;
    }
    sfxHit();
    stShowGame(res.state);
    return;
  }
  const val=stState.board[r*10+c];
  if(val===0||val===99)return;
  if(val===-99)return;
  const absVal=val>0?val:-val;
  if(ST_MOVABLE[absVal]===false)return;
  stSelected=[r,c];
  stRenderBoard(stState);
}

function leaveStGame(){
  if(!confirm(t('quitConfirm')))return;
  if(stPollTimer){clearInterval(stPollTimer);stPollTimer=null}
  stCode=null;stState=null;
  localStorage.removeItem('st_game');
  showStratego();
}

function shareStGame(){
  if(!stCode)return;
  const url=`https://t.me/${botUsername||'...'}/app?startapp=${stCode}`;
  const texts={ru:'🎮 Играй со мной в Стратего!',uk:'🎮 Грай зі мною в Стратего!',en:'🎮 Play Stratego with me!'};
  const text=texts[lang];
  copyToClipboard(url,{ru:'Ссылка скопирована ✅',uk:'Посилання скопійовано ✅',en:'Link copied ✅'}[lang]);
  try{Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`)}catch(e){}
}

async function fetchActiveGames(){
  const cont=$('activeGamesContainer');
  if(!cont)return;
  const res=await api('/api/active_games',{uid:getUid()});
  if(!res||!res.ok||!res.games||!res.games.length){
    cont.innerHTML='';
    return;
  }
  const myPdCode = localStorage.getItem('pd_game');
  var html='<div class="active-games"><h3>▶ '+t('selectGame')+'</h3>';
  for(const g of res.games){
    if(g.type==='sea_battle'){
      continue;
    }
    else if(g.type==='poker_dice'){
      if(g.code === myPdCode) continue;
      var badge=g.my_turn?'<span class="badge playing">🎲 '+t('yourTurn')+'</span>':'<span class="badge">🎲 '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumePd(\''+g.code+'\')"><div class="info"><span class="label">🎲 </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
    else if(g.type==='checkers'){
      var badge=g.my_turn?'<span class="badge playing">♟ '+t('yourTurn')+'</span>':'<span class="badge">♟ '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumeCk(\''+g.code+'\')"><div class="info"><span class="label">♟ </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
    else if(g.type==='stratego'){
      var badge=g.my_turn?'<span class="badge playing">♟ '+t('yourTurn')+'</span>':'<span class="badge">♟ '+{ru:'ожидание...',uk:'очікування...',en:'waiting...'}[lang]+'</span>';
      html+='<div class="active-game-row" onclick="resumeSt(\''+g.code+'\')"><div class="info"><span class="label">♟ </span><span class="code">'+g.code+'</span></div>'+badge+'</div>';
    }
  }
  html+='</div>';
  cont.innerHTML=html;
}

function resumeSB(code){
  showShipHints = true;
  gameCode=code;
  localStorage.setItem('sb_game',code);
  $('actions').innerHTML='';
  refreshState();
  setTimeout(pollGame,500);
}

function resumeSt(code){
  stCode=code;
  localStorage.setItem('st_game',code);
  $('actions').innerHTML='';
  stRefreshState();
  stPoll();
}

function resumeCk(code){
  ckCode=code;
  localStorage.setItem('ck_game',code);
  $('actions').innerHTML='';
  ckRefreshState();
  ckPoll();
}

function tryReconnect(){
  const saved=localStorage.getItem('sb_game');
  if(saved){
    gameCode=saved;
    refreshState();
    setTimeout(pollGame,1000);
    fetchBotInfo();
    return;
  }
  const pdSaved=localStorage.getItem('pd_game');
  if(pdSaved){
    pdCode=pdSaved;
    pdRefreshState();
    setTimeout(pdPoll,1000);
    fetchBotInfo();
    return;
  }
  const ckSaved=localStorage.getItem('ck_game');
  if(ckSaved){
    ckCode=ckSaved;
    ckRefreshState();
    setTimeout(ckPoll,1000);
    fetchBotInfo();
    return;
  }
  const stSaved=localStorage.getItem('st_game');
  if(stSaved){
    stCode=stSaved;
    stRefreshState();
    setTimeout(stPoll,1000);
    fetchBotInfo();
    return;
  }
  showMenu();
  fetchActiveGames();
  fetchBotInfo().then(() => checkStartParam());
}

function continueGame(){
  const saved=localStorage.getItem('sb_game');
  if(saved){
    gameCode=saved;
    showShipHints = true;
    $('actions').innerHTML='';
    refreshState();
    setTimeout(pollGame,500);
  }
}

function updateContinueButton(){
  const btn=$('continueBtn');
  if(btn) btn.style.display='none';
}

async function checkStartParam(){
  try {
    const sp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(!sp) return;
    const code = sp.trim().toUpperCase();
    // Verify the code exists before joining
    const resolveRes = await api('/api/resolve_code', {code});
    if(!resolveRes || !resolveRes.ok){
      setStatus(t('joinError'), '');
      return;
    }
    // Try Sea Battle
    const sbRes = await api('/api/join', {uid: getUid(), code});
    if(sbRes && sbRes.ok){
      showShipHints = true;
      gameCode = code;
      localStorage.setItem('sb_game', code);
      $('actions').innerHTML = '';
      await refreshState();
      pollGame();
      return;
    }
    // Try Poker Dice
    if(resolveRes.game === 'poker_dice'){
      const pdRes = await api('/api/pd_join', {uid: getUid(), code});
      if(pdRes && pdRes.ok){
        pdCode = code;
        localStorage.setItem('pd_game', code);
        $('actions').innerHTML = '';
        pdShowGame(pdRes.state);
        pdPoll();
        return;
      }
    }
    // Try Checkers
    if(resolveRes.game === 'checkers'){
      const ckRes = await api('/api/checkers_join', {uid: getUid(), code});
      if(ckRes && ckRes.ok){
        ckCode = code;
        localStorage.setItem('ck_game', code);
        $('actions').innerHTML = '';
        ckShowGame(ckRes.state);
        ckPoll();
        return;
      }
    }
    // Try Stratego
    if(resolveRes.game === 'stratego'){
      const stRes = await api('/api/stratego_join', {uid: getUid(), code});
      if(stRes && stRes.ok){
        stCode = code;
        localStorage.setItem('st_game', code);
        $('actions').innerHTML = '';
        stShowGame(stRes.state);
        stPoll();
        return;
      }
    }
    // Join failed – show error
    setStatus(t('joinError'), '');
  } catch(e){}
}

lang = detectLang();
setLang(lang);
initTheme();
initTG();
tryReconnect();
</script>
