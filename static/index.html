<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a1628;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.header{padding:8px 12px;text-align:center;width:100%;background:linear-gradient(135deg,#0d1f3c,#162d50)}
.header h1{font-size:18px;letter-spacing:2px;color:#4fc3f7}
.header .sub{font-size:11px;color:#80deea}
.header.in-game h1,.header.in-game .sub{display:none}
.lang-bar{display:flex;gap:4px;justify-content:center;padding:4px 0}
.lang-btn{background:transparent;border:1px solid #1a3a5c;color:#78909c;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;transition:.15s}
.lang-btn.active{background:#1565c0;border-color:#4fc3f7;color:#fff}
.main{flex:1;width:100%;max-width:480px;padding:8px 12px 80px;display:flex;flex-direction:column;align-items:center}
.status{text-align:center;padding:6px 0;font-size:14px;color:#b0bec5;min-height:28px}
.status.battle{color:#ffd54f;font-weight:600}
.board-wrap{width:100%;max-width:340px;margin:4px 0}
.board-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#78909c;padding:2px 0 4px;text-align:center}
.board{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;aspect-ratio:1;background:#0d1f3c;padding:3px;border-radius:8px;border:1px solid #1a3a5c;transition:.3s}
.board.my-turn{border:2px solid #4fc3f7;box-shadow:0 0 12px rgba(79,195,247,0.6)}
.cell{border-radius:3px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;transition:.12s;background:#162d50;user-select:none}
.cell:active{transform:scale(.92)}
.cell.empty{background:#162d50}
.cell.ship{background:#2e7d32}
.cell.hit{background:#c62828;animation:pop .3s}
.cell.miss{background:#0d2137;opacity:.4}
.cell.sunk{background:#1a1a1a;border:1px solid #424242}
.cell.dead{background:#0d2137;opacity:.4}
.cell.shootable{background:#1a3a5c;border:1px solid #2962ff}
.cell.shootable:hover{background:#1e4d7a;border-color:#4fc3f7}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;width:100%;max-width:340px;margin-top:8px}
.btn{flex:1;min-width:120px;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;text-align:center}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff}
.btn.success{background:linear-gradient(135deg,#2e7d32,#388e3c);color:#fff}
.btn.outline{background:transparent;border:1px solid #2962ff;color:#4fc3f7}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#0d1f3c;border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;border:1px solid #1a3a5c}
.modal h2{font-size:22px;margin-bottom:8px}
.modal p{font-size:14px;color:#b0bec5;margin-bottom:16px}
.result-icon{font-size:48px;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;padding:6px 0;font-size:12px;color:#90a4ae}
.legend span{display:inline-flex;align-items:center;gap:4px}
footer{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;background:#0a1628;text-align:center;font-size:11px;color:#546e7a;border-top:1px solid #1a3a5c}

.game-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-top:20px}
.game-card{background:linear-gradient(135deg,#0d1f3c,#162d50);border:1px solid #1a3a5c;border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:.2s}
.game-card:hover{transform:translateY(-2px);border-color:#4fc3f7}
.game-card .icon{font-size:48px;margin-bottom:8px}
.game-card .name{font-size:18px;font-weight:600}
.game-card .card-desc{font-size:12px;color:#78909c;margin-top:4px}
.active-games{width:100%;max-width:340px;margin-bottom:12px}
.active-games h3{font-size:14px;color:#4fc3f7;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px}
.active-game-row{background:#0d1f3c;border:1px solid #1a3a5c;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;transition:.15s}
.active-game-row:hover{border-color:#4fc3f7}
.active-game-row .info{font-size:13px}
.active-game-row .info .label{color:#78909c}
.active-game-row .info .code{color:#4fc3f7;font-weight:700;letter-spacing:1px}
.active-game-row .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:#1a3a5c;color:#b0bec5}
.active-game-row .badge.playing{background:#2e7d32;color:#fff}
.ana-letters{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.ana-tile{width:48px;height:48px;background:linear-gradient(135deg,#1565c0,#1976d2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
.ana-tile:active{transform:scale(.88);opacity:.7}
.ana-word-display{display:flex;gap:6px;justify-content:center;min-height:48px;align-items:center;width:100%;max-width:340px;background:#0d1f3c;border:1px dashed #1a3a5c;border-radius:10px;padding:6px;margin:4px 0;flex-wrap:wrap}
.ana-word-display .ana-tile{width:40px;height:40px;font-size:18px;background:linear-gradient(135deg,#2e7d32,#388e3c)}
.ana-word-display .ana-tile:active{transform:scale(.88);opacity:.7}
.ana-submit-row{display:flex;gap:6px;width:100%;max-width:340px;margin:4px 0}
.ana-submit-row .btn{min-width:unset}
.ana-submit-row .btn:first-child{flex:2}
.ana-submit-row .btn:last-child{flex:0 0 48px;padding:10px;font-size:18px}
.ana-found{width:100%;max-width:340px;margin:8px 0}
.ana-word{display:inline-block;background:#0d1f3c;border:1px solid #1a3a5c;border-radius:6px;padding:4px 10px;margin:3px;font-size:14px}
.ana-word span{color:#4fc3f7;font-weight:700;margin-left:6px}
.ana-info{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:14px;padding:4px 0}
.ana-info .timer{color:#ffd54f;font-weight:700}
.ana-info .score{color:#4fc3f7;font-weight:700}
.ana-hint{flex:0!important;min-width:unset!important;padding:10px 16px!important}
.ana-tile.used{background:#1a3a5c;opacity:.25;cursor:default;pointer-events:none}
.ana-base-word{text-align:center;font-size:12px;color:#78909c;margin:4px 0 8px;cursor:pointer;user-select:none}
.ana-base-word .revealed{color:#4fc3f7;font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:2px;display:none}
.ana-base-word.show .revealed{display:inline}
.ana-base-word:not(.show)::after{content:' (нажми, чтобы открыть)';font-size:11px;color:#546e7a}
</style>
</head>

  </div>
</div>
<footer>🎮 Games</footer>

const API = window.location.origin;
let state = null, uid = null, gameCode = null, lang = 'ru';
let botUsername = '';
let anaLobbyCode = '';

function $(id){return document.getElementById(id)}

function detectLang(){
  try{
    const tg = window.Telegram.WebApp.initDataUnsafe?.user?.language_code || 'ru';
    if(tg.startsWith('uk'))return 'uk';
  }catch(e){}
  const nav = (navigator.language || '').slice(0,2);
  if(nav==='uk')return'uk';
  if(nav==='en')return'en';
  return localStorage.getItem('sb_lang')||'ru';
}

function t(key, ...args){
  let s = LANG[lang][key] || LANG.ru[key] || key;
  if(args.length) s = s.replace('{0}', args[0]).replace('{1}', args[1]);
  return s;
}

function setLang(l){
  lang = l;
  localStorage.setItem('sb_lang', l);
  const langMap = {ru:'ru', ua:'uk', en:'en'};
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', (langMap[b.textContent.toLowerCase()]||b.textContent.toLowerCase()) === l));
  applyLang();
  if(state) updateUI();
}

function applyLang(){
  $('lblOwn').textContent = t('ownBoard');
  $('lblOpp').textContent = t('oppBoard');
  $('legEmpty').textContent = t('legEmpty');
  $('legShip').textContent = t('legShip');
  $('legHit').textContent = t('legHit');
  $('legMiss').textContent = t('legMiss');
  $('legSunk').textContent = t('legSunk');
  if(!state && !gameCode && !anaSid) showMenu();
  else if(anaSid){$('title').textContent=t('anaTitle');document.title='Anagram'}
  else{$('title').textContent=t('title');document.title=t('title')}
}

function initTG(){try{window.Telegram.WebApp.ready();window.Telegram.WebApp.expand()}catch(e){}}
function getUid(){
  if(uid)return uid;
  try{uid=window.Telegram.WebApp.initDataUnsafe?.user?.id||localStorage.getItem('sb_uid')||Date.now()}catch(e){uid=localStorage.getItem('sb_uid')||Date.now()}
  localStorage.setItem('sb_uid',uid);
  return uid
}

function setStatus(text,cls=''){const s=$('status');s.innerHTML=text;s.className='status'+(cls?' '+cls:'')}

async function api(method,data){
  try{
    data = data || {};
    data.lang = lang;
    const r=await fetch(API+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return await r.json()
  }catch(e){setStatus(t('error'));return null}
}

async function fetchBotInfo(){
  try {
    const res = await api('/api/bot_info', {});
    if(res && res.ok){
      botUsername = res.bot_username || '';
    }
  } catch(e){}
}

function renderBoard(boardEl,grid,isOpponent,gameOver){
  boardEl.innerHTML='';
  const EMPTY=0,SHIP=1,HIT=2,MISS=3,SUNK=4,DEAD=5;
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=document.createElement('div');
    const v=grid[r*10+c];
    cell.className='cell';
    if(v===EMPTY||v===SHIP){cell.classList.add('empty');if(v===SHIP)cell.classList.add('ship')}
    else if(v===HIT){cell.classList.add('hit');cell.textContent='❌'}
    else if(v===MISS){cell.classList.add('miss');cell.textContent='·'}
    else if(v===SUNK){cell.classList.add('sunk');cell.textContent='✖'}
    else if(v===DEAD){cell.classList.add('dead');cell.textContent='·'}
    else cell.classList.add('empty');
    if(isOpponent&&!gameOver&&(v===EMPTY||v===SHIP))cell.classList.add('shootable');
    if(isOpponent&&!gameOver)cell.onclick=()=>handleShot(r,c);
    boardEl.appendChild(cell);
  }
}

async function refreshState(){
  if(!gameCode)return;
  const res=await api('/api/state',{uid:getUid(),code:gameCode});
  if(!res||!res.ok){
    localStorage.removeItem('sb_game');
    setStatus(t('gameOver'));
    $('actions').innerHTML=`<button class="btn primary" onclick="startSolo()">${t('startBtn')}</button>`;
    return
  }
  state=res.state;
  updateUI();
}

function updateUI(){
  if(!state)return;
  const s=state;
  const gameOver=s.all_sunk||s.my_all_sunk;
  $('ownBoardWrap').style.display='block';
  $('oppBoardWrap').style.display='block';
  renderBoard($('ownBoard'),s.own,false,gameOver);
  renderBoard($('oppBoard'),s.opp,true,gameOver);
  
  $('gameInfo').textContent = '';
  $('header').classList.add('in-game');
  
  const ownEl=$('ownBoard'), oppEl=$('oppBoard');
  if(s.my_turn){
    ownEl.classList.add('my-turn');
    oppEl.classList.add('my-turn');
  }else{
    ownEl.classList.remove('my-turn');
    oppEl.classList.remove('my-turn');
  }

  if(gameOver){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null}
    localStorage.removeItem('sb_game');
    if(s.all_sunk)showResult('🏆',t('win'),t('winDesc'));
    else if(s.my_all_sunk)showResult('💔',t('lose'),t('loseDesc'));
    return;
  }

  if(s.phase==='placing'||s.phase==='placing1'||s.phase==='placing2'){
    $('header').classList.remove('in-game');
    ownEl.classList.remove('my-turn');
    oppEl.classList.remove('my-turn');
    if(!s.solo){
      setStatus(`📋 <b>${s.code}</b> — ${t('waitOpp')}`,'');
    }else{
      setStatus(t('placing'),'');
    }
    $('actions').innerHTML=`
      ${!s.solo ? `<button class="btn outline" onclick="copyCode()">📋 ${t('joinPlaceholder')}: <b>${s.code}</b></button>` : ''}
      ${!s.solo ? `<button class="btn primary" onclick="shareGame()">📤 ${t('inviteFriend')}</button>` : ''}
      <button class="btn success" onclick="autoPlace()">${t('reroll')}</button>
      <button class="btn primary" onclick="confirmPlace()">${t('confirm')}</button>
      <button class="btn outline" onclick="leaveGame()">${t('quit')}</button>
    `;
    $('oppBoardWrap').style.display='none';
    $('legend').style.display='none';
    return;
  }

  $('legend').style.display='flex';
  $('oppBoardWrap').style.display='block';

  if(s.my_turn){
    setStatus(t('yourTurn'),'battle');
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('surrender')}</button>`;
  }else{
    setStatus(t('oppTurn'),'');
    $('actions').innerHTML=`<button class="btn outline" onclick="leaveGame()">${t('quit')}</button>`;
  }
}

async function startSolo(){
  const res=await api('/api/new_solo',{uid:getUid()});
  if(!res||!res.ok){setStatus(t('error'));return}
  gameCode=res.code;
  localStorage.setItem('sb_game',gameCode);
  $('actions').innerHTML='';
  await refreshState();
}

async function newMulti(){
  const res=await api('/api/new_multi',{uid:getUid()});
  if(!res||!res.ok){setStatus(t('error'));return}
  gameCode=res.code;
  localStorage.setItem('sb_game',gameCode);
  setStatus('', '');
  await refreshState();
  pollGame();
}

function copyCode(altCode){
  const code = altCode || gameCode;
  if(!code)return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(()=>{
      setStatus('✅ '+code+' '+{ru:'скопирован',uk:'скопійовано',en:'copied'}[lang],'');
    }).catch(()=>fallbackCopy(code));
  }else{fallbackCopy(code)}
}
function fallbackCopy(code){
  if(!code) code = gameCode;
  if(!code)return;
  const ta=document.createElement('textarea');
  ta.value=code;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');setStatus('✅ '+code+' '+(lang==='uk'?'скопійовано':lang==='en'?'copied':'скопирован'),'')}catch(e){}
  document.body.removeChild(ta);
}

function shareGame(){
  if(!gameCode) return;
  clipboardShare(gameCode);
  tryShareMessage(gameCode);
}

function shareAnaGame(){
  const code = localStorage.getItem('ana_code') || anaLobbyCode;
  if(!code) return;
  clipboardShare(code);
  tryShareMessage(code);
}

function clipboardShare(code){
  if(botUsername){
    const url = `https://t.me/${botUsername}/app?startapp=${code}`;
    copyToClipboard(url, {ru:'Ссылка скопирована! Отправь её другу',uk:'Посилання скопійовано! Надішли другу',en:'Link copied! Send to a friend'}[lang]);
  } else {
    const txt = typeof code === 'string' ? code : gameCode;
    if(txt) copyToClipboard(txt, t('shareCopied'));
  }
}

function tryShareMessage(code){
  try {
    if(window.Telegram?.WebApp?.shareMessage && window.Telegram.WebApp.isVersionAtLeast('8.0')){
      fetch(API + '/api/prepare_invite', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({uid: getUid(), code, friend_uid: getUid()})
      }).then(r => r.json()).then(res => {
        if(res && res.ok && res.msg_id){
          window.Telegram.WebApp.shareMessage(res.msg_id);
        }
      }).catch(() => {});
    }
  } catch(e){}
}

function copyToClipboard(text, msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      if(msg) setStatus('✅ ' + msg, '');
    }).catch(()=>{ if(msg) setStatus('✅ ' + msg, ''); });
  } else if(msg) {
    setStatus('✅ ' + msg, '');
  }
}

async function joinGame(){
  const code=prompt(t('joinPlaceholder'));
  if(!code)return;
  const res=await api('/api/join',{uid:getUid(),code:code.toUpperCase()});
  if(!res||!res.ok){setStatus(t('joinError'));return}
  gameCode=code.toUpperCase();
  localStorage.setItem('sb_game',gameCode);
  $('actions').innerHTML='';
  await refreshState();
  pollGame();
}

let pollTimer=null;

function pollGame(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!gameCode){clearInterval(pollTimer);pollTimer=null;return}
    await refreshState();
  },2000);
}

function showMenu(){
  gameCode=null;state=null;anaSid=null;anaLetters=[];anaUsed=new Set();anaCurrentWord=[];
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  if(anaTimer){clearInterval(anaTimer);anaTimer=null}
  localStorage.removeItem('sb_game');
  localStorage.removeItem('ana_sid');
  $('ownBoardWrap').style.display='none';
  $('oppBoardWrap').style.display='none';
  $('legend').style.display='none';
  $('anaArea').style.display='none';
  $('title').textContent = '🎮 ' + t('selectGame');
  document.title = 'Games';
  $('gameInfo').textContent='—';
  $('header').classList.remove('in-game');
  document.querySelectorAll('.board').forEach(b => b.classList.remove('my-turn'));
  setStatus(t('selectGame'));
  // Show lang selector on menu
  var lb=$('langBar');if(lb)lb.style.display='flex';
  $('actions').innerHTML=`
    <div id="activeGamesContainer"></div>
    <div class="game-select">
      <div class="game-card" onclick="showSeaBattle()">
        <div class="icon">⚓</div>
        <div class="name">${t('seaBattle')}</div>
        <div class="card-desc">${t('vsBot')} / ${t('withFriend')}</div>
      </div>
      <div class="game-card" onclick="showAnagram()">
        <div class="icon">🔤</div>
        <div class="name">${t('anaTitle')}</div>
        <div class="card-desc">${t('anaSolo')} / ${t('anaFriend')}</div>
      </div>
    </div>
  `;
  fetchActiveGames();
}

async function autoPlace(){
  const res=await api('/api/place_auto',{uid:getUid(),code:gameCode});
  if(!res||!res.ok)return;
  await refreshState();
  setStatus(t('again'),'');
}

async function confirmPlace(){
  const res=await api('/api/confirm',{uid:getUid(),code:gameCode});
  if(!res||!res.ok)return;
  await refreshState();
}

async function handleShot(r,c){
  if(!state||!state.my_turn)return;
  const res=await api('/api/shoot',{uid:getUid(),code:gameCode,r,c});
  if(!res||!res.ok){setStatus(t('errorShot'));return}

  let msg='';
  if(res.result.result==='hit')msg=t('hit');
  else if(res.result.result==='sunk')msg=t('sunk');
  else msg=t('miss');

  const bs=res.result.bot_shots;
  if(bs&&bs.length){
    const bn='ABCDEFGHIJ';
    msg+=' 🤖';
    for(const s of bs){
      if(s.result==='hit')msg+=` ${t('botHit')} ${bn[s.c]}${s.r+1}`;
      else if(s.result==='sunk')msg+=` ${t('botSunk')} ${bn[s.c]}${s.r+1}`;
      else msg+=` ${t('botMiss')}`;
    }
  }
  await refreshState();
  if(msg)setStatus(msg,'battle');
}

function showResult(icon,title,desc){
  const o=document.createElement('div');
  o.className='overlay';
  o.innerHTML=`
    <div class="modal">
      <div class="result-icon">${icon}</div>
      <h2>${title}</h2>
      <p>${desc}</p>
      <button class="btn primary" onclick="this.closest('.overlay').remove();startSolo()">${t('playAgain')}</button>
      <button class="btn outline" style="margin-top:8px" onclick="this.closest('.overlay').remove();leaveGame()">${t('close')}</button>
    </div>`;
  document.body.appendChild(o);
}

async function leaveGame(){
  if(!confirm(t('quitConfirm')))return;
  showMenu();
}

function showSeaBattle(){
  var lb=$('langBar');if(lb)lb.style.display='none';
  $('title').textContent = t('title');
  document.title = t('title');
  setStatus(t('welcome'));
  $('gameInfo').textContent='—';
  $('actions').innerHTML=`
    <button class="btn success" onclick="startSolo()">${t('vsBot')}</button>
    <button class="btn primary" onclick="newMulti()">${t('vsFriend')}</button>
    <button class="btn outline" onclick="joinGame()">${t('joinBtn')}</button>
  `;
}

let anaSid=null, anaTimer=null, anaLetters=[], anaUsed=new Set(), anaCurrentWord=[];

function showAnagram(){
  var lb=$('langBar');if(lb)lb.style.display='none';
  $('ownBoardWrap').style.display='none';
  $('oppBoardWrap').style.display='none';
  $('legend').style.display='none';
  $('title').textContent = t('anaTitle');
  document.title = 'Anagram';
  $('actions').innerHTML=`
    <button class="btn success" onclick="anaStartSolo()">${t('anaSolo')}</button>
    <button class="btn primary" onclick="anaNewMulti()">${t('anaFriend')}</button>
    <button class="btn outline" onclick="anaJoinGame()">${t('joinBtn')}</button>
    <button class="btn outline" onclick="showMenu()">${t('close')}</button>
  `;
  setStatus('');
  $('gameInfo').textContent=t('anaTitle');
}

function anaJoinGame(){
  const code=prompt(t('joinPlaceholder'));
  if(code)anaJoin(code);
}

async function anaStartSolo(){
  const res=await api('/api/ana_new_solo',{uid:getUid()});
  if(!res||!res.ok){setStatus(t('error'));return}
  anaSid=res.sid;
  localStorage.setItem('ana_sid', anaSid);
  $('actions').innerHTML='';
  anaShowGame(res.state);
}

async function anaNewMulti(){
  const res=await api('/api/ana_new_multi',{uid:getUid()});
  if(!res||!res.ok){setStatus(t('error'));return}
  anaSid=res.sid;
  anaLobbyCode=res.code;
  localStorage.setItem('ana_sid', anaSid);
  localStorage.setItem('ana_code', res.code);
  setStatus('', '');
  anaShowGame(res.state);
}

async function anaJoin(code){
  const res=await api('/api/ana_join',{uid:getUid(),code:code.toUpperCase()});
  if(!res||!res.ok){setStatus(t('joinError'));return}
  anaSid=res.sid;
  anaLobbyCode=code.toUpperCase();
  localStorage.setItem('ana_sid', anaSid);
  localStorage.setItem('ana_code', code.toUpperCase());
  $('actions').innerHTML='';
  anaShowGame(res.state);
}

function anaShowGame(st){
  $('anaArea').style.display='block';
  $('ownBoardWrap').style.display='none';
  $('oppBoardWrap').style.display='none';
  $('legend').style.display='none';
  anaLetters = st.letters.toUpperCase().split('');
  anaUsed = new Set();
  anaCurrentWord = [];
  anaRender(st);
  if(anaTimer)clearInterval(anaTimer);
  anaTimer=setInterval(()=>anaTick(),1000);
}

function anaTick(){
  if(!anaSid)return;
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
    if(!res||!res.ok){clearInterval(anaTimer);anaTimer=null;return}
    anaRender(res.state);
    if(res.state.finished){
      clearInterval(anaTimer);anaTimer=null;
      $('actions').innerHTML=`
        <button class="btn success" onclick="anaStartSolo()">${t('anaPlayAgain')}</button>
        <button class="btn outline" onclick="showMenu()">${t('close')}</button>
      `;
    }
  });
}

function anaTileClick(idx){
  if(idx<0||idx>=anaLetters.length||anaUsed.has(idx))return;
  anaUsed.add(idx);
  anaCurrentWord.push({letter:anaLetters[idx], idx});
  anaRenderWord();
}

function anaWordClick(idx){
  if(idx<0||idx>=anaCurrentWord.length)return;
  const {idx:origIdx} = anaCurrentWord[idx];
  anaUsed.delete(origIdx);
  anaCurrentWord.splice(idx,1);
  anaRenderWord();
}

function anaClearWord(){
  anaUsed = new Set();
  anaCurrentWord = [];
  anaRenderWord();
}

function anaBackspace(){
  if(!anaCurrentWord.length)return;
  const {idx:origIdx} = anaCurrentWord.pop();
  anaUsed.delete(origIdx);
  anaRenderWord();
}

function anaRenderWord(){
  $('anaLetters').innerHTML=anaLetters.map((l,i)=>`<div class="ana-tile${anaUsed.has(i)?' used':''}" onclick="anaTileClick(${i})">${l}</div>`).join('');
  $('anaWordDisplay').innerHTML=anaCurrentWord.length
    ? anaCurrentWord.map((o,i)=>`<div class="ana-tile" onclick="anaWordClick(${i})">${o.letter}</div>`).join('')
    : '<span style="color:#546e7a;font-size:13px">'+t('anaPlaceholder')+'</span>';
}

function anaRender(st){
  $('anaTimer').textContent=st.remaining;
  $('anaScore').textContent=st.score;
  if(st.base_word)$('anaBaseWordVal').textContent=st.base_word;
  if(!st.finished && st.letters.toUpperCase().split('').join('') !== anaLetters.join('')){
    anaLetters = st.letters.toUpperCase().split('');
    anaUsed = new Set();
    anaCurrentWord = [];
  }
  anaRenderWord();
  const found=st.found||[];
  $('anaFound').innerHTML=found.length
    ? '<div style="color:#78909c;font-size:12px;margin-bottom:4px">'+t('anaFound').replace('{}',found.length)+'</div>'+found.map(w=>`<div class="ana-word">${w}<span>+${100*Math.max(0,(w.length-2))**2}</span></div>`).join('')
    : '';
  if(!st.finished){
    let ah = `
      <button class="btn outline ana-hint" onclick="anaGetHint()">${t('anaHint')}</button>
      <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
    `;
    if(!st.solo){
      const acode = localStorage.getItem('ana_code') || anaLobbyCode || '';
      ah = `
        <button class="btn outline" onclick="copyCode('${acode}')">📋 ${t('joinPlaceholder')}: <b>${acode}</b></button>
        <button class="btn primary" onclick="shareAnaGame()">📤 ${t('inviteFriend')}</button>
        <button class="btn outline ana-hint" onclick="anaGetHint()">${t('anaHint')}</button>
        <button class="btn outline" onclick="showMenu()">${t('quit')}</button>
      `;
    }
    $('actions').innerHTML = ah;
  }else{
    setStatus(t('anaOver').replace('{}',st.score),'battle');
    if(st.total_words){
      $('anaFound').innerHTML+='<div style="color:#78909c;font-size:12px;margin:8px 0">'+t('anaAllWords').replace('{}',st.total_words)+'</div>';
    }
  }
}

async function anaSubmitWord(){
  const word = anaCurrentWord.map(o=>o.letter).join('').toLowerCase();
  anaUsed = new Set();
  anaCurrentWord = [];
  anaRenderWord();
  if(word.length<3){setStatus('⚠️ min 3 letters','');return}
  const res=await api('/api/ana_guess',{uid:getUid(),sid:anaSid,word});
  if(!res)return;
  if(!res.ok){
    const err=res.error;
    if(err==='duplicate')setStatus('⚠️ '+word+' already found','');
    else if(err==='not_a_word')setStatus('⚠️ '+word+' not a word','');
    else if(err==='length')setStatus('⚠️ 3-6 letters','');
    else setStatus('⚠️ Error','');
    return;
  }
  setStatus('✅ '+word+' +'+res.result.score,'');
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(r=>{if(r&&r.ok)anaRender(r.state)});
}

async function anaGetHint(){
  const res=await api('/api/ana_hint',{uid:getUid(),sid:anaSid});
  if(!res||!res.ok){setStatus('⚠️ No more hints','');return}
  setStatus('💡 '+res.result.word+' (-200)','');
  api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(r=>{if(r&&r.ok)anaRender(r.state)});
}

async function fetchActiveGames(){
  const cont=$('activeGamesContainer');
  if(!cont)return;
  const res=await api('/api/active_games',{uid:getUid()});
  if(!res||!res.ok||!res.games||!res.games.length){
    cont.innerHTML='';
    return;
  }
  var html='<div class="active-games"><h3>▶ '+t('selectGame')+'</h3>';
  for(const g of res.games){
    if(g.type==='sea_battle'){
      var label=g.solo?t('vsBot'):t('withFriend');
      var badge=g.phase==='playing'?'<span class="badge playing">🎯 '+t('yourTurn')+'</span>':'<span class="badge">🚢 '+t('placing')+'</span>';
      html+='<div class="active-game-row" onclick="resumeSB(\''+g.code+'\')"><div class="info"><span class="label">⚓ </span><span class="code">'+g.code+'</span> <span class="label">'+label+'</span></div>'+badge+'</div>';
    }else if(g.type==='anagram'){
      var fin=g.finished?'<span class="badge">✅ '+t('anaOver').replace('{}',g.score)+'</span>':'<span class="badge playing">🔤 '+t('yourTurn')+'</span>';
      html+='<div class="active-game-row" onclick="resumeAna(\''+g.code+'\')"><div class="info"><span class="label">🔤 </span><span class="code">'+g.code+'</span></div>'+fin+'</div>';
    }
  }
  html+='</div>';
  cont.innerHTML=html;
}

function resumeSB(code){
  gameCode=code;
  localStorage.setItem('sb_game',code);
  $('actions').innerHTML='';
  refreshState();
  setTimeout(pollGame,500);
}

function resumeAna(code){
  // Try to find existing ana_sid for this code from local storage, or rejoin
  var sid=localStorage.getItem('ana_sid');
  if(sid){
    anaSid=sid;
    $('actions').innerHTML='';
    api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
      if(res&&res.ok){anaShowGame(res.state)}else{anaJoin(code)}
    });
  }else{
    anaJoin(code);
  }
}

function tryReconnect(){
  const saved=localStorage.getItem('sb_game');
  const savedAna=localStorage.getItem('ana_sid');
  fetchBotInfo();
  if(saved){
    gameCode=saved;
    refreshState();
    setTimeout(pollGame,1000);
    return;
  }
  if(savedAna){
    anaSid=savedAna;
    api('/api/ana_state',{uid:getUid(),sid:anaSid}).then(res=>{
      if(res&&res.ok){
        anaShowGame(res.state);
      }else{
        localStorage.removeItem('ana_sid');
        localStorage.removeItem('ana_code');
        showMenu();
      }
    });
    return;
  }
  showMenu();
  fetchActiveGames();
  checkStartParam();
}

async function checkStartParam(){
  try {
    const sp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(sp){
      const code = sp.trim().toUpperCase();
      // Try join as Anagram first
      const anaRes = await api('/api/ana_join', {uid: getUid(), code});
      if(anaRes && anaRes.ok){
        anaSid = anaRes.sid;
        localStorage.setItem('ana_sid', anaSid);
        localStorage.setItem('ana_code', code);
        $('actions').innerHTML = '';
        anaShowGame(anaRes.state);
        return;
      }
      // Try Sea Battle
      const sbRes = await api('/api/join', {uid: getUid(), code});
      if(sbRes && sbRes.ok){
        gameCode = code;
        localStorage.setItem('sb_game', code);
        $('actions').innerHTML = '';
        await refreshState();
        pollGame();
        return;
      }
    }
  } catch(e){}
}

lang = detectLang();
setLang(lang);
initTG();
tryReconnect();
</script>
